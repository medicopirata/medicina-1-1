<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Cavidad Pélvica Femenina</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
            text-align: center;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .instructions {
            margin-bottom: 20px;
            color: #333;
            font-size: 16px;
        }
        .controls {
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            margin: 0 10px;
            transition: background-color 0.3s;
        }
        .btn-verify {
            background-color: #4CAF50;
            color: white;
        }
        .btn-verify:hover {
            background-color: #45a049;
        }
        .btn-retry {
            background-color: #2196F3;
            color: white;
        }
        .btn-retry:hover {
            background-color: #1e88e5;
        }
        .score-display {
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
            color: #333;
        }
        .img-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 700px;
            border: 1px solid #ddd;
            background-color: white;
        }
        .img-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }
        .dropdown {
            position: absolute;
            height: 3%;
            font-size: 11px;
            background-color: rgba(255, 255, 255, 0.95);
            border: 1px solid #666;
            border-radius: 3px;
            padding: 0 2px;
            box-sizing: border-box;
            cursor: pointer;
        }
        .dropdown:focus {
            z-index: 10;
            border-color: #2196F3;
            outline: none;
            min-width: 25%; /* Expande al hacer clic si es muy pequeño */
        }
        .correct {
            background-color: #c8e6c9 !important;
            border: 2px solid #2e7d32 !important;
            color: #1b5e20;
            font-weight: bold;
        }
        .incorrect {
            background-color: #ffcdd2 !important;
            border: 2px solid #c62828 !important;
            color: #b71c1c;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Quiz: Visión Superior de la Cavidad Pélvica Femenina</h1>
        <p class="instructions">Selecciona la estructura anatómica correcta en cada menú desplegable situado al final de las líneas indicadoras.</p>
        
        <div class="controls">
            <button class="btn-verify" onclick="verificarRespuestas()">Verificar Respuestas</button>
            <button class="btn-retry" onclick="reiniciarTest()">Volver a Intentar</button>
            <div id="score" class="score-display"></div>
        </div>

        <div class="img-wrapper">
            <img src="cavidad_pelvica.png" alt="Cavidad Pélvica">
            
            <select class="dropdown" style="top: 11%; left: 67%; width: 28%;" data-correct="Ligamento iliolumbar"></select>
            <select class="dropdown" style="top: 19%; left: 67%; width: 28%;" data-correct="Articulación sacroilíaca"></select>
            <select class="dropdown" style="top: 26%; left: 67%; width: 28%;" data-correct="Músculo coccígeo"></select>
            <select class="dropdown" style="top: 35%; left: 67%; width: 28%;" data-correct="Ligamento anococcígeo"></select>
            <select class="dropdown" style="top: 43%; left: 67%; width: 28%;" data-correct="Músculo iliococcígeo"></select>
            <select class="dropdown" style="top: 53%; left: 67%; width: 28%;" data-correct="Músculo pubococcígeo"></select>
            <select class="dropdown" style="top: 63%; left: 67%; width: 28%;" data-correct="Arco tendinoso del elevador del ano"></select>
            <select class="dropdown" style="top: 70%; left: 67%; width: 28%;" data-correct="Músculo obturador interno"></select>

            <select class="dropdown" style="top: 74%; left: 0%; width: 12%;" data-correct="Recto"></select>
            <select class="dropdown" style="top: 74%; left: 12.5%; width: 12%;" data-correct="Vagina"></select>
            <select class="dropdown" style="top: 74%; left: 25%; width: 12%;" data-correct="Uretra"></select>
            <select class="dropdown" style="top: 74%; left: 38%; width: 12%;" data-correct="Músculo pubovaginal"></select>
            <select class="dropdown" style="top: 74%; left: 54%; width: 16%;" data-correct="Músculo puborrectal"></select>
        </div>
    </div>

    <script>
        const opciones = [
            "Arco tendinoso del elevador del ano",
            "Articulación sacroilíaca",
            "Ligamento anococcígeo",
            "Ligamento iliolumbar",
            "Músculo coccígeo",
            "Músculo iliococcígeo",
            "Músculo obturador interno",
            "Músculo pubococcígeo",
            "Músculo puborrectal",
            "Músculo pubovaginal",
            "Recto",
            "Uretra",
            "Vagina"
        ];

        window.onload = function() {
            const selects = document.querySelectorAll('.dropdown');
            
            selects.forEach(select => {
                let defaultOption = document.createElement('option');
                defaultOption.value = "";
                defaultOption.text = "--- Selecciona ---";
                select.appendChild(defaultOption);

                opciones.forEach(opcion => {
                    let opt = document.createElement('option');
                    opt.value = opcion;
                    opt.text = opcion;
                    select.appendChild(opt);
                });
            });
        };

        function verificarRespuestas() {
            const selects = document.querySelectorAll('.dropdown');
            let correctas = 0;
            let total = selects.length;

            selects.forEach(select => {
                let respuestaUsuario = select.value;
                let respuestaCorrecta = select.getAttribute('data-correct');

                select.classList.remove('correct', 'incorrect');

                if (respuestaUsuario === respuestaCorrecta) {
                    select.classList.add('correct');
                    correctas++;
                } else if (respuestaUsuario !== "") {
                    select.classList.add('incorrect');
                } else {
                    select.classList.add('incorrect');
                }
            });

            const scoreDiv = document.getElementById('score');
            scoreDiv.innerHTML = `Has acertado ${correctas} de ${total} preguntas.`;
            
            if (correctas === total) {
                scoreDiv.style.color = "#2e7d32";
            } else {
                scoreDiv.style.color = "#c62828";
            }
        }

        function reiniciarTest() {
            const selects = document.querySelectorAll('.dropdown');
            selects.forEach(select => {
                select.value = "";
                select.classList.remove('correct', 'incorrect');
            });
            document.getElementById('score').innerHTML = "";
        }
    </script>
</body>
</html>
