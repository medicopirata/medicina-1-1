<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Hormonas Esteroideas (Tema 7)</title>
    <style>
        :root {
            --primary: #7e5109;
            --secondary: #d4ac0d;
            --success: #1d8348;
            --danger: #922b21;
            --warning: #f39c12;
            --light: #fdfefe;
            --bg: #f9f7f2;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Sidebar Numérico --- */
        #sidebar {
            width: 85px;
            background: var(--primary);
            color: white;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            box-shadow: 2px 0 10px rgba(0,0,0,0.2);
        }

        .nav-btn {
            width: 42px;
            height: 42px;
            margin: 4px 0;
            border-radius: 5px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .nav-btn:hover { background: var(--secondary); }
        .nav-btn.active { background: var(--secondary); border: 2px solid white; transform: scale(1.1); }
        .nav-btn.correct { background: var(--success); }
        .nav-btn.wrong { background: var(--danger); }
        .nav-btn.marked { border: 2px solid var(--warning); color: var(--warning); }

        /* --- Contenedor Principal --- */
        #main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .quiz-card {
            background: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 850px;
            margin: 0 auto;
            position: relative;
        }

        .screen { display: none; text-align: center; }
        .screen.active { display: block; }

        h1 { color: var(--primary); margin-bottom: 10px; }
        h2 { color: var(--primary); border-left: 5px solid var(--secondary); padding-left: 15px; text-align: left; }

        /* --- Opciones --- */
        .options-list { margin: 25px 0; text-align: left; }
        .opt-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 12px;
            border: 2px solid #f0f0f0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
            text-align: left;
        }
        .opt-btn:hover:not([disabled]) { border-color: var(--secondary); background: #fffdf5; }
        .opt-btn.correct { background: var(--success) !important; color: white; border-color: var(--success); }
        .opt-btn.wrong { background: var(--danger) !important; color: white; border-color: var(--danger); }

        /* --- Feedback y Explicación --- */
        .explanation-box {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #fcf3cf;
            border-radius: 10px;
            text-align: left;
            border-left: 5px solid var(--warning);
            line-height: 1.6;
        }
        .explanation-box.show { display: block; animation: fadeIn 0.5s; }

        /* --- Botones de Control --- */
        .nav-controls {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-next { background: var(--primary); color: white; }
        .btn-mark { background: var(--warning); color: white; }
        .btn-finish { background: #5d6d7e; color: white; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .mark-indicator {
            color: var(--warning);
            font-weight: bold;
            margin-bottom: 10px;
            display: none;
        }
        .mark-indicator.visible { display: block; }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<div id="sidebar"></div>

<div id="main-content">
    <div class="quiz-card">
        <div id="start-screen" class="screen active">
            <h1>Tema 7: Hormonas Esteroideas</h1>
            <p>Estructura, Síntesis, Ejes de Regulación y Patologías Relacionadas.</p>
            <div style="margin-top: 40px;">
                <button class="btn btn-next" onclick="initQuiz(false)">Orden Preestablecido</button>
                <button class="btn btn-next" onclick="initQuiz(true)" style="background: var(--secondary);">Orden Aleatorio</button>
            </div>
        </div>

        <div id="question-screen" class="screen">
            <div id="mark-tag" class="mark-indicator">★ PREGUNTA MARCADA</div>
            <h2 id="q-title">Pregunta</h2>
            <p id="q-text" style="font-size: 18px; text-align: left;"></p>
            
            <div class="options-list" id="options-container"></div>
            
            <div id="explanation" class="explanation-box"></div>

            <div class="nav-controls">
                <button class="btn btn-mark" onclick="handleMark()">Marcar Pregunta</button>
                <div>
                    <button class="btn btn-finish" onclick="showResults()">Finalizar</button>
                    <button class="btn btn-next" id="prev-btn" onclick="changeQuestion(-1)">Anterior</button>
                    <button class="btn btn-next" id="next-btn" onclick="changeQuestion(1)">Siguiente</button>
                </div>
            </div>
        </div>

        <div id="results-screen" class="screen">
            <h1>Cuestionario Finalizado</h1>
            <div id="score-display" style="font-size: 40px; margin: 20px 0;"></div>
            <div class="result-grid">
                <button class="btn btn-next" onclick="location.reload()">Repetir Todo</button>
                <button class="btn btn-next" onclick="retry('failed')">Repetir Falladas</button>
                <button class="btn btn-mark" onclick="retry('marked')">Repetir Marcadas</button>
                <button class="btn btn-finish" onclick="retry('both')">Falladas + Marcadas</button>
            </div>
        </div>
    </div>
</div>

<script>
    const rawQuestions = [
        { q: "1. ¿De qué molécula precursora de 27 átomos de carbono derivan todas las hormonas esteroideas (glucocorticoides, mineralocorticoides y hormonas sexuales)?", a: "C", opts: {A: "Tirosina.", B: "Ácido araquidónico.", C: "Colesterol.", D: "Proopiomelanocortina (POMC)."}, exp: "Según la profesora, la gran importancia del colesterol radica en que es la molécula base de la que derivan todas estas hormonas tras perder su cadena lateral." },
        { q: "2. ¿Cuántos átomos de carbono tienen los glucocorticoides (como el cortisol) y los mineralocorticoides (como la aldosterona)?", a: "B", opts: {A: "27 carbonos.", B: "21 carbonos.", C: "19 carbonos.", D: "18 carbonos."}, exp: "Al perder la cadena lateral de 6 carbonos, el colesterol (C27) pasa a formar moléculas de 21 carbonos como el cortisol, la aldosterona y la progesterona." },
        { q: "3. Desde el punto de vista del número de carbonos, ¿cuál es la secuencia correcta en la degradación del colesterol hacia las hormonas sexuales?", a: "C", opts: {A: "Colesterol (C27) -> Andrógenos (C21) -> Estrógenos (C19).", B: "Colesterol (C27) -> Cortisol (C19) -> Estrógenos (C18).", C: "Colesterol (C27) -> Progestágenos (C21) -> Andrógenos (C19) -> Estrógenos (C18).", D: "Colesterol (C21) -> Estrógenos (C27)."}, exp: "El colesterol pierde la cadena lateral pasando a 21C, luego a andrógenos de 19C, y mediante aromatización pierde un metilo para dar estrógenos de 18C." },
        { q: "4. Las hormonas esteroideas son de naturaleza lipofílica. ¿Qué característica les confiere esta propiedad a la hora de actuar sobre la célula diana?", a: "B", opts: {A: "No pueden atravesar la membrana y usan siempre receptores de membrana acoplados a proteína G.", B: "Atraviesan la membrana plasmática y se unen a receptores intracelulares (citoplasma o núcleo).", C: "Se degradan antes de entrar a la célula.", D: "Actúan destruyendo la bicapa lipídica."}, exp: "Su carácter lipídico les permite difundir a través de la membrana y unirse a receptores en el interior celular." },
        { q: "5. Cuando el complejo hormona-receptor esteroideo llega al núcleo y se une directamente a una secuencia específica del ADN para regular la transcripción, hablamos de un mecanismo de acción:", a: "B", opts: {A: "No genómico.", B: "Genómico.", C: "Paracrino.", D: "Proteolítico."}, exp: "La profesora incidió en esta distinción. Los mecanismos genómicos implican interacción directa con los genes (ADN) promoviendo o inhibiendo su expresión." },
        { q: "6. ¿A qué nos referimos cuando una hormona esteroidea ejerce un \"mecanismo de acción NO genómico\"?", a: "C", opts: {A: "A que destruye el genoma de la célula.", B: "A que la hormona nunca entra en la célula.", C: "A que la hormona se une a un receptor de superficie y activa vías de señalización intracelular (segundos mensajeros) sin unirse directamente al ADN.", D: "A que muta el ADN mitocondrial."}, exp: "Las acciones no genómicas, mucho más rápidas, se median por receptores de superficie que activan cascadas (ej. MAPK, PKA, PKC)." },
        { q: "7. La corteza de la glándula suprarrenal se divide en tres zonas. ¿Qué se sintetiza en la zona más externa o GLOMERULOSA?", a: "D", opts: {A: "Glucocorticoides (Cortisol).", B: "Catecolaminas (Adrenalina).", C: "Andrógenos.", D: "Mineralocorticoides (Aldosterona)."}, exp: "En la capa glomerular o granulosa externa se producen los mineralocorticoides responsables del equilibrio hidroelectrolítico." },
        { q: "8. ¿Qué capa de la glándula suprarrenal es la responsable de la síntesis de Glucocorticoides (como el cortisol)?", a: "B", opts: {A: "Zona Glomerulosa.", B: "Zona Fasciculada (Fascicular).", C: "Zona Reticular.", D: "Médula suprarrenal."}, exp: "La capa intermedia, la zona fasciculada, produce el cortisol y otros glucocorticoides." },
        { q: "9. ¿Qué hormonas se sintetizan principalmente en la zona RETICULAR (la capa más interna de la corteza suprarrenal)?", a: "C", opts: {A: "Aldosterona.", B: "Adrenalina.", C: "Andrógenos (como la DHEA).", D: "Insulina."}, exp: "En la zona reticular se producen los esteroides sexuales adrenales, principalmente andrógenos débiles como la dehidroepiandrosterona." },
        { q: "10. (¡Pista Profesora!) La profesora señaló como \"casi la más importante\" a la primera enzima de la ruta esteroidogénica, ya que si falla, no se produce NINGUNA hormona. ¿Cuál es?", a: "B", opts: {A: "21-alfa-hidroxilasa.", B: "Colesterol 20,22-desmolasa (CYP11A1).", C: "Aromatasa.", D: "Aldosterona sintasa."}, exp: "Transforma el colesterol en pregnenolona escindiendo la cadena lateral. Es el paso limitante de toda la esteroidogénesis." },
        { q: "11. El primer producto directo originado tras la acción de la colesterol 20,22-desmolasa sobre el colesterol es:", a: "C", opts: {A: "Progesterona.", B: "Cortisol.", C: "Pregnenolona.", D: "Testosterona."}, exp: "La pregnenolona (de 21 C) es el precursor a partir del cual se ramifican todas las demás vías hormonales." },
        { q: "12. (¡Pista Profesora!) ¿Qué enzima clave es esencial para la síntesis de estrógenos (pasando de andrógenos de 19 carbonos a estrógenos de 18 carbonos)?", a: "B", opts: {A: "5-alfa-reductasa.", B: "Aromatasa (P450ARO / CYP19A1).", C: "11-beta-hidroxilasa.", D: "21-alfa-hidroxilasa."}, exp: "La aromatasa elimina el grupo metilo del C-19 y aromatiza el anillo A del esteroide, produciendo estradiol a partir de testosterona." },
        { q: "13. ¿Qué molécula actúa como precursor DIRECTO de la progesterona en la vía biosintética?", a: "C", opts: {A: "Cortisol.", B: "Androstenediona.", C: "Pregnenolona (mediante la enzima 3-beta-HSD).", D: "Estradiol."}, exp: "La pregnenolona se oxida y se isomeriza para dar lugar a la progesterona, un intermediario fundamental de las otras vías." },
        { q: "14. ¿Qué hormona hipotalámica inicia la cascada para la secreción final de cortisol?", a: "C", opts: {A: "TRH.", B: "GnRH.", C: "CRH (Corticoliberina).", D: "Dopamina."}, exp: "La CRH se sintetiza en el hipotálamo y viaja a la adenohipófisis para estimular la liberación de ACTH." },
        { q: "15. Además de la CRH, ¿qué otra hormona (sintetizada en el núcleo paraventricular) potencia fuertemente la respuesta de la hipófisis estimulando los receptores de CRH?", a: "B", opts: {A: "Oxitocina.", B: "Vasopresina (VP).", C: "Somatostatina.", D: "Melatonina."}, exp: "La vasopresina ayuda a la corticoliberina (CRH) a potenciar la estimulación de la síntesis de ACTH." },
        { q: "16. (¡Pista Profesora!) La hormona adenocorticotropa (ACTH) no se sintetiza sola, sino que se obtiene al fragmentar (cortar) una gran proteína precursora llamada:", a: "B", opts: {A: "Grelina.", B: "POMC (Proopiomelanocortina).", C: "Albúmina.", D: "Globulina fijadora de cortisol (CBG)."}, exp: "El precursor POMC (de 241 aminoácidos) se escinde para dar lugar a la ACTH, así como a MSH y endorfinas." },
        { q: "17. Debido a la proteólisis del precursor POMC, además de ACTH se obtienen otras moléculas. Una de ellas es capaz de estimular la pigmentación de la piel. ¿Cuál es?", a: "B", opts: {A: "TRH.", B: "Alfa-MSH (Hormona estimulante de los melanocitos).", C: "Endorfina beta.", D: "Vasopresina."}, exp: "La MSH estimula los melanocitos. Por eso, en patologías con exceso de ACTH/POMC (como Addison), los pacientes presentan hiperpigmentación." },
        { q: "18. La secreción de Cortisol presenta un ritmo circadiano muy marcado. En condiciones fisiológicas normales, ¿cuándo se da el pico máximo de secreción?", a: "C", opts: {A: "A medianoche (durante el sueño profundo).", B: "Constante durante todo el día.", C: "Al despertar, entre las 6 y las 9 de la mañana.", D: "Inmediatamente después de comer."}, exp: "La profesora explica que el cortisol aumenta por la mañana para activarnos e iniciar la vigilia, y desciende a lo largo del día." },
        { q: "19. ¿Cuál de los siguientes estímulos fisiológicos es un POTENTE activador de la liberación de Cortisol?", a: "A", opts: {A: "Hipoglucemia y Estrés (físico, emocional, traumatismo).", B: "Hiperglucemia y relajación.", C: "Presión arterial muy elevada.", D: "Ingresa excesiva de hidratos de carbono."}, exp: "El cortisol es conocido como la \"hormona del estrés\" y se activa ante traumas, inflamación y bajadas de glucosa." },
        { q: "20. En la circulación sanguínea, el 75% del cortisol no viaja libre, sino unido a una proteína específica llamada:", a: "B", opts: {A: "Albúmina exclusivamente.", B: "Transcortina (Globulina fijadora de corticoides, CBG).", C: "Hemoglobina.", D: "LDL."}, exp: "Al ser hidrofóbico, requiere transporte. Aunque un 6% va con albúmina, el 75% usa la proteína transportadora específica Transcortina." },
        { q: "21. ¿Qué mecanismo utiliza el Cortisol para evitar una producción excesiva en el organismo?", a: "A", opts: {A: "Retroalimentación (feedback) negativa sobre el hipotálamo (frenando CRH) y sobre la hipófisis (frenando ACTH).", B: "Retroalimentación positiva continua.", C: "Estimulación directa de la insulina que destruye al cortisol.", D: "Excreción masiva e inmediata por sudor."}, exp: "Los niveles altos de cortisol actúan inhibiendo las glándulas superiores de su propio eje." },
        { q: "22. (¡Pista Profesora!) ¿Por qué la profesora insiste en definir al Cortisol como una hormona \"antagonista\" o \"contrarreguladora\" de la Insulina?", a: "B", opts: {A: "Porque ambas hormonas bajan la glucosa en sangre.", B: "Porque el cortisol busca aumentar los niveles de glucosa en sangre (hiperglucemiante) y disminuir su entrada en los tejidos periféricos (músculo/grasa), al contrario que la insulina.", C: "Porque el cortisol destruye físicamente el páncreas.", D: "Porque el cortisol bloquea la gluconeogénesis hepática."}, exp: "En situación de estrés o hipoglucemia, el cortisol reserva la poca glucosa que hay para el cerebro, limitando su uso por otros tejidos." },
        { q: "23. ¿Qué efecto tiene el Cortisol sobre el metabolismo de los lípidos en el tejido adiposo en una respuesta aguda de estrés?", a: "A", opts: {A: "Promueve la lipólisis, liberando ácidos grasos y favoreciendo una redistribución de la grasa.", B: "Bloquea completamente la lipasa sensible a hormonas.", C: "Convierte directamente la grasa en proteínas musculares.", D: "Reduce los niveles de colesterol LDL en sangre."}, exp: "Tiene un efecto catabólico, buscando fuentes de energía alternativas a la glucosa mediante la lipólisis y la proteólisis." },
        { q: "24. ¿Qué proceso fomenta enormemente el Cortisol en el hígado para elevar la glucemia?", a: "B", opts: {A: "Glucólisis.", B: "Gluconeogénesis (a partir de aminoácidos provenientes de la destrucción muscular).", C: "Fermentación láctica.", D: "Síntesis de cuerpos cetónicos de forma exclusiva."}, exp: "Aumenta la producción hepática de glucosa usando esqueletos carbonados de aminoácidos para asegurar el suministro cerebral." },
        { q: "25. A nivel del sistema inmune, ¿cuál es el efecto terapéutico que justifica que se utilicen inyecciones de glucocorticoides (ej. corticoides en artritis)?", a: "B", opts: {A: "Estimulan potentemente la inflamación para matar bacterias.", B: "Tienen una fuerte actividad antiinflamatoria e inmunosupresora (reducen citoquinas proinflamatorias como TNF-alfa).", C: "Aumentan el calcio en las articulaciones.", D: "Activan los linfocitos T citotóxicos."}, exp: "Bloquean la respuesta inmunitaria y reducen la inflamación (aumentando la IL-10 antiinflamatoria y bajando el TNF-alfa)." },
        { q: "26. Sin embargo, un exceso crónico de Cortisol tiene un efecto negativo grave sobre el sistema óseo. ¿Cuál es?", a: "B", opts: {A: "Aumenta descontroladamente la masa ósea (osteosclerosis).", B: "Induce pérdida de masa ósea (inhibe osteoblastos, activa osteoclastos y bloquea la absorción de calcio), favoreciendo la osteoporosis.", C: "Convierte el hueso en cartílago.", D: "Aumenta la formación de glóbulos rojos en la médula."}, exp: "Es uno de los principales efectos secundarios a largo plazo del exceso de corticoides (ya sea endógeno o farmacológico)." },
        { q: "27. (¡Pista Profesora!) ¿Qué característica ÚNICA diferencia la regulación de la Aldosterona frente a la del Cortisol o las Hormonas Sexuales?", a: "B", opts: {A: "Se regula exclusivamente por el hipotálamo.", B: "Su producción NO está regulada por el eje hipotálamo-hipofisario, sino principalmente por el sistema Renina-Angiotensina.", C: "Se produce en la hipófisis.", D: "No tiene ningún sistema de regulación."}, exp: "Fue remarcado en clase con un \"Sorpresa...\". Aunque la ACTH tiene un leve papel permisivo, la aldosterona la manda la Angiotensina II." },
        { q: "28. ¿Cuál es la función fisiológica fundamental de la Aldosterona a nivel renal?", a: "C", opts: {A: "Promueve la excreción de Sodio y la reabsorción de Potasio.", B: "Promueve la excreción de Glucosa.", C: "Estimula la reabsorción de Sodio (Na+) hacia la sangre y la excreción de Potasio (K+) en orina.", D: "Destruye los glomérulos renales."}, exp: "Al recuperar el sodio, también arrastra agua por ósmosis, lo que es vital para mantener la volemia." },
        { q: "29. En consecuencia, debido a la reabsorción de Sodio y retención de agua, un aumento en los niveles de Aldosterona provocará:", a: "C", opts: {A: "Una disminución de la presión arterial.", B: "Una hipoglucemia severa.", C: "Un aumento del volumen sanguíneo y, por tanto, un aumento de la presión arterial.", D: "Deshidratación."}, exp: "El sistema Renina-Angiotensina-Aldosterona es el principal mecanismo del cuerpo para subir la presión arterial." },
        { q: "30. ¿Qué molécula circulante en la sangre actúa como el ESTÍMULO PRINCIPAL directo sobre la corteza suprarrenal para que sintetice Aldosterona?", a: "C", opts: {A: "CRH.", B: "Insulina.", C: "Angiotensina II.", D: "Leptina."}, exp: "El hígado produce angiotensinógeno, el riñón renina y finalmente se forma Angiotensina II, que ordena liberar la aldosterona." },
        { q: "31. La enzima final exclusiva de la zona glomerulosa que cataliza el paso de corticosterona a aldosterona se llama:", a: "A", opts: {A: "Aldosterona sintasa (CYP11B2).", B: "Aromatasa.", C: "17-alfa-hidroxilasa.", D: "Colesterol desmolasa."}, exp: "Es el complejo que incluye actividades hidroxilasa y deshidrogenasa en la posición 18, formando la aldosterona." },
        { q: "32. El Síndrome de Cushing se caracteriza bioquímicamente por:", a: "B", opts: {A: "Niveles indetectables de cortisol.", B: "Un aumento exagerado y crónico en la producción de Cortisol.", C: "Deficiencia de Aldosterona exclusiva.", D: "Destrucción autoinmune de la corteza suprarrenal."}, exp: "Puede ser endógeno (tumor hipofisario secretor de ACTH o suprarrenal) o exógeno (tratamiento farmacológico con corticoides)." },
        { q: "33. Un paciente presenta obesidad troncal, extremidades delgadas, \"cara de luna llena\", \"joroba de búfalo\" y estrías violáceas en el abdomen. Este fenotipo es clásico de:", a: "C", opts: {A: "Enfermedad de Addison.", B: "Enanismo hipofisario.", C: "Síndrome de Cushing.", D: "Hiperaldosteronismo."}, exp: "Son los síntomas típicos del exceso crónico de glucocorticoides por la redistribución anormal de la grasa y catabolismo proteico (estrías)." },
        { q: "34. Por el contrario, ¿qué patología se debe a una insuficiencia suprarrenal primaria (destrucción de la glándula) resultando en BAJA producción de cortisol y aldosterona?", a: "A", opts: {A: "Enfermedad de Addison.", B: "Síndrome de Cushing.", C: "Hipertiroidismo.", D: "Ovario poliquístico."}, exp: "En Addison, falla la glándula entera. Hay hiponatremia, potasemia, fatiga y, al no haber cortisol, la ACTH y la MSH suben (hiperpigmentación)." },
        { q: "35. En la Enfermedad de Addison, ¿cómo se espera encontrar los niveles de ACTH (corticotropina) en sangre?", a: "C", opts: {A: "Muy bajos (por debajo de lo normal).", B: "Indetectables.", C: "Muy elevados.", D: "Normales siempre."}, exp: "Al no haber cortisol (falta el freno de la retroalimentación negativa), la hipófisis secreta cantidades masivas de ACTH intentando estimular a una glándula rota." },
        { q: "36. Un hiperaldosteronismo SECUNDARIO se define porque el problema o tumor NO está en la glándula suprarrenal, sino que suele radicar en:", a: "A", opts: {A: "Una hiperactivación del riñón secretando exceso de renina (o problemas vasculares renales).", B: "Una mutación en la hipófisis.", C: "Una destrucción del hígado.", D: "Un tumor en el páncreas."}, exp: "El primario es fallo directo en la glándula suprarrenal; el secundario viene de fuera del eje directo (frecuentemente riñón/renina)." },
        { q: "37. (¡Pista Profesora - Pregunta clásica!) ¿Cuál es el déficit enzimático hereditario MÁS FRECUENTE causante de Hiperplasia Suprarrenal Congénita?", a: "B", opts: {A: "20,22-desmolasa.", B: "21-alfa-hidroxilasa.", C: "Aromatasa.", D: "5-alfa-reductasa."}, exp: "Explicado en detalle por la profesora. Es un punto de corte fundamental en las rutas." },
        { q: "38. Bioquímicamente, si un paciente tiene deficiencia genética de la enzima 21-alfa-hidroxilasa, ¿qué hormonas DEJARÁN de sintetizarse adecuadamente?", a: "B", opts: {A: "Exclusivamente la testosterona.", B: "Mineralocorticoides (Aldosterona) y Glucocorticoides (Cortisol).", C: "Los estrógenos y andrógenos.", D: "Solo la DHEA."}, exp: "Esta enzima convierte la progesterona hacia las vías del cortisol y la aldosterona. Si falla, estas dos vías se bloquean." },
        { q: "39. (¡Pista Profesora!) ¿Qué ocurre con los intermediarios acumulados (como la progesterona) cuando hay un bloqueo por déficit de 21-alfa-hidroxilasa?", a: "B", opts: {A: "Se excretan sin sufrir cambios.", B: "Se desvían \"hacia la derecha\" en el esquema, causando una sobreproducción masiva de ANDRÓGENOS (Testosterona).", C: "Se convierten espontáneamente en colesterol.", D: "Se transforman íntegramente en aldosterona por otra vía."}, exp: "Como la vía hacia abajo (cortisol/aldosterona) está rota, la maquinaria usa el sustrato remanente para fabricar andrógenos en exceso." },
        { q: "40. Clínicamente, este exceso de andrógenos secundario al déficit de 21-alfa-hidroxilasa en niñas recién nacidas provoca:", a: "B", opts: {A: "Cara de luna llena.", B: "Virilización (desarrollo de características masculinas / genitales ambiguos).", C: "Hipoglucemia reactiva.", D: "Gigantismo."}, exp: "La inundación de testosterona in utero altera el desarrollo de los caracteres sexuales femeninos." },
        { q: "41. El tratamiento primario lógico para la Hiperplasia Suprarrenal por déficit de 21-alfa-hidroxilasa consiste en:", a: "C", opts: {A: "Inyecciones de testosterona.", B: "Administrar CRH sintética.", C: "Tratamiento sustitutivo con glucocorticoides (cortisol) y mineralocorticoides.", D: "Cirugía cerebral."}, exp: "Al administrar cortisol, frenamos el exceso de ACTH (quitamos el estímulo a la glándula hiperplásica) y reponemos la hormona faltante." },
        { q: "42. ¿Qué hormona sintetizada en el hipotálamo inicia la cascada para la secreción de hormonas sexuales?", a: "C", opts: {A: "CRH.", B: "TRH.", C: "GnRH (Gonadoliberina).", D: "ACTH."}, exp: "La Hormona Liberadora de Gonadotropinas activa a la adenohipófisis." },
        { q: "43. Una característica clave de la secreción de GnRH que marca el inicio fisiológico de la pubertad es que:", a: "B", opts: {A: "Se vuelve completamente indetectable.", B: "Pasa a secretarse de forma pulsátil a niveles considerables.", C: "Se inhibe masivamente.", D: "Solo se secreta en varones."}, exp: "La reactivación de este eje y la secreción pulsátil de GnRH desencadena la pubertad y la producción de FSH y LH." },
        { q: "44. La GnRH estimula a la hipófisis para liberar dos gonadotropinas o \"glicoproteínas\". ¿Cuáles son?", a: "B", opts: {A: "Prolactina y GH.", B: "LH (Luteinizante) y FSH (Estimulante del folículo).", C: "TSH y ACTH.", D: "Oxitocina y Vasopresina."}, exp: "Ambas viajan hacia las gónadas (ovarios y testículos) para orquestar la función reproductiva." },
        { q: "45. En los testículos del varón, ¿sobre qué células actúa específicamente la LH (Hormona Luteinizante)?", a: "C", opts: {A: "Células de Sertoli.", B: "Células del túbulo contorneado proximal.", C: "Células de Leydig (estimulando la producción de Testosterona).", D: "Espermatogonias directamente."}, exp: "La LH se une a receptores acoplados a proteína G en las células de Leydig promoviendo la síntesis esteroidea." },
        { q: "46. En contraste, ¿cuál es la diana de la FSH en los testículos masculinos?", a: "C", opts: {A: "La próstata.", B: "Células de Leydig.", C: "Células de Sertoli (induciendo la espermatogénesis y producción de ABP).", D: "La vesícula seminal."}, exp: "La FSH se enfoca en las células \"nutrizas\" de Sertoli para asegurar la maduración de los espermatozoides." },
        { q: "47. En la mujer, la hormona FSH durante la fase folicular del ciclo menstrual promueve:", a: "C", opts: {A: "La ovulación exclusiva.", B: "La atrofia del útero.", C: "La maduración del folículo ovárico y la síntesis de Estradiol.", D: "La producción masiva de testosterona."}, exp: "La FSH estimula el desarrollo del óvulo preparándolo, acompañado del aumento de estrógenos." },
        { q: "48. El estrógeno más importante fisiológicamente y principal responsable del desarrollo de los caracteres sexuales femeninos se denomina:", a: "C", opts: {A: "Estriol.", B: "Estrona.", C: "17-beta-Estradiol (E2).", D: "Progesterona."}, exp: "El estradiol, sintetizado en el ovario maduro, es la molécula estrogénica de mayor potencia y relevancia clínica." },
        { q: "49. ¿Qué hormona hipofisaria sufre un \"pico\" brusco a mitad del ciclo menstrual femenino provocando la rotura del folículo y la OVULACIÓN?", a: "C", opts: {A: "FSH.", B: "Prolactina.", C: "LH (Hormona Luteinizante).", D: "CRH."}, exp: "El pico de LH es el desencadenante de la liberación del oocito hacia las trompas." },
        { q: "50. Tras la ovulación, los restos del folículo se transforman en el cuerpo lúteo, el cual empieza a secretar en grandes cantidades:", a: "C", opts: {A: "GnRH.", B: "Testosterona.", C: "Progesterona.", D: "Cortisol."}, exp: "La progesterona \"estabiliza\" y prepara el endometrio del útero para la posible implantación de un embrión." },
        { q: "51. Si NO ocurre la fecundación del óvulo por un espermatozoide, ¿qué suceso hormonal precipita el inicio de la menstruación?", a: "B", opts: {A: "Un pico de testosterona.", B: "Los niveles de progesterona (y estrógenos) caen drásticamente, descamando el endometrio.", C: "Un aumento infinito de FSH.", D: "La producción de leche materna."}, exp: "Al no haber embarazo, el cuerpo lúteo degenera, cesa la progesterona y el tejido uterino se desprende." },
        { q: "52. ¿Mediante qué mecanismo se autoregulan los niveles de testosterona en el varón?", a: "A", opts: {A: "La testosterona circulante ejerce retroalimentación NEGATIVA sobre el hipotálamo (bajando GnRH) y la hipófisis (bajando LH).", B: "Retroalimentación positiva continua.", C: "Inhibiendo la síntesis de colesterol.", D: "A través de la hormona ADH."}, exp: "Como es norma en los ejes esteroideos, la hormona final frena la producción de las hormonas estimuladoras." },
        { q: "53. Además de la testosterona, las células de Sertoli secretan una proteína que inhibe específicamente a la FSH hipofisaria. ¿Cómo se llama?", a: "C", opts: {A: "Albúmina.", B: "Proteína StAR.", C: "Inhibina.", D: "Globulina CBG."}, exp: "La inhibina es un bucle de retroalimentación paralelo para controlar la espermatogénesis sin frenar totalmente la testosterona." },
        { q: "54. La proteína StAR es crítica en las etapas iniciales de TODA la síntesis de esteroides porque:", a: "C", opts: {A: "Rompe el núcleo celular.", B: "Degrada el cortisol sobrante.", C: "Facilita el transporte de colesterol desde el citosol al interior de la mitocondria, paso previo a su conversión en pregnenolona.", D: "Oxida la testosterona a estrógenos."}, exp: "StAR (Steroidogenic Acute Regulatory protein) mueve el colesterol insoluble a donde la enzima desmolasa puede actuar." },
        { q: "55. El sulfato de dehidroepiandrosterona (DHEAS) se produce en la zona reticular suprarrenal. ¿A qué grupo hormonal pertenece?", a: "B", opts: {A: "Mineralocorticoides.", B: "Andrógenos (C19).", C: "Glucocorticoides.", D: "Hormonas tiroideas."}, exp: "Es un andrógeno débil precursor de hormonas sexuales más potentes, usado a veces como suplemento de fertilidad." },
        { q: "56. La testosterona puede convertirse en un andrógeno aún más potente, la Dihidrotestosterona (DHT), en los tejidos periféricos. ¿Qué enzima cataliza este paso?", a: "C", opts: {A: "Aromatasa.", B: "21-alfa-hidroxilasa.", C: "5-alfa-reductasa.", D: "Aldosterona sintasa."}, exp: "Se ilustra en los esquemas (PDF) que la testosterona usa la 5-alfa-reductasa para formar DHT, esencial en piel y próstata." },
        { q: "57. El receptor de la hormona hipotalámica GnRH en la hipófisis funciona mediante proteína Gq. ¿Cuál es su segundo mensajero intracelular principal en la cascada?", a: "B", opts: {A: "Exclusivamente GMPc.", B: "Aumento del Calcio (Ca2+) intracelular y activación de PKC (Fosfolipasa C).", C: "Inhibición total del ATP.", D: "Destrucción de lisosomas."}, exp: "El receptor acoplado a Gq estimula la cascada de PLC, diacilglicerol, IP3 y entrada de calcio." },
        { q: "58. Respecto a la semivida (tiempo medio) de las gonadotropinas en plasma, ¿cómo se comparan LH y FSH?", a: "B", opts: {A: "Ambas duran semanas en el plasma.", B: "FSH dura unas 4 horas, mientras que LH tiene una vida media mucho más corta (aprox. 50 minutos).", C: "LH dura meses y FSH segundos.", D: "Se destruyen instantáneamente."}, exp: "La profesora detalló este dato; es una forma más del organismo de ajustar los pulsos y la regulación precisa." },
        { q: "59. Aparte de los ovarios, ¿en qué otro importante sistema del cuerpo se sintetizan estrógenos (estradiol), funcionando como \"esteroides neuroactivos\"?", a: "B", opts: {A: "Páncreas endocrino.", B: "Sistema Nervioso Central (cerebro).", C: "Timo.", D: "Bazo."}, exp: "El cerebro (sistema nervioso) posee la enzima aromatasa local para fabricar estrógenos que protegen y modulan rutas neuronales." },
        { q: "60. Como resumen global, si en una analítica vemos ACTH baja, Cortisol altísimo y atrofia de las glándulas suprarrenales, la causa primaria probable es:", a: "C", opts: {A: "Un tumor en la hipófisis secretor de ACTH.", B: "Enfermedad de Addison.", C: "Un tumor secretor directo en la glándula suprarrenal o administración farmacológica masiva (Cushing suprarrenal/iatrogénico).", D: "Deficiencia de 21-alfa-hidroxilasa."}, exp: "El cortisol alto bloquea la ACTH (retroalimentación negativa). Si el cortisol viene de una glándula enferma (tumor) o pastillas, la hipófisis se apaga y el resto de la glándula sana se atrofia por desuso." }
    ];

    let questions = [];
    let currentIdx = 0;
    let state = {};

    function initQuiz(random) {
        questions = [...rawQuestions];
        if (random) questions.sort(() => Math.random() - 0.5);
        
        state = {};
        questions.forEach((_, i) => {
            state[i] = { answered: false, selected: null, correct: false, marked: false };
        });

        renderSidebar();
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('question-screen').classList.add('active');
        showQuestion(0);
    }

    function renderSidebar() {
        const side = document.getElementById('sidebar');
        side.innerHTML = '';
        questions.forEach((_, i) => {
            const b = document.createElement('button');
            b.className = 'nav-btn';
            b.id = `nav-${i}`;
            b.innerText = i + 1;
            b.onclick = () => showQuestion(i);
            side.appendChild(b);
        });
    }

    function showQuestion(idx) {
        currentIdx = idx;
        const q = questions[idx];
        const s = state[idx];

        document.getElementById('q-title').innerText = `Pregunta ${idx + 1}`;
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('mark-tag').className = `mark-indicator ${s.marked ? 'visible' : ''}`;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        // Mezclado visual de opciones
        const keys = ['A', 'B', 'C', 'D'].sort(() => Math.random() - 0.5);
        
        keys.forEach(k => {
            const b = document.createElement('button');
            b.className = 'opt-btn';
            if (s.answered) {
                if (k === q.a) b.classList.add('correct');
                if (k === s.selected && k !== q.a) b.classList.add('wrong');
                b.disabled = true;
            }
            b.innerText = `${k}) ${q.opts[k]}`;
            b.onclick = () => checkAnswer(k);
            container.appendChild(b);
        });

        const exp = document.getElementById('explanation');
        exp.innerText = q.exp;
        exp.className = `explanation-box ${s.answered ? 'show' : ''}`;

        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`nav-${idx}`).classList.add('active');
        
        document.getElementById('prev-btn').disabled = idx === 0;
        document.getElementById('next-btn').disabled = idx === questions.length - 1;
    }

    function checkAnswer(k) {
        if (state[currentIdx].answered) return;
        state[currentIdx].answered = true;
        state[currentIdx].selected = k;
        state[currentIdx].correct = (k === questions[currentIdx].a);
        
        const nav = document.getElementById(`nav-${currentIdx}`);
        nav.classList.add(state[currentIdx].correct ? 'correct' : 'wrong');
        showQuestion(currentIdx);
    }

    function handleMark() {
        state[currentIdx].marked = !state[currentIdx].marked;
        document.getElementById(`nav-${currentIdx}`).classList.toggle('marked', state[currentIdx].marked);
        showQuestion(currentIdx);
    }

    function changeQuestion(n) {
        const next = currentIdx + n;
        if (next >= 0 && next < questions.length) showQuestion(next);
    }

    function showResults() {
        document.getElementById('question-screen').classList.remove('active');
        document.getElementById('results-screen').classList.add('active');
        
        const correct = Object.values(state).filter(s => s.correct).length;
        document.getElementById('score-display').innerHTML = `Resultado: <b>${correct} / ${questions.length}</b><br><small>${((correct/questions.length)*10).toFixed(2)} / 10</small>`;
    }

    function retry(type) {
        let subset = [];
        const oldQs = [...questions];
        const oldState = {...state};

        oldQs.forEach((q, i) => {
            const isFailed = oldState[i].answered && !oldState[i].correct;
            const isMarked = oldState[i].marked;

            if (type === 'failed' && isFailed) subset.push(q);
            else if (type === 'marked' && isMarked) subset.push(q);
            else if (type === 'both' && (isFailed || isMarked)) subset.push(q);
        });

        if (subset.length === 0) {
            alert("No hay preguntas en esta selección.");
            return;
        }

        questions = subset;
        state = {};
        questions.forEach((_, i) => {
            state[i] = { answered: false, selected: null, correct: false, marked: false };
        });

        renderSidebar();
        document.getElementById('results-screen').classList.remove('active');
        document.getElementById('question-screen').classList.add('active');
        showQuestion(0);
    }
</script>
