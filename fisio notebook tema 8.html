    <script>
        // Datos crudos literales
        const rawText = `Bloque 1: Generalidades de la Comunicación por Contacto y Matriz Extracelular
1. La señalización yuxtacrina o por contacto se caracteriza fundamentalmente por:
A) La liberación de neurotransmisores a la hendidura sináptica.
B) Requerir el contacto directo entre los receptores de una célula con otra célula o con la matriz extracelular.
C) La secreción de hormonas a la circulación sistémica.
D) La difusión de gases como el óxido nítrico a través de las membranas.Respuesta correcta: B
2. Las moléculas encargadas de mediar la comunicación por contacto y ensamblar los tejidos se denominan de forma genérica:
A) Segundos mensajeros intracelulares.
B) Moléculas de Adhesión Celular (MAC o CAM).
C) Factores de transcripción.
D) Proteínas G heterotriméricas.Respuesta correcta: B
3. El profesor hace mucho hincapié en una EXCEPCIÓN. La inmensa mayoría de las MAC actúan como receptores activando vías de señalización, EXCEPTO:
A) Las Cadherinas y las Selectinas.
B) Las Integrinas y la superfamilia de las Inmunoglobulinas.
C) Las Claudinas y las Ocludinas.
D) Las Conexinas.Respuesta correcta: C (El profesor insiste: "tienen una función básicamente estructural, no son capaces de desarrollar ningún tipo de respuesta celular/señalización").
4. ¿Cuál de las siguientes NO es una función típica de las Moléculas de Adhesión Celular (MAC)?
A) Mantenimiento de la morfología celular y la arquitectura tisular.
B) Regulación de la migración y orientación celular.
C) Supervivencia y proliferación celular.
D) Síntesis directa de ATP en la mitocondria.Respuesta correcta: D
5. Histológicamente, ¿qué diferencia principal observa el profesor entre un epitelio y un tejido conectivo en relación a la comunicación por contacto?
A) El epitelio no tiene células, solo matriz.
B) El epitelio tiene células muy compactas interaccionando entre sí con muy poca matriz extracelular, mientras que en el conectivo hay pocas células inmersas en mucha matriz.
C) El tejido conectivo no posee matriz extracelular (MEC).
D) En el epitelio las células no interaccionan entre sí.Respuesta correcta: B
6. La Matriz Extracelular (MEC) se considera un complejo dinámico. ¿Cuáles son sus principales componentes moleculares según la clase?
A) Fosfolípidos de membrana y colesterol.
B) Proteoglicanos, colágenos y otras proteínas estructurales como fibronectina, laminina y elastina.
C) Exclusivamente agua y sales minerales.
D) Cadenas de ácidos nucleicos libres.Respuesta correcta: B
7. El profesor muestra un experimento con una glándula salival en desarrollo. ¿Qué ocurre si se añaden anticuerpos anti-fibronectina para bloquear esta proteína de la MEC?
A) La glándula prolifera formando un tumor maligno.
B) Se pierde la morfogénesis y la glándula pierde su carácter lobular tridimensional típico.
C) Las células se fusionan formando un sincitio.
D) No ocurre absolutamente nada, la MEC es estática.Respuesta correcta: B
8. En una célula epitelial polarizada, la región de la célula que está adherida a la lámina basal define su:
A) Zona apical.
B) Zona lateral.
C) Zona basal.
D) Zona nuclear.Respuesta correcta: C
9. Los dominios citosólicos de las MACs, para poder llevar a cabo la señalización o el anclaje físico, necesitan fundamentalmente:
A) Atravesar la membrana plasmática hacia el exterior.
B) Reclutar proteínas adaptadoras que conectan directa o indirectamente con el citoesqueleto.
C) Fusionarse con el núcleo.
D) Romper la molécula de ATP de forma autónoma.Respuesta correcta: B
10. Las MACs regulan la supervivencia celular. Si una célula epitelial normal pierde su contacto con la matriz extracelular o con las células vecinas, lo más probable es que:
A) Se vuelva inmortal.
B) Entre en un estado de apoptosis (muerte celular) al perder la señalización de supervivencia.
C) Comience a fagocitar.
D) Se transforme en neurona.Respuesta correcta: B (Mencionado al explicar la importancia para la supervivencia).

Bloque 2: Tipos de Interacción (Homofílica vs. Heterofílica)
11. ¿Cómo se define una interacción HOMOFÍLICA en la comunicación por contacto?
A) La interacción entre una célula y una fibra de colágeno.
B) La interacción entre moléculas de adhesión celular (MACs) de la MISMA clase ubicadas en dos células distintas.
C) La interacción entre una integrina y una selectina.
D) La unión de un ligando soluble a un receptor.Respuesta correcta: B
12. ¿Qué familia de receptores es un ejemplo clásico de interacción HOMOFÍLICA?
A) Integrinas.
B) Selectinas.
C) Cadherinas (ej. Cadherina E de la célula 1 con Cadherina E de la célula 2).
D) Receptores muscarínicos.Respuesta correcta: C
13. Por el contrario, la interacción HETEROFÍLICA se produce cuando:
A) Interactúan moléculas de adhesión de distintas clases (ej. Integrina con Fibronectina, o Selectina con un carbohidrato).
B) Interactúan dos receptores idénticos de la misma célula.
C) Las células evitan el contacto entre sí.
D) Un macrófago fagocita a una bacteria.Respuesta correcta: A
14. Según las indicaciones del profesor en clase, en términos de estabilidad física, las interacciones homofílicas suelen ser:
A) Muy débiles y efímeras.
B) Mucho más fuertes y estables que las interacciones heterofílicas.
C) Idénticas en fuerza a las heterofílicas.
D) Inexistentes in vivo.Respuesta correcta: B
15. ¿Cuál de las siguientes es un ejemplo de interacción heterofílica?
A) P-Selectina de una célula uniéndose a una Glicoproteína de otra célula.
B) NCAM uniéndose a otra NCAM.
C) E-cadherina uniéndose a otra E-cadherina.
D) Unión de dos conexones homéricos.Respuesta correcta: A

Bloque 3: Claudinas y Ocludinas (Uniones Estrechas)
16. ¿Qué tipo de unión celular está formada fundamentalmente por Claudinas y Ocludinas (junto con JAM)?
A) Uniones adherentes (cinturones).
B) Desmosomas.
C) Uniones GAP (comunicantes).
D) Uniones estrechas (Tight junctions).Respuesta correcta: D
17. (PREGUNTA DE EXAMEN enfatizada) ¿Qué característica funcional diferencia a las claudinas y ocludinas del resto de MACs?
A) Son las únicas dependientes de calcio.
B) Son las únicas que NO actúan como receptores señalizadores (no inician cascadas de respuesta), teniendo una función puramente estructural/de barrera.
C) Son las únicas que realizan transcitosis.
D) Se expresan exclusivamente en el cerebro.Respuesta correcta: B
18. La función fisiológica principal de las uniones estrechas en un epitelio es:
A) Mantener los citoplasmas de las células conectados.
B) Anclar la célula a la lámina basal.
C) Sellar el espacio entre células, constituyendo una barrera que permite un paso muy selectivo de sustancias.
D) Permitir el rodamiento de los leucocitos.Respuesta correcta: C
19. El paso de agua y moléculas de tamaño muy pequeño a través del espacio existente entre las células epiteliales (filtrándose por la unión estrecha) se denomina:
A) Transporte transcelular.
B) Transporte paracelular.
C) Exocitosis.
D) Transporte activo primario.Respuesta correcta: B
20. Además del sellado, las uniones estrechas contribuyen a la POLARIDAD celular celular porque:
A) Producen un gradiente eléctrico de 100 mV.
B) Impiden que las proteínas de membrana insertadas en la zona apical se desplacen libremente hacia la zona basolateral y viceversa.
C) Mueven el núcleo hacia la base.
D) Repelen las moléculas de glucosa.Respuesta correcta: B
21. El transporte de glucosa desde la luz intestinal hasta la sangre es un claro ejemplo de transporte:
A) Transcelular (atravesando el interior de la célula epitelial polarizada).
B) Paracelular (pasando por medio de las claudinas).
C) Homofílico.
D) A través de uniones GAP.Respuesta correcta: A (El profesor recalca que al ser una molécula grande, la glucosa no pasa por la unión estrecha, requiere transportadores apicales y basales).
22. Clínicamente, el profesor menciona una patología asociada al daño en la zona apical y pérdida de la integridad de las uniones estrechas en el intestino (por disbiosis o estrés). ¿Cómo se denomina?
A) Síndrome del intestino permeable.
B) Infarto de miocardio.
C) Úlcera péptica.
D) Diabetes tipo 1.Respuesta correcta: A (Permite la entrada indiscriminada de bacterias y sustancias, causando inflamación/autoinmunidad).
23. ¿Qué otra estructura crítica del cuerpo humano depende fundamentalmente del sellado de las uniones estrechas y cuyo daño (ej. en isquemia o trauma) se menciona en clase?
A) La válvula mitral.
B) La barrera hematoencefálica.
C) El cartílago hialino.
D) El cristalino del ojo.Respuesta correcta: B (Su rotura permite el paso de eritrocitos y toxinas al parénquima cerebral).
24. Proteína adaptadora intracelular que ancla las Claudinas y Ocludinas a los filamentos de actina del citoesqueleto:
A) Beta-catenina.
B) Plectina.
C) ZO (ej. ZO-1, ZO-2).
D) Talina.Respuesta correcta: C (Mostrado en los esquemas de las diapositivas para uniones estrechas).
25. Si una toxina destruyera selectivamente las Claudinas de un epitelio, el efecto inmediato sería:
A) La célula se soltaría de la lámina basal.
B) Se perdería la permeabilidad selectiva paracelular, rompiendo la función de barrera.
C) Las células no podrían contraerse.
D) Se bloquearían las sinapsis eléctricas.Respuesta correcta: B

Bloque 4: Conexinas (Uniones GAP)
26. La estructura que pone en contacto directo el citoplasma de una célula con el de la célula adyacente se forma por:
A) Seis moléculas de conexina que se agrupan formando un poro llamado Conexón.
B) Una malla densa de colágeno.
C) Cadenas de cadherinas dependientes de calcio.
D) Selectinas y glúcidos.Respuesta correcta: A
27. La principal función de las uniones comunicantes o GAP es:
A) El anclaje rígido al citoesqueleto.
B) Evitar el paso de agua entre células.
C) Permitir el paso de iones y pequeñas moléculas señalizadoras (como Ca2+ o AMPc) para coordinar las células.
D) Fagocitar patógenos.Respuesta correcta: C
28. Cuando un grupo de células, como las del músculo cardíaco, están conectadas profusamente por conexinas, actúan de forma coordinada (ej. contrayéndose al mismo tiempo). Esto recibe el nombre de:
A) Sincitio (o sincitio funcional).
B) Tumor benigno.
C) Barrera tisular.
D) Tejido conectivo laxo.Respuesta correcta: A
29. En el sistema nervioso, las conexinas son la base estructural de un tipo particular de transmisión de señales. ¿Cuál?
A) Sinapsis química.
B) Sinapsis eléctrica.
C) Transmisión endocrina.
D) Transporte axonal rápido.Respuesta correcta: B
30. El poro hidrofílico formado por los conexones (unión GAP) es estático y siempre permanece abierto.
A) Verdadero, no posee ningún mecanismo de regulación.
B) Falso, la apertura o cierre del poro se regula por factores como la concentración de Calcio, el pH o la presencia de moléculas como la dopamina.
C) Falso, se destruye tras un solo uso.
D) Verdadero, solo el frío puede cerrarlo.Respuesta correcta: B
31. En el laboratorio, el acoplamiento funcional de las células a través de uniones GAP se puede demostrar mediante:
A) Tinción de Gram.
B) Inyección intracelular de una sustancia fluorescente hidrosoluble (que pasa a la célula vecina) o por acoplamiento eléctrico.
C) Anticuerpos contra la fibronectina.
D) Centrifugación de las células.Respuesta correcta: B
32. Tamaño aproximado del canal hidrofílico formado en las uniones GAP:
A) 100 micrómetros.
B) 2 - 4 nanómetros (muy pequeño, solo iones y segundos mensajeros).
C) 1 milímetro.
D) Permite el paso de orgánulos enteros.Respuesta correcta: B (Mostrado en la figura de las diapositivas).

Bloque 5: Cadherinas y Transición Epitelio-Mesénquima
33. Las Cadherinas son un grupo de moléculas de adhesión que requieren obligatoriamente de un catión para ser funcionales y mantener su estructura rígida. ¿De cuál se trata?
A) Sodio ($Na^+$).
B) Potasio ($K^+$).
C) Magnesio ($Mg^{2+}$).
D) Calcio ($Ca^{2+}$).Respuesta correcta: D
34. ¿Qué dos estructuras de anclaje intercelular están formadas clásicamente por Cadherinas?
A) Uniones estrechas y uniones GAP.
B) Uniones adherentes (cinturón de adhesión) y Desmosomas.
C) Hemidesmosomas y contactos focales.
D) Sinapsis eléctricas.Respuesta correcta: B
35. En las uniones adherentes, el dominio intracelular de la Cadherina se une a los filamentos de actina del citoesqueleto. Esta unión NO es directa, requiere proteínas adaptadoras llamadas:
A) Clatrinas.
B) Cateninas (ej. $\\alpha$-catenina, $\\beta$-catenina, p120).
C) Conexinas.
D) Tubulinas.Respuesta correcta: B
36. Mientras que en las uniones adherentes las cadherinas se anclan a microfilamentos de actina, en los DESMOSOMAS (que actúan como fuertes "remaches" puntuales) se anclan a:
A) Miosina.
B) Microtúbulos.
C) Filamentos intermedios (ej. queratina).
D) Colágeno.Respuesta correcta: C
37. El profesor destaca que la fuerza de la unión mediada por Cadherinas es:
A) Extremadamente débil, ideal para el rodamiento rápido.
B) Muy fuerte, fundamental para la cohesión estructural del tejido y soportar fuerzas de tracción mecánica.
C) Inexistente en humanos.
D) Temporal y dura solo unos segundos.Respuesta correcta: B
38. La Cadherina "clásica" presente en las células epiteliales que mantiene su arquitectura y polaridad es la:
A) N-Cadherina.
B) P-Cadherina.
C) VE-Cadherina.
D) E-Cadherina.Respuesta correcta: D
39. (PREGUNTA DE EXAMEN enfatizada) ¿Cómo se denomina el proceso por el cual las células epiteliales pierden su adherencia (pérdida de E-Cadherina), cambian su morfología y ganan capacidad migratoria e invasiva?
A) Apoptosis programada.
B) Transición Epitelio-Mesénquima (EMT).
C) Transición endotelial masiva.
D) Sincitio celular.Respuesta correcta: B
40. En el contexto de la oncología y la fisiopatología, la Transición Epitelio-Mesénquima (EMT) es un evento celular crítico porque:
A) Destruye inmediatamente el tumor primario.
B) Facilita que las células tumorales se separen del tejido epitelial originario, invadan otros tejidos y provoquen METÁSTASIS.
C) Convierte las células epiteliales en células óseas.
D) Aumenta la secreción de insulina.Respuesta correcta: B
41. Durante la remodelación de un tejido (ej. cicatrización o desarrollo embrionario), las células pueden intercambiar la expresión de E-Cadherina por N-Cadherina. ¿Qué permite esto fisiológicamente?
A) Que las células mueran de forma ordenada.
B) Que el tejido reduzca su cohesión rígida temporalmente, permitiendo que las células se muevan o se reorganicen.
C) Que las células se fijen permanentemente como hueso.
D) Que la barrera hematoencefálica se cierre.Respuesta correcta: B
42. Las interacciones mediadas por Cadherinas entre dos células epiteliales adyacentes son de tipo:
A) Heterofílico exclusivo.
B) Homofílico.
C) Enzimático catalítico.
D) Endocitosis de receptor.Respuesta correcta: B
43. A nivel de señalización intracelular, cuando se rompen las uniones adherentes, proteínas adaptadoras como la $\\beta$-catenina pueden soltarse, viajar al núcleo y:
A) Inducir la muerte celular inmediata.
B) Actuar junto con factores de transcripción (ej. TCF) para regular la expresión génica (ej. favoreciendo la proliferación celular).
C) Sintetizar directamente ATP.
D) Generar nuevos filamentos de actina.Respuesta correcta: B (Mostrado en los esquemas moleculares avanzados de la clase).

Bloque 6: Integrinas (Adhesión Célula-Matriz)
44. Las Integrinas son proteínas de adhesión transmembrana encargadas primordialmente de conectar la célula con:
A) Los conexones de células vecinas.
B) Las proteínas de la Matriz Extracelular (MEC) como la fibronectina o laminina.
C) Exclusivamente carbohidratos circulantes libres.
D) El líquido cefalorraquídeo.Respuesta correcta: B
45. ¿Qué dos estructuras de anclaje mediadas por Integrinas existen en la base de las células?
A) Desmosomas y Uniones GAP.
B) Uniones estrechas y adherentes.
C) Hemidesmosomas (anclados a filamentos intermedios) y Contactos focales / Adhesiones focales (anclados a actina).
D) Microvellosidades y cilios.Respuesta correcta: C
46. El profesor utiliza una analogía muy específica para describir la fuerza de unión de los receptores tipo Integrina: "Actúan como receptores de baja afinidad". ¿Cuál es el símil?
A) Como un imán superconductor.
B) Como un candado de titanio.
C) Como un Velcro (individualmente la unión es débil, pero agrupadas en gran número forman una unión muy fuerte).
D) Como un pegamento irreversible.Respuesta correcta: C (Clave en el audio y apuntes para entender su papel dinámico).
47. ¿Por qué es fisiológicamente ventajoso que las integrinas individuales tengan una unión relativamente débil ("efecto velcro")?
A) Porque así la célula se puede morir fácilmente.

C) Porque no hay suficiente ATP para uniones fuertes.
D) Porque el colágeno es muy quebradizo.Respuesta correcta: B
48. Se dice que las Integrinas tienen una "influencia recíproca" o señalización bidireccional (Outside-In / Inside-Out). Esto significa que:
A) Solo envían señales de la matriz al núcleo, pero la célula no puede modificarlas.

C) Excretan fibronectina al interior celular.
D) Transportan iones de sodio en ambas direcciones.Respuesta correcta: B
49. Cuando una célula nueva (ej. tras una división o reparación) llega a un tejido para incorporarse, ¿quién le transmite las señales posicionales para que adopte la forma e integridad adecuada del tejido?

C) Las Selectinas sanguíneas.
D) Las Ocludinas apicales.Respuesta correcta: B
50. Existe un tipo de integrina específica en los Leucocitos ($\\alpha_L\\beta_2$ o LFA-1) que en lugar de unirse a la MEC, se une fuertemente a ligandos presentes en:
A) El hueso.
B) Las plaquetas.
C) Células endoteliales (interacción célula-célula heterofílica durante la inflamación).
D) El músculo liso bronquial.Respuesta correcta: C (Es una excepción importante donde la integrina hace adhesión célula-célula, vital para la extravasación).
51. Las plaquetas expresan una integrina muy importante ($\\alpha_{IIb}\\beta_3$) responsable de su agregación al unirse fundamentalmente a:
A) Insulina.
B) Fibrinógeno.
C) Albúmina.
D) Glucosa.Respuesta correcta: B (Reflejado en la tabla de distribución de integrinas de las diapositivas).
52. En un tejido epitelial sano, las integrinas están ubicadas diferencialmente, marcando la polaridad de la célula. Se concentran principalmente en:
A) La membrana apical, en contacto con la luz.
B) La membrana lateral, contactando con otras células epiteliales.
C) La membrana basal, anclando la célula a la lámina basal.
D) Alrededor del núcleo celular.Respuesta correcta: C

53. Estructuralmente, el dominio funcional extracelular característico de las Selectinas es un dominio:

54. Al igual que las Cadherinas, las Selectinas requieren un ion para funcionar y mediar la adhesión. ¿Cuál es?

56. En el proceso completo de salida del leucocito desde la sangre al tejido inflamado (Extravasación leucocitaria), el profesor describe dos fases claras mediadas por distintos receptores. La fase inicial de rodamiento (unión débil) depende de las ________, y la fase posterior de parada y adhesión firme (unión fuerte) depende de las ________.

57. De las clases de selectinas, ¿cuál se encuentra almacenada y es expuesta rápidamente en la superficie de las células del ENDOTELIO activado (y plaquetas) en respuesta a un daño o inflamación?

        let allQuestions = [];
        let currentQuestions = [];
        let userState = {}; 

        // Procesar y parsear los datos crudos
        function initData() {
            let cleanText = rawText.replace(/Bloque \d+:.*?\n/g, '');
            const blocks = cleanText.split(/\n(?=\d+\.\s)/);

            blocks.forEach(block => {
                block = block.trim();
                if (!block) return;

                const match = block.match(/^(\d+)\.\s*(.*?)\s+A\)\s*(.*?)\s+B\)\s*(.*?)\s+C\)\s*(.*?)\s+D\)\s*(.*?)\s*Respuesta correcta:\s*([A-D])(.*)/is);
                
                if (match) {
                    let id = parseInt(match[1]);
                    
                    // Extraer explicación adicional si la hay
                    let expText = match[8] ? match[8].trim() : "";
                    if (expText.startsWith("(")) expText = expText.substring(1).trim();
                    if (expText.endsWith(")")) expText = expText.substring(0, expText.length - 1).trim();
                    
                    if (!expText) {
                        expText = `La opción correcta es la ${match[7].toUpperCase()}.`;
                    } else {
                        expText = `<strong>La opción correcta es la ${match[7].toUpperCase()}:</strong> ${expText}`;
                    }

                    // Inserción de diagramas estratégicos para facilitar el repaso anatómico/celular
                    if (id === 2) {
                        expText += "<br><br>";
                    }
                    if (id === 6) {
                        expText += "<br><br>";
                    }
                    if (id === 18) {
                        expText += "<br><br>";
                    }
                    if (id === 26) {
                        expText += "<br><br>";
                    }
                    if (id === 36) {
                        expText += "<br><br>";
                    }
                    if (id === 45) {
                        expText += "<br><br>";
                    }
                    if (id === 56) {
                        expText += "<br><br>";
                    }

                    allQuestions.push({
                        originalId: id,
                        q: match[2].trim(),
                        options: [
                            { text: match[3].trim(), correct: match[7].toUpperCase() === 'A', originalLetter: 'A' },
                            { text: match[4].trim(), correct: match[7].toUpperCase() === 'B', originalLetter: 'B' },
                            { text: match[5].trim(), correct: match[7].toUpperCase() === 'C', originalLetter: 'C' },
                            { text: match[6].trim(), correct: match[7].toUpperCase() === 'D', originalLetter: 'D' }
                        ],
                        exp: expText
                    });
                    userState[id] = { answered: false, failed: false, marked: false };
                }
            });
        }

        // Algoritmo de Fisher-Yates para mezclar arrays
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function startQuiz(mode, isRandom) {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('end-screen').style.display = 'none';
            document.getElementById('finish-btn-container').style.display = 'block';

            let pool = [];
            if (mode === 'all') {
                pool = [...allQuestions];
            } else if (mode === 'failed') {
                pool = allQuestions.filter(q => userState[q.originalId].failed);
            } else if (mode === 'marked') {
                pool = allQuestions.filter(q => userState[q.originalId].marked);
            } else if (mode === 'both') {
                pool = allQuestions.filter(q => userState[q.originalId].failed || userState[q.originalId].marked);
            }

            if (isRandom) {
                shuffleArray(pool);
            }

            currentQuestions = pool;

            // Resetear estado de "respondido" y mezclar opciones para esta sesión
            currentQuestions.forEach(q => {
                userState[q.originalId].answered = false;
                userState[q.originalId].failed = false; 
                shuffleArray(q.options);
            });

            renderUI();
            
            // Scrollear arriba
            document.getElementById('main-content').scrollTop = 0;
        }

        function renderUI() {
            const indexContainer = document.getElementById('index-container');
            const questionsContainer = document.getElementById('questions-container');
            
            indexContainer.innerHTML = '';
            questionsContainer.innerHTML = '';

            if (currentQuestions.length === 0) {
                questionsContainer.innerHTML = '<h2>No hay preguntas en esta categoría.</h2>';
                return;
            }

            currentQuestions.forEach((q, displayIndex) => {
                let id = q.originalId;
                let isMarked = userState[id].marked;
                
                // Botón del índice
                const idxBtn = document.createElement('button');
                idxBtn.className = `index-btn ${isMarked ? 'is-marked' : ''}`;
                idxBtn.id = `idx-btn-${id}`;
                idxBtn.innerHTML = `Pregunta ${id} <span class="mark-indicator">★</span>`;
                idxBtn.onclick = () => document.getElementById(`q-container-${id}`).scrollIntoView({ behavior: 'smooth' });
                indexContainer.appendChild(idxBtn);

                // Contenedor de la pregunta
                const qDiv = document.createElement('div');
                qDiv.className = 'question-container';
                qDiv.id = `q-container-${id}`;

                // Header (Texto + Botón Marcar)
                const headerDiv = document.createElement('div');
                headerDiv.className = 'question-header';
                
                const qText = document.createElement('h3');
                qText.className = 'question-text';
                qText.textContent = `${id}. ${q.q}`;
                
                const markBtn = document.createElement('button');
                markBtn.className = `mark-btn ${isMarked ? 'marked' : ''}`;
                markBtn.id = `mark-btn-${id}`;
                markBtn.innerHTML = isMarked ? '★ Marcada' : '☆ Marcar';
                markBtn.onclick = () => toggleMark(id);

                headerDiv.appendChild(qText);
                headerDiv.appendChild(markBtn);
                qDiv.appendChild(headerDiv);

                // Opciones
                const optsDiv = document.createElement('div');
                optsDiv.className = 'options-list';
                
                q.options.forEach((opt, optIndex) => {
                    const optBtn = document.createElement('button');
                    optBtn.className = 'option-btn';
                    optBtn.id = `opt-${id}-${optIndex}`;
                    optBtn.textContent = opt.text;
                    optBtn.onclick = () => handleAnswer(id, optIndex, opt.correct);
                    optsDiv.appendChild(optBtn);
                });
                qDiv.appendChild(optsDiv);

                // Explicación (oculta inicialmente)
                const expDiv = document.createElement('div');
                expDiv.className = 'explanation';
                expDiv.id = `exp-${id}`;
                expDiv.innerHTML = q.exp;
                qDiv.appendChild(expDiv);

                questionsContainer.appendChild(qDiv);
            });
        }

        function handleAnswer(qId, optIndex, isCorrect) {
            if (userState[qId].answered) return; 

            userState[qId].answered = true;
            userState[qId].failed = !isCorrect;

            // Actualizar interfaz del índice
            const idxBtn = document.getElementById(`idx-btn-${qId}`);
            idxBtn.classList.add(isCorrect ? 'correct' : 'incorrect');

            // Encontrar la pregunta actual para ver las opciones
            const question = currentQuestions.find(q => q.originalId === qId);

            // Actualizar botones de opciones
            question.options.forEach((opt, i) => {
                const btn = document.getElementById(`opt-${qId}-${i}`);
                btn.disabled = true; 
                if (opt.correct) {
                    btn.classList.add('correct');
                } else if (i === optIndex && !isCorrect) {
                    btn.classList.add('incorrect');
                }
            });

            // Mostrar explicación
            document.getElementById(`exp-${qId}`).style.display = 'block';
        }

        function toggleMark(qId) {
            userState[qId].marked = !userState[qId].marked;
            const isMarked = userState[qId].marked;
            
            const markBtn = document.getElementById(`mark-btn-${qId}`);
            markBtn.classList.toggle('marked', isMarked);
            markBtn.innerHTML = isMarked ? '★ Marcada' : '☆ Marcar';

            const idxBtn = document.getElementById(`idx-btn-${qId}`);
            idxBtn.classList.toggle('is-marked', isMarked);
        }

        function finishQuiz() {
            let correctCount = 0;
            let failedCount = 0;
            let unanweredCount = 0;

            currentQuestions.forEach(q => {
                if (!userState[q.originalId].answered) {
                    unanweredCount++;
                } else if (userState[q.originalId].failed) {
                    failedCount++;
                } else {
                    correctCount++;
                }
            });

            const total = currentQuestions.length;
            const resText = document.getElementById('results-text');
            resText.innerHTML = `Aciertos: <span style="color:#2ecc71">${correctCount}</span> | 
                                 Fallos: <span style="color:#e74c3c">${failedCount}</span> | 
                                 Sin responder: <span style="color:#f39c12">${unanweredCount}</span><br>
                                 Total en esta sesión: ${total}`;

            // Habilitar/Deshabilitar botones de repetición
            const totalMarked = Object.values(userState).filter(st => st.marked).length;
            const totalFailed = Object.values(userState).filter(st => st.failed).length;

            document.getElementById('btn-retry-failed').disabled = totalFailed === 0;
            document.getElementById('btn-retry-marked').disabled = totalMarked === 0;
            document.getElementById('btn-retry-both').disabled = (totalFailed === 0 && totalMarked === 0);

            document.getElementById('end-screen').style.display = 'flex';
        }

        // Inicializar datos al cargar
        window.onload = () => {
            initData();
        };

    </script>
