<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Anatomía Urinaria y Reproductora</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #2980b9;
            --success: #27ae60;
            --error: #e74c3c;
            --mark: #f1c40f;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
        }

        /* Barra Lateral con Índice 3 Columnas */
        #sidebar {
            width: 320px;
            height: 100vh;
            background: var(--primary);
            color: white;
            position: fixed;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            border-right: 4px solid var(--accent);
        }

        #sidebar h2 { font-size: 1.1rem; text-align: center; color: #ecf0f1; margin-bottom: 20px; }

        .grid-indices {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .index-btn {
            background: var(--secondary);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 8px 2px;
            cursor: pointer;
            text-align: center;
            border-radius: 4px;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .index-btn:hover { background: var(--accent); }
        .index-btn.answered { border-bottom: 3px solid var(--success); }
        .index-btn.marked { background: var(--mark) !important; color: black; font-weight: bold; }

        .finish-btn {
            margin-top: 20px;
            background: var(--error);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Área de Contenido Principal */
        #main-content {
            margin-left: 320px;
            padding: 40px;
            width: 100%;
            max-width: 900px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            border-left: 5px solid #ddd;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .mark-tab {
            background: #eee;
            border: 1px solid #ccc;
            padding: 5px 10px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .mark-tab.active { background: var(--mark); border-color: #d4ac0d; font-weight: bold; }

        .option-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #f0f0f0;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-size: 0.95rem;
            transition: 0.2s;
        }

        .option-btn:hover:not(:disabled) { border-color: var(--accent); background: #f7fbff; }

        .correct { background-color: #d4edda !important; border-color: var(--success) !important; color: #155724; font-weight: bold; }
        .incorrect { background-color: #f8d7da !important; border-color: var(--error) !important; color: #721c24; }

        .explanation {
            margin-top: 15px;
            padding: 15px;
            background: #e3f2fd;
            border-left: 5px solid #2196f3;
            display: none;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        /* Pantallas de Control */
        .modal-screen {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: auto;
        }

        .btn-start {
            background: var(--success);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            margin: 10px;
        }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }

        .btn-retry {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>ÍNDICE DE PREGUNTAS</h2>
    <div class="grid-indices" id="nav-grid"></div>
    <button class="finish-btn" onclick="showResults()">FINALIZAR Y CORREGIR</button>
</div>

<div id="main-content">
    <div id="setup-screen" class="modal-screen">
        <h1>Anatomía Clínica y Embriología</h1>
        <p>Sistema Urinario y Genital</p>
        <p>Selecciona el modo de inicio:</p>
        <button class="btn-start" onclick="startQuiz(false)">Orden Preestablecido</button>
        <button class="btn-start" onclick="startQuiz(true)" style="background: var(--accent);">Mezclar Preguntas</button>
    </div>

    <div id="quiz-area" style="display:none;"></div>

    <div id="result-screen" class="modal-screen" style="display:none;">
        <h2>Test Finalizado</h2>
        <h1 id="score-display" style="font-size: 3.5rem; margin: 10px 0; color: var(--accent);">0%</h1>
        <p id="stats-text"></p>
        <hr>
        <h3>Opciones de Repetición:</h3>
        <div class="results-grid">
            <button class="btn-retry" onclick="retry('all')">Repetir Completo</button>
            <button class="btn-retry" onclick="retry('failed')">Repetir solo Falladas</button>
            <button class="btn-retry" onclick="retry('marked')">Repetir solo Marcadas</button>
            <button class="btn-retry" onclick="retry('failed-marked')">Falladas + Marcadas</button>
        </div>
    </div>
</div>

<script>
    const database = [
        { q: "Topográficamente, debido a la presión asimétrica de las vísceras abdominales, los riñones se sitúan a distinta altura. Si observamos la proyección costal en el dorso de un paciente:", options: ["Ambos riñones se proyectan simétricamente sobre la costilla XII.", "El riñón izquierdo se proyecta sobre la costilla XI y el derecho sobre la costilla XII.", "El riñón derecho es más craneal y se proyecta en la costilla X.", "Se sitúan por debajo del reborde costal en la fosa ilíaca."], correct: 1, exp: "El hígado empuja al riñón derecho hacia abajo (hasta la costilla 12), mientras el izquierdo llega más alto (costilla 11)." },
        { q: "Durante la exploración clínica, el profesor indica que los polos inferiores de los riñones pueden hacerse más accesibles a la palpación/percusión si pedimos al paciente que:", options: ["Realice una espiración forzada máxima.", "Flexione el tronco ventralmente.", "Realice una inspiración profunda, para que el diafragma descienda y empuje los riñones caudalmente.", "Se coloque en decúbito lateral derecho puro."], correct: 2, exp: "El músculo diafragma al contraerse (inspiración) empuja la masa visceral y los riñones hacia abajo." },
        { q: "En la cara anterior del riñón derecho, encontramos una relación muy estrecha con el hígado. Entre ambas vísceras se crea una reflexión del peritoneo que delimita un importante espacio de acúmulo de líquidos (receso). ¿Cómo se denomina?", options: ["Fondo de saco de Douglas.", "Transcavidad de los epiplones.", "Espacio de Retzius.", "Receso hepatorrenal (o de Morison)."], correct: 3, exp: "Es el espacio de declive supramesocólico derecho entre el hígado y el riñón derecho, muy medible en ecografía." },
        { q: "Por el contrario, la cara anterior del riñón izquierdo se relaciona con la cara posterior del estómago. ¿Qué espacio o bolsa peritoneal queda interpuesta entre ambas estructuras?", options: ["El receso subfrénico izquierdo.", "La bolsa omental (transcavidad de los epiplones).", "La fosa ovárica.", "El canal parietocólico."], correct: 1, exp: "El estómago y el riñón izquierdo están separados por la bolsa omental (transcavidad de los epiplones)." },
        { q: "Además del estómago, la cara anterior del riñón izquierdo es cruzada transversalmente por otra víscera retroperitoneal endocrino/exocrina. ¿Cuál es?", options: ["La porción descendente del duodeno.", "El colon ascendente.", "El cuerpo y la cola del páncreas.", "La vesícula biliar."], correct: 2, exp: "El páncreas discurre transversalmente sobre el riñón izquierdo buscando el hilio del bazo." },
        { q: "El riñón está mantenido en su posición retroperitoneal por un sistema de fijación pasivo. Si un paciente sufre una caquexia severa (pérdida masiva de peso), el riñón puede 'caer' (ptosis renal). ¿Qué elemento de sostén se ha consumido?", options: ["La arteria renal.", "La fascia de Toldt.", "La cápsula adiposa (grasa perirrenal).", "El músculo psoas ilíaco."], correct: 2, exp: "La cápsula adiposa es el cojín de grasa que separa el riñón de la fascia renal y lo mantiene a su altura." },
        { q: "Radiológicamente, el profesor insiste en un truco para distinguir un riñón ptósico (caído) de un riñón ectópico (que nunca ascendió en el embrión). ¿Cuál es la clave?", options: ["El riñón ectópico no tiene uréter.", "En la ectopia, la arteria renal nace baja de la aorta; en la ptosis, la arteria nace en su lugar normal (L1-L2) y se ve elongada/estirada hacia abajo.", "El riñón ptósico no filtra orina.", "La ectopia afecta siempre a ambos riñones."], correct: 1, exp: "Como el ectópico no subió, 'cogió' un vaso inferior. El ptósico subió, se vascularizó arriba, y al caer estira su arteria." },
        { q: "En la cara posterior de ambos riñones, estos descansan sobre el lecho muscular de la pared abdominal posterior. ¿Cuáles son los dos músculos principales de apoyo?", options: ["Recto del abdomen y oblicuo externo.", "Músculo Cuadrado lumbar y Músculo Psoas ilíaco.", "Dorsal ancho y Trapecio.", "Transverso del abdomen y elevador del ano."], correct: 1, exp: "Los riñones se apoyan dorsalmente en el músculo cuadrado lumbar y en el psoas ilíaco." },
        { q: "La condensación del tejido conectivo que engloba al riñón y a la glándula suprarrenal se denomina Fascia Renal. ¿Con qué epónimo clínico se conoce clásicamente a la lámina anterior (prerrenal) de esta fascia?", options: ["Fascia de Toldt.", "Fascia de Treitz.", "Fascia de Gerota.", "Ligamento gastrocólico."], correct: 2, exp: "La lámina prerrenal de la fascia renal se denomina Fascia de Gerota." },
        { q: "La Glándula Suprarrenal se encuentra englobada en la misma Fascia de Gerota que el riñón. Sin embargo, el profesor aclara que respecto a su cápsula íntima:", options: ["Comparten la misma cápsula fibrosa íntima que el riñón.", "El riñón absorbe a la suprarrenal en el adulto.", "Tienen una cápsula propia e independiente, separadas del riñón por un tabique de conectivo, debido a su origen embriológico distinto.", "La suprarrenal deriva de la yema ureteral."], correct: 2, exp: "Aunque comparten la fascia renal externa, tienen cápsulas propias y tejido conectivo entre ellas, pues la suprarrenal solo fue 'empujada' por el riñón." },
        { q: "Las Glándulas Suprarrenales tienen dos porciones (Corteza y Médula) con orígenes embriológicos totalmente distintos. ¿De qué hoja deriva la MÉDULA suprarrenal (productora de catecolaminas)?", options: ["Del mesodermo somático.", "Del ectodermo (cresta neural).", "Del endodermo de la cloaca.", "De la yema ureteral."], correct: 1, exp: "La médula es tejido nervioso derivado del ectodermo, por eso secreta adrenalina/noradrenalina. La corteza es mesodérmica." },
        { q: "La vascularización arterial suprarrenal es riquísima, recibiendo tres pares de arterias. ¿De qué vaso sanguíneo directo nacen las Arterias Suprarrenales Medias?", options: ["De la arteria esplénica.", "De las arterias frénicas inferiores.", "Directamente de la Aorta Abdominal.", "De las arterias renales."], correct: 2, exp: "Las superiores vienen de las frénicas, las medias directas de la aorta, y las inferiores de las renales." },
        { q: "Trampa vascular clásica repetida en clase: La Arteria Renal Derecha debe ser más larga debido a la posición de la aorta. En su trayecto transversal hacia el hilio derecho, ¿por dónde pasa?", options: ["Por delante de la Vena Cava Inferior.", "Por detrás de la Vena Cava Inferior (retrocava).", "Por dentro del conducto colédoco.", "Por encima de la glándula suprarrenal."], correct: 1, exp: "La arteria renal derecha pasa posterior a la vena cava inferior para alcanzar el riñón." },
        { q: "Cruce venoso (Pinza Aortomesentérica): La Vena Renal Izquierda cruza hacia la Cava. En su trayecto, ¿entre qué dos grandes arterias queda atrapada (pudiendo sufrir compresión)?", options: ["Por delante de la Arteria Mesentérica Inferior y por detrás de la Ilíaca.", "Por detrás de la Aorta y por delante de la columna.", "Por delante de la Aorta Abdominal y por debajo/detrás de la Arteria Mesentérica Superior.", "Entre el Tronco Celíaco y las arterias hepáticas."], correct: 2, exp: "Cruza por delante de la aorta, pero por debajo de la AMS, formando una pinza o 'nutcracker'." },
        { q: "Drenaje venoso asimétrico: ¿Dónde drenan invariablemente la Vena Gonadal IZQUIERDA y la Vena Suprarrenal IZQUIERDA?", options: ["Directamente en la Vena Cava Inferior.", "En la Vena Mesentérica Superior.", "En la Vena Porta.", "En la Vena Renal Izquierda."], correct: 3, exp: "Las del lado derecho van a la cava; las del izquierdo van a la vena renal izquierda en ángulo recto." },
        { q: "En el Hilio Renal (pedículo renal), el profesor marca una regla estricta sobre la disposición de las estructuras de anterior a posterior. ¿Cuál es el orden correcto?", options: ["Uréter - Arteria - Vena.", "Vena renal - Arteria renal - Pelvis renal (V-A-P).", "Arteria - Vena - Pelvis.", "Pelvis - Vena - Arteria."], correct: 1, exp: "La vena es el elemento más ventral, le sigue la arteria en el centro, y la pelvis renal es la más posterior." },
        { q: "Al estudiar la estructura interna del riñón, diferenciamos el hilio del seno. ¿Qué es exactamente el Seno Renal?", options: ["Es la red de capilares glomerulares.", "Es la fascia que envuelve externamente al riñón.", "Es el espacio o cavidad interna del parénquima renal donde se alojan los cálices, la pelvis, los vasos y grasa.", "Es la porción más distal del uréter."], correct: 2, exp: "El parénquima se invagina dejando un hueco central (seno renal) donde se distribuye el aparato colector y vascular." },
        { q: "En la médula renal encontramos unas estructuras triangulares cuyos vértices (papilas) apuntan hacia el seno renal. ¿Cómo se denominan?", options: ["Corpúsculos de Bowman.", "Columnas de Bertin.", "Pirámides renales (de Malpighi).", "Nefronas corticales."], correct: 2, exp: "Las pirámides de Malpighi forman la médula renal." },
        { q: "El tejido cortical que se introduce entre las pirámides medulares formando tabiques de separación se conoce como:", options: ["Columnas renales (de Bertin).", "Cálices mayores.", "Área cribosa.", "Rayos medulares."], correct: 0, exp: "Las columnas de Bertin son invaginaciones de la corteza entre las pirámides." },
        { q: "A nivel macroscópico, ¿cómo se define anatómicamente un 'Lóbulo Renal'?", options: ["Es un glomérulo y su túbulo contorneado.", "Es cada pirámide renal de Malpighi junto con las porciones de tejido cortical que la recubren (sombrero cortical).", "Es la unión de tres cálices menores.", "Es la pelvis renal completa."], correct: 1, exp: "'Cada pirámide renal + Porciones corticales adyacentes = Lóbulo Renal'." },
        { q: "El profesor menciona que a veces el riñón adulto presenta abollonaduras o bultos en su superficie externa lisa. ¿A qué se debe esto sin ser patológico?", options: ["A quistes por parásitos.", "A la persistencia de la lobulación fetal embrionaria.", "A infartos isquémicos previos.", "A la presión de las costillas."], correct: 1, exp: "El riñón se forma uniendo lóbulos (aspecto de mora en el feto), y algunos adultos conservan esas marcas superficiales." },
        { q: "La vía de excreción interna del riñón sigue un orden de confluencia. ¿Cuál es el recorrido correcto de la orina desde que sale de la pirámide?", options: ["Papila renal -> Cáliz menor -> Cáliz mayor -> Pelvis renal.", "Cáliz mayor -> Cáliz menor -> Pelvis renal -> Papila.", "Pelvis renal -> Cáliz mayor -> Papila.", "Papila -> Uréter directo -> Pelvis."], correct: 0, exp: "El vértice (papila) drena al cáliz menor, estos se unen en cálices mayores, y estos forman la pelvis renal." },
        { q: "La vascularización intra-parenquimatosa del riñón es muy precisa. Las arterias que penetran y discurren entre las pirámides por las columnas de Bertin se llaman:", options: ["Arterias corticales radiadas.", "Arterias arcuatas o arqueadas.", "Arterias interlobares.", "Arteriolas eferentes."], correct: 2, exp: "Pasan 'entre los lóbulos' (interlobares) subiendo por las columnas de Bertin." },
        { q: "Al llegar a la base de la pirámide (unión corticomedular), estas arterias se curvan y forman arcos anastomóticos. ¿Cómo se denominan?", options: ["Arterias segmentarias.", "Arterias arqueadas o arciformes (arcuatas).", "Vasos rectos.", "Arteriolas glomerulares."], correct: 1, exp: "Las arterias arqueadas se forman en la base de la pirámide." },
        { q: "A diferencia del intestino, ¿cuál es la característica clínica fundamental de las Arterias Segmentarias del riñón ante una obstrucción (ej. trombo)?", options: ["Tienen gran circulación colateral, por lo que no ocurre isquemia.", "Son arterias terminales; su oclusión provoca el infarto isquémico exclusivo de ese segmento renal concreto.", "Desvían la sangre hacia la glándula suprarrenal.", "Se regeneran inmediatamente en 24 horas."], correct: 1, exp: "La diapositiva es clara: 'Dependiendo de la rama de la arteria renal que se ocluya, el infarto afectará a un segmento u otro'." },
        { q: "Fisiológicamente, el riñón recibe tanta sangre porque actúa como un sensor (barómetro y quimiorreceptor). El profesor destaca su localización de los glomérulos (corpúsculos) mayoritariamente en:", options: ["El vértice de la papila.", "La zona de la corteza, especialmente abundantes en el límite corticomedular para favorecer el filtrado y el testeo de la sangre.", "La cápsula adiposa externa.", "El interior del uréter."], correct: 1, exp: "Los glomérulos están en la corteza. El riñón testa la volemia y oxigenación para liberar Renina/EPO." },
        { q: "Inervación y dolor: El riñón está inervado casi exclusivamente por el SISTEMA SIMPÁTICO (plexo renal, T6-T12). Por tanto, ¿dónde se referirá el dolor de un cólico nefrítico originado en la pelvis renal alta?", options: ["En la punta del hombro izquierdo (Signo de Kehr).", "En un dolor torácico/lumbar bajo y dorso, irradiando hacia abajo por el recorrido de los nervios.", "En el cuello y mandíbula.", "En la región occipital."], correct: 1, exp: "El profesor explica que el dolor se refiere a los dermatomas torácicos bajos (T10-T12) y lumbares, doliendo la fosa lumbar y bajando hacia genitales." },
        { q: "Embriológicamente, el uréter y todo el sistema colector (pelvis, cálices) derivan de una estructura fundamental que además induce la formación del riñón definitivo (metanefros). ¿Cuál es?", options: ["La cresta neural.", "El conducto onfalomesentérico.", "La Yema Ureteral (o brote ureteral).", "El seno urogenital puramente."], correct: 2, exp: "La yema ureteral es el inductor primario; sin yema ureteral, no hay formación del riñón definitivo." },
        { q: "Si hay una agenesia renal bilateral (no se forman los riñones), el feto no produce orina primitiva. ¿Qué síndrome y alteración facial se produce mecánicamente por el oligohidramnios (falta de líquido amniótico)?", options: ["Herniación fisiológica.", "Facies de Potter (aplastamiento de los rasgos faciales por presión de las membranas).", "Labio leporino exclusivamente.", "Ptosis palpebral."], correct: 1, exp: "La falta de líquido 'colchón' hace que las paredes uterinas aplasten la cara del feto (facies de Potter)." },
        { q: "El Uréter, conducto de unos 25-30 cm, desciende por el retroperitoneo apoyado sobre un gran músculo de la pared posterior. ¿Qué músculo le sirve de 'cama' en su porción abdominal?", options: ["Músculo dorsal ancho.", "Músculo recto del abdomen.", "Músculo Psoas mayor.", "Músculo obturador interno."], correct: 2, exp: "El uréter discurre adherido a la fascia del músculo psoas mayor, quedando atrapado entre este y el peritoneo parietal." },
        { q: "En este descenso abdominal (porción abdominal del uréter), se forma una 'tríada' de vasos que corren paralelos o se cruzan oblicuamente. ¿Qué vasos acompañan al uréter?", options: ["Los vasos mesentéricos superiores.", "Los vasos gonadales (testiculares/ováricos).", "Los vasos frénicos inferiores.", "Los vasos gástricos izquierdos."], correct: 1, exp: "El uréter se cruza y corre en paralelo junto a la arteria y vena gonadal en la pared abdominal posterior." },
        { q: "El uréter presenta zonas de estrechamiento mecánico. La segunda porción del uréter (porción ilíaca) se define topográficamente porque el uréter:", options: ["Pasa por detrás del riñón.", "Cruza pasando por encima y por delante de la bifurcación de los vasos ilíacos comunes.", "Entra en el ligamento ancho.", "Atraviesa la próstata."], correct: 1, exp: "Al cruzar los vasos ilíacos, el uréter debe 'saltar' por encima de ellos, formando un acodamiento y estrechamiento mecánico natural." },
        { q: "En la porción pélvica, el uréter femenino se relaciona íntimamente con la vascularización del útero (punto de alto riesgo en histerectomías). ¿Cuál es la relación clásica?", options: ["La arteria uterina salta cruzando por encima (anterior) del uréter a unos 1.5 cm lateral al cérvix (\"el agua pasa bajo el puente\").", "El uréter pasa por encima de la arteria uterina.", "El uréter perfora el interior de la arteria uterina.", "No se cruzan en ningún punto de la pelvis."], correct: 0, exp: "El profesor describe que las arterias uterinas 'saltan por encima del uréter' de lateral a medial hacia el cérvix." },
        { q: "De forma análoga, en el fenotipo masculino, al acercarse a la vejiga (cara posteroinferior), el uréter es cruzado superior/anteriormente por el conducto que transporta los espermatozoides. ¿Qué conducto es?", options: ["El uraco.", "El conducto deferente.", "El conducto colédoco.", "El conducto eyaculador."], correct: 1, exp: "Los conductos deferentes pasan por encima y medialmente a los uréteres antes de llegar a la vesícula seminal." },
        { q: "La última porción del uréter es la intramural. El profesor destaca que el uréter penetra la pared de la vejiga de forma tangencial u oblicua (trayecto de 10-15 mm), no perpendicular. ¿Cuál es el objetivo fisiológico de este diseño?", options: ["Retardar la llegada de orina para concentrarla más.", "Crear un mecanismo valvular pasivo que evita el reflujo (retorno) de la orina desde la vejiga hacia el riñón.", "Absorber nutrientes de la orina.", "Fusionarse con el conducto deferente intramuralmente."], correct: 1, exp: "Al llenarse la vejiga, la pared comprime el uréter tangencial, cerrándolo como una válvula y evitando que la infección suba." },
        { q: "La Vejiga Urinaria vacía tiene forma piramidal con tres caras. ¿Cuál de ellas está tapizada por el peritoneo parietal, es más móvil y permite la distensión de la vejiga hacia el abdomen cuando se llena?", options: ["Cara posteroinferior.", "Cara anteroinferior.", "Cara anterosuperior.", "Cara retropúbica."], correct: 2, exp: "La cara anterosuperior o cúpula es la que asciende y está en contacto con las asas intestinales (y tapizada por peritoneo)." },
        { q: "La cara anteroinferior de la vejiga se relaciona directamente con el cuerpo del pubis. El espacio de tejido conectivo laxo que las separa, usado como vía de abordaje quirúrgico seguro, se denomina:", options: ["Espacio parietocólico.", "Fosa isquioanal.", "Espacio retropúbico de Retzius.", "Transcavidad de los epiplones."], correct: 2, exp: "El espacio de Retzius es la zona retropúbica y prevesical que permite acceder a la vejiga/próstata inferiormente." },
        { q: "Fijación de la vejiga: En este espacio de Retzius, la fascia se condensa formando unos fuertes ligamentos que anclan la vejiga al pubis. En el varón, por la presencia de la próstata, ¿cómo se denominan estos ligamentos?", options: ["Ligamentos uterosacros.", "Ligamentos pubovesicales o puboprostáticos.", "Ligamentos suspensorios del pene.", "Fascia de Toldt."], correct: 1, exp: "Se denominan pubovesicales (en la mujer) o puboprostáticos (en el varón, ya que se funden con la celda prostática)." },
        { q: "El vértice superior (anterior) de la vejiga se continúa hacia el ombligo mediante un cordón fibroso (resto embrionario de la alantoides/cloaca). ¿Cómo se llama este conducto que, si no se oblitera, puede causar fístulas de orina en el ombligo?", options: ["El uraco.", "El ligamento redondo.", "El conducto onfalomesentérico.", "El conducto de Wolff."], correct: 0, exp: "El uraco es el cordón fibroso en la línea media desde el vértice vesical hasta el ombligo." },
        { q: "Al observar el interior (mucosa) de la Vejiga Urinaria, se distingue claramente un área triangular lisa y pálida en la base, frente al resto de la pared que es rugosa y rosada. Esta diferencia marca el doble origen embriológico. ¿Cuál es el origen de este Trígono Vesical?", options: ["Endodérmico (cloaca).", "Ectodérmico (tubo neural).", "Mesodérmico (asociado a la vía excretora/yema ureteral).", "Endodérmico (intestino medio)."], correct: 2, exp: "El trígono es mesodérmico (común a los uréteres), mientras la bolsa vesical es endodérmica." },
        { q: "El profesor alerta de la importancia clínica de este doble origen epitelial en la vejiga porque:", options: ["Los fármacos quimioterápicos y la agresividad/tipo celular de los carcinomas tienen incidencias distintas según el área.", "Impide la colocación de sondas urinarias.", "Un origen duele y el otro no.", "El mesodermo produce bilis."], correct: 0, exp: "Explica que la toxicidad y los tratamientos diana actúan diferente según la línea celular (endodermo vs mesodermo)." },
        { q: "¿Cuáles son los tres orificios anatómicos que delimitan los vértices del Trígono Vesical en el interior de la vejiga?", options: ["Dos orificios de las glándulas seminales y un meato.", "Dos orificios ureterales (superiores) y un orificio vesical inferior / uretral interno (inferior).", "El uraco y los dos uréteres.", "Las válvulas de Houston."], correct: 1, exp: "Los uréteres desembocan arriba y la uretra nace en el vértice inferior." },
        { q: "La musculatura propia de la pared vesical recibe un nombre específico. Es una red de fibras dispuestas aleatoriamente en tres planos que se contrae globalmente para la micción. Es el:", options: ["Músculo esfínter externo.", "Músculo puborrectal.", "Músculo detrusor.", "Músculo cremáster."], correct: 2, exp: "El músculo detrusor es la capa de músculo liso de la vejiga urinaria." },
        { q: "Vascularización de la Vejiga: Como órgano pélvico, su riego depende de las arterias Ilíacas Internas. Las ramas superiores (Vesicales Superiores) proceden de un vaso fetal que se oblitera parcialmente. ¿De qué arteria provienen?", options: ["De la arteria pudenda interna.", "De la porción permeable de la arteria umbilical.", "De la arteria mesentérica inferior.", "De la arteria obturatriz."], correct: 1, exp: "Las arterias vesicales superiores nacen de la arteria umbilical (antes de su obliteración)." },
        { q: "El profesor señala que la vejiga también recibe vascularización anteroinferior de una arteria que sale de la pelvis y 'vuelve a entrar' por debajo de la sínfisis del pubis. Es la rama vesical anterior procedente de la:", options: ["Arteria sacra media.", "Arteria ovárica.", "Arteria pudenda interna.", "Arteria ilíaca externa."], correct: 2, exp: "La arteria pudenda interna, al recorrer el periné, da ramas que perforan hacia arriba para la cara anterior vesical." },
        { q: "Espacios Pélvicos Femeninos: El peritoneo cae desde la pared abdominal sobre las vísceras pélvicas. La reflexión peritoneal que cae en el espacio entre el útero (anterior) y el recto (posterior) forma el punto de mayor declive. Se denomina:", options: ["Fondo de saco vesicouterino.", "Fondo de saco de Douglas (rectouterino).", "Fosa isquioanal.", "Receso de Morison."], correct: 1, exp: "El saco de Douglas es el 'sumidero' natural de la cavidad abdominopélvica femenina." },
        { q: "Espacios Pélvicos Masculinos: Al carecer de útero, el peritoneo cae directamente desde el recto sobre la cara superior de la vejiga, formando el:", options: ["Fondo de saco rectovesical.", "Espacio de Retzius.", "Saco de Douglas.", "Tabique vesicovaginal."], correct: 0, exp: "Es el único fondo de saco profundo en el varón, análogo topográficamente al Douglas." },
        { q: "Tabiques subperitoneales: Por debajo de este receso peritoneal masculino, el tejido conectivo denso crea un muro que aísla la cara posterior de la próstata de la cara anterior del recto. Es el:", options: ["Tabique rectovesical (fascia de Denonvilliers).", "Tabique puboprostático.", "Membrana perineal.", "Músculo elevador del ano."], correct: 0, exp: "Este tabique conectivo separa el compartimento digestivo del urogenital masculino." },
        { q: "La Uretra Femenina es corta (unos 3-4 cm) y recta, lo que explica la alta incidencia de cistitis. Atraviesa el suelo pélvico y presenta unas pequeñas glándulas 'parauretrales' que lubrican el meato. ¿Cómo se conocen epónimamente?", options: ["Glándulas de Bartholino.", "Glándulas de Cowper (bulbouretrales).", "Glándulas de Skene.", "Glándulas de Brunner."], correct: 2, exp: "Las glándulas de Skene son glándulas mucosas parauretrales femeninas (homólogas a la próstata)." },
        { q: "El orificio uretral externo (meato) femenino desemboca en el vestíbulo de la vagina. Según la descripción anatómica detallada por el profesor, ¿qué aspecto morfológico tiene?", options: ["Es un orificio circular perfecto y rígido.", "Es un orificio 'arrosariado' o estrellado festoneado, abierto hacia el exterior.", "Es una hendidura vertical o 'bilabial'.", "Está cerrado por el himen."], correct: 1, exp: "El profesor describe que la mucosa forma una estrella o roseta ('arrosariado/estrellada')." },
        { q: "La Uretra Masculina es mucho más larga (15-20 cm) y se divide en cuatro porciones. ¿Qué porción es la más estrecha y está envuelta por el músculo esfínter externo voluntario?", options: ["Porción prostática.", "Porción esponjosa.", "Porción membranosa.", "Fosa navicular."], correct: 2, exp: "La porción membranosa es donde atraviesa la membrana perineal y el esfínter externo (músculo esquelético)." },
        { q: "El profesor describe las 'dilataciones' de la uretra masculina. Tras la porción membranosa, la uretra entra en el cuerpo esponjoso y sufre su primera gran dilatación. Se denomina:", options: ["Seno prostático.", "Seno bulbar.", "Fosa navicular.", "Meato urinario."], correct: 1, exp: "La uretra se ensancha al entrar en el 'bulbo' del cuerpo esponjoso (seno bulbar)." },
        { q: "Justo antes de salir al exterior (en el interior del Glande), la uretra masculina sufre su última dilatación en forma de 'tienda de campaña'. Es la:", options: ["Fosa isquioanal.", "Ampolla de Vater.", "Fosa navicular.", "Siringocele."], correct: 2, exp: "La fosa navicular es el ensanchamiento distal de la uretra en el glande." },
        { q: "¿Y qué aspecto morfológico tiene el meato urinario masculino (orificio externo) a diferencia del femenino?", options: ["Es circular.", "Es estrellado o en roseta.", "Es una hendidura vertical o 'bilabial' (dos labios laterales).", "Es transversal horizontal."], correct: 2, exp: "Lo describe explícitamente: 'bilabial, tiene un orificio vertical de ventral a dorsal y que presentaría dos labios'." },
        { q: "TRAMPA CLÍNICA DE EXAMEN (El falso sondaje): El profesor señala el punto más débil y con mayor riesgo de rotura iatrogénica en la uretra masculina. ¿Dónde está?", options: ["En la entrada a la vejiga.", "En el codo de unión (ángulo) entre la porción membranosa (fija) y la esponjosa (móvil).", "En la fosa navicular.", "Dentro de la próstata."], correct: 1, exp: "Es la zona de acodadura donde el tubo rígidamente anclado al periné pasa a ser el tubo móvil del pene. Si se fuerza la sonda sin enderezar el pene, perfora la pared." },
        { q: "Si se produce esta rotura, el fluido se acumula bajo una fascia superficial que envuelve el pene y el escroto, hinchando el saco escrotal masivamente. ¿Qué fascia es la receptora?", options: ["La fascia de Gerota.", "La fascia del Dartos (fascia superficial).", "La cápsula prostática.", "El músculo cremáster."], correct: 1, exp: "'La orina va al saco escrotal, al dartos peneano... exactamente el mismo'." },
        { q: "Genital Femenino: El Útero es un órgano muscular hueco. En nulíparas, se encuentra 'caído' sobre la vejiga. Esta posición topográfica natural se denomina:", options: ["Retroversión y retroflexión.", "Prolapso pélvico.", "Anteversión y anteflexión.", "Ectopia uterina."], correct: 2, exp: "El útero descansa antevertido y anteflexionado sobre la cara anterosuperior de la vejiga." },
        { q: "Si los sistemas de sostén muscular del suelo pélvico fallan, el útero puede rectificar su eje y caer por gravedad hacia el exterior. Este cuadro clínico se conoce como:", options: ["Prolapso cervical/uterino.", "Torsión ovárica.", "Embarazo ectópico.", "Fístula vesicovaginal."], correct: 0, exp: "El fracaso del sostén y la rectificación del eje causan que el útero 'caiga' a través de la vagina." },
        { q: "El útero está tapizado y sostenido lateralmente por un pliegue doble de peritoneo que cae sobre él como una sábana tendida. Este gran repliegue se denomina:", options: ["Ligamento redondo del útero.", "Ligamento ancho del útero.", "Ligamento uterosacro.", "Mesenterio propio."], correct: 1, exp: "El ligamento ancho es el doble pliegue peritoneal que engloba útero, trompas y soporta el ovario." },
        { q: "El tejido eréctil femenino es homólogo al masculino. El Clítoris está formado por la unión de dos pilares anclados a las ramas isquiopúbicas. ¿A qué estructura masculina corresponden estos cuerpos cavernosos?", options: ["A los testículos.", "Al cuerpo esponjoso.", "Al cuerpo cavernoso del pene.", "A la próstata."], correct: 2, exp: "Los pilares del clítoris son los cuerpos cavernosos femeninos, homólogos a los cavernosos del varón." },
        { q: "Genital Masculino: El escroto posee una capa de músculo liso bajo la piel que se contrae con el frío para acercar los testículos al calor corporal. ¿Qué capa es?", options: ["Músculo cremáster.", "Fascia espermática interna.", "Dartos (fascia superficial).", "Túnica albugínea."], correct: 2, exp: "El músculo liso subcutáneo responsable del arrugamiento de la piel escrotal es el Dartos." },
        { q: "Por debajo, existe un fascículo de músculo estriado (dependiente del oblicuo interno) que puede retraer el testículo bruscamente. Es el:", options: ["Músculo elevador del ano.", "Músculo cremáster.", "Músculo puborrectal.", "Músculo isquiocavernoso."], correct: 1, exp: "El músculo cremáster (inervado por el nervio genitofemoral) envuelve el cordón espermático y retrae el testículo." },
        { q: "Los espermatozoides viajan desde el testículo hacia la uretra prostática a través del Conducto Deferente. En su trayecto entra al abdomen atravesando:", options: ["El anillo umbilical.", "El conducto inguinal.", "El hiato esofágico.", "El agujero obturador."], correct: 1, exp: "El cordón espermático (que contiene el deferente) sube por la región funicular y entra por el conducto inguinal." },
        { q: "La Vesícula Seminal es una glándula fundamental para nutrir el semen. Topográficamente, en la pelvis, ¿dónde se localiza la vesícula seminal?", options: ["Dentro del escroto.", "En el espacio retropúbico.", "En la cara posteroinferior de la vejiga urinaria, lateral a la ampolla del conducto deferente.", "En la cara anterior del pubis."], correct: 2, exp: "Las vesículas seminales se pegan a la base de la vejiga, justo laterales a la terminación de los conductos deferentes." },
        { q: "La Glándula Prostática se dispone abrazando una zona estratégica. ¿Qué conducto/s atraviesan o quedan englobados por el interior del tejido de la próstata?", options: ["Solo los uréteres.", "Solo la uretra.", "La uretra (porción prostática) y los dos conductos eyaculadores.", "Los vasos ilíacos internos."], correct: 2, exp: "La próstata envuelve la uretra naciente y es perforada por los conductos eyaculadores." },
        { q: "La próstata está fijada dentro de un compartimento de tejido conectivo muy denso que la aísla del recto y la vejiga. Se trata de:", options: ["La bolsa omental.", "La celda periprostática (incluye fascia de Denonvilliers).", "El saco de Douglas.", "La fascia de Treitz."], correct: 1, exp: "La próstata tiene su propia celda fascial densa derivada de las condensaciones pélvicas." },
        { q: "Órganos erectores masculinos: El cuerpo del pene está formado por tres cilindros. Dos dorsales (Cuerpos Cavernosos) y uno ventral que forma el glande. ¿Cuál es este cilindro impar?", options: ["El cuerpo esponjoso (que alberga la uretra).", "El bulbo vestibular.", "El cordón espermático.", "El uraco."], correct: 0, exp: "El cuerpo esponjoso es ventral, engloba la uretra y termina distalmente formando el glande." },
        { q: "Suelo Pélvico: El plano más profundo y principal de sostén, con forma de embudo o hamaca, está constituido por el:", options: ["Músculo esfínter externo del ano.", "Músculo Elevador del Ano y músculo coccígeo.", "Músculo transverso superficial.", "Músculo isquiocavernoso."], correct: 1, exp: "El elevador del ano y el isquiococcígeo forman el diafragma pélvico principal." },
        { q: "Por debajo del elevador del ano existe una lámina fibrosa muy resistente inextensible que sirve de plataforma de anclaje para los cuerpos eréctiles. Se trata de:", options: ["La fascia de Toldt.", "La membrana perineal.", "La pleura parietal.", "El peritoneo pélvico."], correct: 1, exp: "La membrana perineal cierra el hiato urogenital inferiormente y es la base de anclaje de genitales externos." },
        { q: "Inervación somática (voluntaria) del Periné: ¿Qué nervio principal, originado en el plexo sacro (S2-S4), inerva los esfínteres externos y da sensibilidad al pene/clítoris?", options: ["Nervio femoral.", "Nervio vago.", "Nervio Pudendo.", "Nervio esplácnico mayor."], correct: 2, exp: "El nervio pudendo es el nervio somático del periné." },
        { q: "Inervación PARASIMPÁTICA pélvica: El profesor señala que la erección y el vaciado vesical/rectal NO dependen del Vago, sino de los:", options: ["Nervios esplácnicos torácicos.", "Nervios ilioinguinales.", "Nervios Esplácnicos Pélvicos (Erectores de Eckhard), niveles sacros S2-S4.", "Ganglios lumbares."], correct: 2, exp: "El parasimpático sacro (S2-S4) domina la fisiología pélvica." },
        { q: "Los riñones y las gónadas inician su desarrollo en la pared posterior del abdomen. Como 'recuerdo', la arteria gonadal nace directamente de:", options: ["La arteria ilíaca interna.", "La arteria pudenda interna.", "La Aorta Abdominal (nivel L2).", "La arteria epigástrica inferior."], correct: 2, exp: "Como se desarrollan arriba y luego 'bajan', arrastran sus vasos que nacen altos en la aorta abdominal." },
        { q: "El dolor de origen renal viaja de vuelta a la médula por fibras simpáticas. ¿En qué dermatomas referirá dolor este paciente?", options: ["Cervicales (C3-C5).", "Torácicas bajas y lumbares (T10-L1), fosa lumbar y flanco.", "Sacras (S2-S4).", "Fasciales."], correct: 1, exp: "La inervación simpática del riñón abarca T10-L1, refiriendo dolor al flanco y espalda baja." },
        { q: "En el caso del cálculo ureteral que desciende hacia la vejiga, el dolor se irradia clásicamente hacia adelante y abajo, apuntando hacia:", options: ["La punta de la escápula.", "Los genitales externos (escroto o labios mayores).", "El hombro derecho.", "La rodilla izquierda."], correct: 1, exp: "El profesor explica el clásico cólico que irradia a genitales debido a los dermatomas compartidos (T11-L1)." },
        { q: "El plexo venoso que drena el testículo rodea a la arteria testicular formando un 'radiador'. ¿Cómo se llama este plexo dentro del cordón espermático?", options: ["Plexo hemorroidal.", "Plexo prostático.", "Plexo Pampiniforme.", "Plexo de Batson."], correct: 2, exp: "El plexo pampiniforme rodea y enfría la sangre arterial que baja al testículo." },
        { q: "¿Qué patología venosa consiste en la dilatación varicosa del plexo pampiniforme (más frecuente en el lado izquierdo)?", options: ["Hidrocele.", "Varicocele.", "Espermatocele.", "Torsión testicular."], correct: 1, exp: "Por la anatomía del drenaje en la vena renal izquierda, este lado sufre más éstasis y dilatación." },
        { q: "El testículo está envuelto por una cápsula fibrosa íntima, blanca, muy densa e inextensible. Es la:", options: ["Túnica Vaginal.", "Túnica Albugínea.", "Fascia Espermática.", "Piel escrotal."], correct: 1, exp: "La túnica albugínea es la cápsula fibrosa blanca que rodea el testículo internamente." },
        { q: "Por fuera de esta cápsula fibrosa, el testículo resbala dentro de un saco seroso de doble capa remanente del peritoneo. Se llama:", options: ["Túnica Vaginal del testículo.", "Fascia de Gerota.", "Epiplón menor.", "Mesorquio."], correct: 0, exp: "La túnica vaginal es el saco seroso peritoneal evaginado que envuelve al testículo." },
        { q: "En la mujer, el ovario está recubierto de un epitelio cúbico adaptado para la rotura cíclica en la ovulación. Se conoce como:", options: ["Endometrio.", "Miometrio.", "Epitelio germinal.", "Perimetrio."], correct: 2, exp: "El ovario está recubierto por el 'epitelio germinal', una modificación del peritoneo." },
        { q: "La porción distal de la trompa tiene forma de embudo y presenta unas digitaciones (fimbrias) para captar el óvulo. Se denomina:", options: ["Istmo.", "Porción intramural.", "Infundíbulo.", "Ampolla tubárica."], correct: 2, exp: "El infundíbulo es el extremo en forma de embudo provisto de fimbrias que recoge el ovocito." }
    ];

    let currentQuestions = [];
    let state = {};

    function startQuiz(randomize) {
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        
        currentQuestions = [...database];
        if(randomize) currentQuestions.sort(() => Math.random() - 0.5);

        renderNav();
        renderQuiz();
        window.scrollTo(0,0);
    }

    function renderNav() {
        const nav = document.getElementById('nav-grid');
        nav.innerHTML = '';
        currentQuestions.forEach((_, i) => {
            state[i] = { answered: false, marked: false, correct: false };
            const btn = document.createElement('button');
            btn.className = 'index-btn';
            btn.id = `nav-${i}`;
            btn.innerText = i + 1;
            btn.onclick = () => document.getElementById(`q-${i}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
            nav.appendChild(btn);
        });
    }

    function renderQuiz() {
        const container = document.getElementById('quiz-area');
        container.innerHTML = '';
        currentQuestions.forEach((q, i) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.id = `q-${i}`;

            // Mezclar opciones
            let opts = q.options.map((t, idx) => ({ text: t, originalIdx: idx }));
            opts.sort(() => Math.random() - 0.5);

            card.innerHTML = `
                <div class="question-header">
                    <strong>PREGUNTA ${i+1}</strong>
                    <button class="mark-tab" id="mark-${i}" onclick="toggleMark(${i})">🔖 Marcar</button>
                </div>
                <p>${q.q}</p>
                <div id="opts-box-${i}">
                    ${opts.map(o => `
                        <button class="option-btn" onclick="check(${i}, ${o.originalIdx}, this)">${o.text}</button>
                    `).join('')}
                </div>
                <div class="explanation" id="exp-${i}"><strong>Respuesta correcta:</strong> ${q.options[q.correct]}<br><br>${q.exp}</div>
            `;
            container.appendChild(card);
        });
    }

    function check(qIdx, selected, btn) {
        if(state[qIdx].answered) return;
        
        const qData = currentQuestions[qIdx];
        state[qIdx].answered = true;
        state[qIdx].correct = (selected === qData.correct);

        const buttons = document.getElementById(`opts-box-${qIdx}`).querySelectorAll('.option-btn');
        buttons.forEach(b => b.disabled = true);

        if(state[qIdx].correct) {
            btn.classList.add('correct');
        } else {
            btn.classList.add('incorrect');
            buttons.forEach(b => {
                if(b.innerText === qData.options[qData.correct]) b.classList.add('correct');
            });
        }

        document.getElementById(`exp-${qIdx}`).style.display = 'block';
        document.getElementById(`nav-${qIdx}`).classList.add('answered');
    }

    function toggleMark(i) {
        state[i].marked = !state[i].marked;
        document.getElementById(`mark-${i}`).classList.toggle('active');
        document.getElementById(`nav-${i}`).classList.toggle('marked');
    }

    function showResults() {
        let corrects = 0;
        Object.values(state).forEach(s => { if(s.correct) corrects++; });
        const percent = Math.round((corrects / currentQuestions.length) * 100);
        
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('score-display').innerText = percent + "%";
        document.getElementById('stats-text').innerText = `Has acertado ${corrects} de ${currentQuestions.length} preguntas.`;
        window.scrollTo(0,0);
    }

    function retry(mode) {
        let nextSet = [];
        if(mode === 'all') {
            nextSet = [...database];
        } else {
            currentQuestions.forEach((q, i) => {
                const s = state[i];
                if(mode === 'failed' && s.answered && !s.correct) nextSet.push(q);
                if(mode === 'marked' && s.marked) nextSet.push(q);
                if(mode === 'failed-marked' && (s.marked || (s.answered && !s.correct))) nextSet.push(q);
            });
        }

        if(nextSet.length === 0) {
            alert("No hay preguntas que coincidan con la selección.");
            return;
        }

        currentQuestions = nextSet;
        state = {};
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('setup-screen').style.display = 'block';
    }
</script>
