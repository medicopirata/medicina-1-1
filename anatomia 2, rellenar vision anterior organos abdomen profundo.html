<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Órganos Abdominales Profundos</title>
    <script>
    // Comprobamos si NO existe la llave de acceso
    if (sessionStorage.getItem("_auth_tkn_882") !== "1") {
        // Expulsamos al usuario a la página principal
        // IMPORTANTE: Cambia "index.html" por el nombre exacto de tu archivo principal si se llama distinto
        window.location.replace("index.html");
    }
</script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
            text-align: center;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .instructions {
            margin-bottom: 20px;
            color: #333;
            font-size: 16px;
        }
        .controls {
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            margin: 0 10px;
            transition: background-color 0.3s;
        }
        .btn-verify {
            background-color: #4CAF50;
            color: white;
        }
        .btn-verify:hover {
            background-color: #45a049;
        }
        .btn-retry {
            background-color: #2196F3;
            color: white;
        }
        .btn-retry:hover {
            background-color: #1e88e5;
        }
        .score-display {
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
            color: #333;
        }
        .img-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 700px; /* Ajustado para el formato vertical */
            border: 1px solid #ddd;
            background-color: white;
        }
        .img-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }
        .dropdown {
            position: absolute;
            width: 26%; 
            height: 2.5%;
            font-size: 11px;
            background-color: rgba(255, 255, 255, 0.95);
            border: 1px solid #666;
            border-radius: 3px;
            padding: 0 2px;
            box-sizing: border-box;
            cursor: pointer;
        }
        .dropdown:focus {
            z-index: 10;
            border-color: #2196F3;
            outline: none;
        }
        .correct {
            background-color: #c8e6c9 !important;
            border: 2px solid #2e7d32 !important;
            color: #1b5e20;
            font-weight: bold;
        }
        .incorrect {
            background-color: #ffcdd2 !important;
            border: 2px solid #c62828 !important;
            color: #b71c1c;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Quiz: Órganos Abdominales Profundos</h1>
        <p class="instructions">Selecciona la estructura anatómica correcta en cada menú desplegable situado al final de cada línea indicadora.</p>
        
        <div class="controls">
            <button class="btn-verify" onclick="verificarRespuestas()">Verificar Respuestas</button>
            <button class="btn-retry" onclick="reiniciarTest()">Volver a Intentar</button>
            <div id="score" class="score-display"></div>
        </div>

        <div class="img-wrapper">
            <img src="abdomen.png" alt="Órganos Abdominales Profundos">
            
            <select class="dropdown" style="top: 7%; left: 0%;" data-correct="Venas hepáticas"></select>
            <select class="dropdown" style="top: 19.5%; left: 0%;" data-correct="Arteria frénica inferior"></select>
            <select class="dropdown" style="top: 23.5%; left: 0%;" data-correct="Vena suprarrenal"></select>
            <select class="dropdown" style="top: 27.5%; left: 0%;" data-correct="Tronco celíaco"></select>
            <select class="dropdown" style="top: 30.5%; left: 0%;" data-correct="Vena cava inferior"></select>
            <select class="dropdown" style="top: 35%; left: 0%;" data-correct="Vena renal derecha"></select>
            <select class="dropdown" style="top: 39.5%; left: 0%;" data-correct="Arteria mesentérica superior"></select>
            <select class="dropdown" style="top: 43.5%; left: 0%;" data-correct="Riñón"></select>
            <select class="dropdown" style="top: 50.5%; left: 0%;" data-correct="Arteria gonadal"></select>
            <select class="dropdown" style="top: 55.5%; left: 0%;" data-correct="Vena gonadal"></select>
            <select class="dropdown" style="top: 68.5%; left: 0%;" data-correct="Arteria ilíaca común"></select>
            <select class="dropdown" style="top: 75.5%; left: 0%;" data-correct="Arteria ilíaca externa"></select>
            <select class="dropdown" style="top: 80.5%; left: 0%;" data-correct="Arteria ilíaca interna"></select>

            <select class="dropdown" style="top: 14.5%; left: 73.5%;" data-correct="Esófago"></select>
            <select class="dropdown" style="top: 20.5%; left: 73.5%;" data-correct="Arteria suprarrenal superior"></select>
            <select class="dropdown" style="top: 25%; left: 73.5%;" data-correct="Glándula suprarrenal"></select>
            <select class="dropdown" style="top: 28.5%; left: 73.5%;" data-correct="Arteria suprarrenal media"></select>
            <select class="dropdown" style="top: 32.5%; left: 73.5%;" data-correct="Arteria suprarrenal inferior"></select>
            <select class="dropdown" style="top: 36.5%; left: 73.5%;" data-correct="Arteria renal"></select>
            <select class="dropdown" style="top: 40%; left: 73.5%;" data-correct="Pelvis renal"></select>
            <select class="dropdown" style="top: 45.5%; left: 73.5%;" data-correct="Músculo transverso"></select>
            <select class="dropdown" style="top: 50%; left: 73.5%;" data-correct="Músculo cuadrado lumbar"></select>
            <select class="dropdown" style="top: 54.5%; left: 73.5%;" data-correct="Músculo psoas"></select>
            <select class="dropdown" style="top: 61.5%; left: 73.5%;" data-correct="Arteria mesentérica inferior"></select>
            <select class="dropdown" style="top: 65.5%; left: 73.5%;" data-correct="Arteria lumbar"></select>
            <select class="dropdown" style="top: 69.5%; left: 73.5%;" data-correct="Uréter"></select>
        </div>
    </div>

    <script>
        const opciones = [
            "Arteria frénica inferior",
            "Arteria gonadal",
            "Arteria ilíaca común",
            "Arteria ilíaca externa",
            "Arteria ilíaca interna",
            "Arteria lumbar",
            "Arteria mesentérica inferior",
            "Arteria mesentérica superior",
            "Arteria renal",
            "Arteria suprarrenal inferior",
            "Arteria suprarrenal media",
            "Arteria suprarrenal superior",
            "Esófago",
            "Glándula suprarrenal",
            "Músculo cuadrado lumbar",
            "Músculo psoas",
            "Músculo transverso",
            "Pelvis renal",
            "Riñón",
            "Tronco celíaco",
            "Uréter",
            "Vena cava inferior",
            "Vena gonadal",
            "Vena renal derecha",
            "Vena suprarrenal",
            "Venas hepáticas"
        ];

        window.onload = function() {
            const selects = document.querySelectorAll('.dropdown');
            
            selects.forEach(select => {
                let defaultOption = document.createElement('option');
                defaultOption.value = "";
                defaultOption.text = "--- Selecciona ---";
                select.appendChild(defaultOption);

                opciones.forEach(opcion => {
                    let opt = document.createElement('option');
                    opt.value = opcion;
                    opt.text = opcion;
                    select.appendChild(opt);
                });
            });
        };

        function verificarRespuestas() {
            const selects = document.querySelectorAll('.dropdown');
            let correctas = 0;
            let total = selects.length;

            selects.forEach(select => {
                let respuestaUsuario = select.value;
                let respuestaCorrecta = select.getAttribute('data-correct');

                select.classList.remove('correct', 'incorrect');

                if (respuestaUsuario === respuestaCorrecta) {
                    select.classList.add('correct');
                    correctas++;
                } else if (respuestaUsuario !== "") {
                    select.classList.add('incorrect');
                } else {
                    select.classList.add('incorrect');
                }
            });

            const scoreDiv = document.getElementById('score');
            scoreDiv.innerHTML = `Has acertado ${correctas} de ${total} preguntas.`;
            
            if (correctas === total) {
                scoreDiv.style.color = "#2e7d32";
            } else {
                scoreDiv.style.color = "#c62828";
            }
        }

        function reiniciarTest() {
            const selects = document.querySelectorAll('.dropdown');
            selects.forEach(select => {
                select.value = "";
                select.classList.remove('correct', 'incorrect');
            });
            document.getElementById('score').innerHTML = "";
        }
    </script>
</body>
</html>
