<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Médico Pirata</title>
<style>
:root{
  --bg:#0a0c10;--s1:#12151c;--s2:#1a1e28;--s3:#232836;
  --bdr:#2a3040;--bdr2:#3a4258;
  --t1:#e4e8f7;--t2:#7d85a0;--t3:#555d75;
  --ok:#00b894;--ok2:#55efc4;--okbg:rgba(0,184,148,.1);
  --no:#d63031;--no2:#ff7675;--nobg:rgba(214,48,49,.1);
  --warn:#fdcb6e;
  --ac:#6c5ce7;--ac2:#a29bfe;--acbg:rgba(108,92,231,.1);
  --r:8px;--r2:12px;
  --f:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --m:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--t1);min-height:100vh}

/* LOGIN */
#login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:1.2rem;padding:2rem;background:radial-gradient(ellipse at 50% 20%,rgba(108,92,231,.08),transparent 60%)}
.logo{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-1px}
.sub-txt{color:var(--t2);font-size:.85rem;text-align:center;max-width:300px}
#pwdInput{padding:.65rem 1.1rem;border:1px solid var(--bdr);border-radius:var(--r);background:var(--s1);color:var(--t1);font-size:1rem;width:280px;text-align:center;outline:none;transition:.2s;font-family:var(--f)}
#pwdInput:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acbg)}
.btn-enter{background:var(--ac);color:#fff;border:none;padding:.7rem 2.5rem;border-radius:var(--r);font-size:.9rem;font-weight:600;cursor:pointer;transition:.2s;font-family:var(--f)}
.btn-enter:hover{background:var(--ac2);transform:translateY(-1px)}
.err{color:var(--no2);font-size:.78rem;min-height:1.2rem}

/* DASHBOARD */
#dash{display:none;padding:1.5rem 2rem;max-width:1200px;margin:0 auto}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--bdr);flex-wrap:wrap;gap:.8rem}
header h1{font-size:1.3rem;font-weight:700;display:flex;align-items:center;gap:.6rem}
.admin-badge{font-size:.55rem;font-family:var(--m);background:var(--acbg);color:var(--ac2);padding:.2rem .6rem;border-radius:20px;border:1px solid var(--ac);letter-spacing:.5px}
.btn-refresh{background:var(--s2);border:1px solid var(--bdr);color:var(--t1);padding:.4rem .9rem;border-radius:var(--r);font-size:.75rem;cursor:pointer;transition:.2s;font-family:var(--f)}
.btn-refresh:hover{border-color:var(--ac);background:var(--s3)}

/* SUMMARY */
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:.8rem;margin-bottom:1.5rem}
.scard{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r2);padding:1rem 1.2rem}
.scard .sv{font-size:1.8rem;font-weight:700;font-family:var(--m);margin-bottom:.2rem}
.scard .sl{font-size:.52rem;color:var(--t2);text-transform:uppercase;letter-spacing:1.2px}

/* TABS */
.tabs{display:flex;gap:0;margin-bottom:0;border-bottom:1px solid var(--bdr)}
.tab{background:transparent;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;color:var(--t2);padding:.55rem 1.1rem;font-size:.82rem;cursor:pointer;transition:.2s;font-family:var(--f);font-weight:500}
.tab:hover{color:var(--t1)}
.tab.active{color:var(--ac2);border-bottom-color:var(--ac2);font-weight:600}

/* PANEL */
.panel{display:none;padding-top:.8rem}
.panel.active{display:block}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem;flex-wrap:wrap;gap:.5rem}
.panel-title{font-size:.58rem;color:var(--ac2);text-transform:uppercase;letter-spacing:1.5px;font-family:var(--m);font-weight:600}
.panel-meta{display:flex;gap:1.4rem;font-size:.71rem;color:var(--t2);flex-wrap:wrap}
.panel-meta span b{color:var(--t1);font-family:var(--m)}

/* TABLE */
.tbl-wrap{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r2);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--s2)}
th{padding:.55rem .85rem;text-align:left;font-size:.54rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--t3);font-weight:600;font-family:var(--m);white-space:nowrap;border-bottom:1px solid var(--bdr2)}
td{padding:.52rem .85rem;border-bottom:1px solid var(--bdr);font-size:.77rem;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.015)}
.rk{font-family:var(--m);font-size:.6rem;color:var(--t3);font-weight:700;width:30px}
.uid{font-family:var(--m);font-size:.73rem;color:var(--ac2);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pw{display:flex;align-items:center;gap:.5rem}
.pb{width:48px;height:4px;background:var(--s3);border-radius:2px;overflow:hidden;flex-shrink:0}
.pf{height:100%;border-radius:2px}
.pv{font-family:var(--m);font-size:.71rem;font-weight:600;min-width:2.8rem}
.ans{font-family:var(--m);font-size:.71rem}
.seen{font-family:var(--m);font-size:.69rem}
.seen-tot{color:var(--t3)}
.la{font-size:.63rem;color:var(--t3);font-family:var(--m);white-space:nowrap}
.empty{text-align:center;padding:2.5rem;color:var(--t3);font-size:.8rem}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
.loading{text-align:center;padding:2rem;color:var(--t2);font-size:.8rem;animation:blink 1.5s ease-in-out infinite}

@media(max-width:700px){
  #dash{padding:1rem}
  .summary{grid-template-columns:1fr 1fr}
  th,td{padding:.4rem .55rem}
  .pb{width:32px}
}
</style>
</head>
<body>

<div id="login">
  <div class="logo">☠️ Admin</div>
  <p class="sub-txt">Panel de administración · Médico Pirata</p>
  <input type="password" id="pwdInput" placeholder="Contraseña de administrador" autocomplete="new-password">
  <button class="btn-enter" onclick="checkPwd()">Acceder</button>
  <p class="err" id="errMsg"></p>
</div>

<div id="dash">
  <header>
    <h1>☠️ Panel de Control <span class="admin-badge">ADMIN · COMODORO SUPREMO</span></h1>
    <button class="btn-refresh" onclick="loadAllData()">↺ Actualizar datos</button>
  </header>

  <div class="summary" id="sumCards">
    <div class="scard"><div class="sv loading" style="font-size:.9rem">…</div><div class="sl">Conectando</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('fisio',this)">⚡ Fisiología</button>
    <button class="tab" onclick="showTab('bioq',this)">🧪 Bioquímica</button>
    <button class="tab" onclick="showTab('histo',this)">🔬 Histología</button>
  </div>

  <div id="panel-fisio" class="panel active"><div class="loading">Cargando datos de Fisiología…</div></div>
  <div id="panel-bioq" class="panel"><div class="loading">Cargando datos de Bioquímica…</div></div>
  <div id="panel-histo" class="panel"><div class="loading">Cargando datos de Histología…</div></div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,get}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const CFG={apiKey:"AIzaSyCg86OLSle_1InlGjQYWbAPephJSoWH3DU",authDomain:"quiz-fisio.firebaseapp.com",databaseURL:"https://quiz-fisio-default-rtdb.europe-west1.firebasedatabase.app",projectId:"quiz-fisio",storageBucket:"quiz-fisio.firebasestorage.app",messagingSenderId:"260077805780",appId:"1:260077805780:web:91c23126b9b65eb34fdb41"};
const ADMIN_HASH="26f23fc6cb9d53db0d5041fd0c3b1a09b03c3359f01ab4f9b99a2b3063b8e603";
const QTOTAL={fisio:1343,bioq:1236,histo:191};

const app=initializeApp(CFG);
const db=getDatabase(app);

async function sha256(s){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(x=>x.toString(16).padStart(2,'0')).join('');
}

window.checkPwd=async function(){
  const pwd=document.getElementById('pwdInput').value;
  if(!pwd)return;
  const h=await sha256(pwd);
  if(h===ADMIN_HASH){
    document.getElementById('login').style.display='none';
    document.getElementById('dash').style.display='block';
    loadAllData();
  }else{
    const e=document.getElementById('errMsg');
    e.textContent='Contraseña incorrecta';
    setTimeout(()=>e.textContent='',2500);
  }
};
document.getElementById('pwdInput').addEventListener('keydown',e=>{if(e.key==='Enter')window.checkPwd()});

function pctColor(p){return p>=70?'var(--ok)':p>=40?'var(--warn)':'var(--no)'}

function fmtDate(ts){
  if(!ts)return'—';
  const d=Date.now()-ts;
  if(d<3600000)return Math.floor(d/60000)+'m';
  if(d<86400000)return Math.floor(d/3600000)+'h';
  if(d<604800000)return Math.floor(d/86400000)+'d';
  return new Date(ts).toLocaleDateString('es-ES',{day:'numeric',month:'short'});
}

function computeStats(data){
  const st=data.st||{};
  let ans=0,cor=0,seen=0;
  for(const q of Object.values(st)){if(q&&q.a>0){seen++;ans+=q.a;cor+=q.c||0}}
  return{ans,cor,seen,pct:ans?Math.round(cor/ans*100):0,la:data.la||0};
}

function buildTable(users,type){
  if(!users.length)return`<div class="empty">Sin datos para esta asignatura todavía.<br><span style="font-size:.72rem;color:var(--t3)">Los datos aparecerán cuando los usuarios completen un quiz.</span></div>`;
  const total=QTOTAL[type];
  const isHisto=(type==='histo');
  users.sort((a,b)=>b.pct-a.pct||(b.ans-a.ans));
  let h=`<div class="tbl-wrap"><table><thead><tr>
    <th>#</th><th>Usuario</th><th>Acierto</th><th>Respondidas</th>
    <th>${isHisto?'Sesiones':'Preguntas vistas'}</th><th>Últ. actividad</th>
  </tr></thead><tbody>`;
  users.forEach((u,i)=>{
    const cl=pctColor(u.pct);
    const seenHtml=isHisto
      ?`<span class="ans">${u.seen} <span class="seen-tot">sesiones</span></span>`
      :`<span class="ans">${u.seen}<span class="seen-tot">/${total}</span></span>`;
    h+=`<tr>
      <td class="rk">${i+1}</td>
      <td><span class="uid" title="${u.uid}">${u.uid}</span></td>
      <td><div class="pw">
        <div class="pb"><div class="pf" style="width:${u.pct}%;background:${cl}"></div></div>
        <span class="pv" style="color:${cl}">${u.ans?u.pct+'%':'—'}</span>
      </div></td>
      <td class="ans">${u.ans.toLocaleString()}</td>
      <td>${seenHtml}</td>
      <td class="la">${fmtDate(u.la)}</td>
    </tr>`;
  });
  h+='</tbody></table></div>';
  return h;
}

function buildHeader(users){
  if(!users.length)return'';
  let totA=0,totC=0,active=0;
  users.forEach(u=>{if(u.ans>0){active++;totA+=u.ans;totC+=u.cor}});
  const avg=totA?Math.round(totC/totA*100):0;
  return`<div class="panel-header">
    <span class="panel-title">${users.length} usuario${users.length!==1?'s':''}</span>
    <div class="panel-meta">
      <span><b>${active}</b> con actividad</span>
      <span><b>${totA.toLocaleString()}</b> respuestas totales</span>
      <span><b>${avg}%</b> acierto medio</span>
    </div>
  </div>`;
}

window.loadAllData=async function(){
  ['fisio','bioq','histo'].forEach(t=>document.getElementById('panel-'+t).innerHTML='<div class="loading">Cargando…</div>');
  document.getElementById('sumCards').innerHTML='<div class="scard" style="grid-column:1/-1"><div class="loading" style="font-size:.8rem;padding:.5rem 0">Conectando a Firebase…</div></div>';

  try{
    const[fSnap,bSnap,hSnap]=await Promise.all([
      get(ref(db,'u/')),
      get(ref(db,'bioq/')),
      get(ref(db,'histo/'))
    ]);

    const fisioU=[],bioqU=[],histoU=[];

    if(fSnap.exists())fSnap.forEach(c=>{
      const s=computeStats(c.val());
      fisioU.push({uid:c.key,...s});
    });
    if(bSnap.exists())bSnap.forEach(c=>{
      const s=computeStats(c.val());
      bioqU.push({uid:c.key,...s});
    });
    if(hSnap.exists())hSnap.forEach(c=>{
      const d=c.val(),ag=d.ag||{};
      const pct=ag.total?Math.round((ag.correct||0)/ag.total*100):0;
      histoU.push({uid:c.key,ans:ag.total||0,cor:ag.correct||0,seen:ag.sessions||0,pct,la:d.la||0});
    });

    const allUids=new Set([...fisioU,...bioqU,...histoU].map(u=>u.uid));
    const totAns=
      fisioU.reduce((s,u)=>s+u.ans,0)+
      bioqU.reduce((s,u)=>s+u.ans,0)+
      histoU.reduce((s,u)=>s+u.ans,0);

    let totC=0,totA=0;
    [...fisioU,...bioqU].forEach(u=>{totA+=u.ans;totC+=u.cor});
    const avgGlobal=totA?Math.round(totC/totA*100):0;

    document.getElementById('sumCards').innerHTML=`
      <div class="scard"><div class="sv" style="color:var(--ac2)">${allUids.size}</div><div class="sl">Usuarios totales</div></div>
      <div class="scard"><div class="sv" style="color:var(--ok)">${totAns.toLocaleString()}</div><div class="sl">Respuestas registradas</div></div>
      <div class="scard"><div class="sv" style="color:var(--warn)">${avgGlobal}%</div><div class="sl">Acierto medio global</div></div>
      <div class="scard"><div class="sv" style="color:var(--no2)">${fisioU.length+bioqU.length+histoU.length}</div><div class="sl">Registros activos</div></div>
    `;

    document.getElementById('panel-fisio').innerHTML=buildHeader(fisioU)+buildTable(fisioU,'fisio');
    document.getElementById('panel-bioq').innerHTML=buildHeader(bioqU)+buildTable(bioqU,'bioq');
    document.getElementById('panel-histo').innerHTML=buildHeader(histoU)+buildTable(histoU,'histo');

  }catch(e){
    console.error(e);
    ['fisio','bioq','histo'].forEach(t=>{
      document.getElementById('panel-'+t).innerHTML=`<div class="empty">Error al cargar: ${e.message}<br><small>Comprueba la consola del navegador.</small></div>`;
    });
  }
};

window.showTab=function(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
};
</script>
</body>
</html>
