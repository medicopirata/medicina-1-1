<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Corte Transversal del Cuello (C6)</title>
    <script>
    // Comprobamos si NO existe la llave de acceso
    if (sessionStorage.getItem("_auth_tkn_882") !== "1") {
        // Expulsamos al usuario a la página principal
        // IMPORTANTE: Cambia "index.html" por el nombre exacto de tu archivo principal si se llama distinto
        window.location.replace("index.html");
    }
</script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
            color: #333;
        }
        .header-container {
            text-align: center;
            margin-bottom: 20px;
        }
        .controls {
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            margin: 0 10px;
            transition: background-color 0.3s;
            font-weight: bold;
        }
        .btn-verify {
            background-color: #4CAF50;
            color: white;
        }
        .btn-verify:hover {
            background-color: #45a049;
        }
        .btn-retry {
            background-color: #2196F3;
            color: white;
        }
        .btn-retry:hover {
            background-color: #1e88e5;
        }
        .score-display {
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
        }
        
        /* Layout principal: Imagen a la izquierda, preguntas a la derecha */
        .main-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        .image-column {
            flex: 1 1 50%;
            min-width: 400px;
            text-align: center;
        }
        .image-column img {
            width: 100%;
            max-width: 800px;
            height: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        .quiz-column {
            flex: 1 1 40%;
            min-width: 350px;
            max-height: 80vh; /* Permite hacer scroll si la pantalla es pequeña */
            overflow-y: auto;
            padding-right: 15px;
        }
        
        /* Estilos de la lista de preguntas */
        .question-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            padding: 8px;
            background-color: #f9f9f9;
            border-radius: 5px;
            border-left: 4px solid #ccc;
        }
        .question-number {
            font-weight: bold;
            width: 35px;
            font-size: 16px;
        }
        .dropdown {
            flex-grow: 1;
            padding: 8px;
            font-size: 14px;
            border: 1px solid #aaa;
            border-radius: 4px;
            cursor: pointer;
        }
        .dropdown:focus {
            outline: none;
            border-color: #2196F3;
        }
        
        /* Clases de validación */
        .correct {
            background-color: #c8e6c9 !important;
            border-color: #2e7d32 !important;
            color: #1b5e20;
            border-left-color: #2e7d32 !important;
        }
        .incorrect {
            background-color: #ffcdd2 !important;
            border-color: #c62828 !important;
            color: #b71c1c;
            border-left-color: #c62828 !important;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>Quiz: Corte Transversal del Cuello (Nivel C6)</h1>
        <p>Observa la imagen de la izquierda y selecciona la opción correcta para cada número en la lista de la derecha.</p>
        
        <div class="controls">
            <button class="btn-verify" onclick="verificarRespuestas()">Verificar Respuestas</button>
            <button class="btn-retry" onclick="reiniciarTest()">Volver a Intentar</button>
            <div id="score" class="score-display"></div>
        </div>
    </div>

    <div class="main-layout">
        <div class="image-column">
            <img src="cuello_corte_transversal.png" alt="Corte transversal del cuello">
        </div>

        <div class="quiz-column">
            <div class="question-row"><span class="question-number">1.</span><select class="dropdown" data-correct="Músculo esternocleidomastoideo"></select></div>
            <div class="question-row"><span class="question-number">2.</span><select class="dropdown" data-correct="músculo omohioideo"></select></div>
            <div class="question-row"><span class="question-number">3.</span><select class="dropdown" data-correct="vena yugular externa"></select></div>
            <div class="question-row"><span class="question-number">4.</span><select class="dropdown" data-correct="músculo esternohioideo"></select></div>
            <div class="question-row"><span class="question-number">5.</span><select class="dropdown" data-correct="músculo esternotiroideo"></select></div>
            <div class="question-row"><span class="question-number">6.</span><select class="dropdown" data-correct="vena yugular anterior"></select></div>
            <div class="question-row"><span class="question-number">7.</span><select class="dropdown" data-correct="tráquea"></select></div>
            <div class="question-row"><span class="question-number">8.</span><select class="dropdown" data-correct="vaina visceral"></select></div>
            <div class="question-row"><span class="question-number">9.</span><select class="dropdown" data-correct="glándula tiroides"></select></div>
            <div class="question-row"><span class="question-number">10.</span><select class="dropdown" data-correct="hoja pretraqueal de la fascia cervical"></select></div>
            <div class="question-row"><span class="question-number">11.</span><select class="dropdown" data-correct="nervio laríngeo recurrente derecho"></select></div>
            <div class="question-row"><span class="question-number">12.</span><select class="dropdown" data-correct="esófago"></select></div>
            <div class="question-row"><span class="question-number">13.</span><select class="dropdown" data-correct="vaina carotídea"></select></div>
            <div class="question-row"><span class="question-number">14.</span><select class="dropdown" data-correct="hoja superficial de la fascia cervical"></select></div>
            <div class="question-row"><span class="question-number">15.</span><select class="dropdown" data-correct="músculo escaleno anterior"></select></div>
            <div class="question-row"><span class="question-number">16.</span><select class="dropdown" data-correct="músculo escaleno medio"></select></div>
            <div class="question-row"><span class="question-number">17.</span><select class="dropdown" data-correct="músculo escaleno posterior"></select></div>
            <div class="question-row"><span class="question-number">18.</span><select class="dropdown" data-correct="músculo elevador de la escápula"></select></div>
            <div class="question-row"><span class="question-number">19.</span><select class="dropdown" data-correct="musculatura nucal"></select></div>
            <div class="question-row"><span class="question-number">20.</span><select class="dropdown" data-correct="músculo trapecio"></select></div>
            <div class="question-row"><span class="question-number">21.</span><select class="dropdown" data-correct="vasos vertebrales"></select></div>
            <div class="question-row"><span class="question-number">22.</span><select class="dropdown" data-correct="musculatura prevertebral"></select></div>
            <div class="question-row"><span class="question-number">23.</span><select class="dropdown" data-correct="hoja profunda de la fascia cervical (aponeurosis cervical profunda)"></select></div>
            <div class="question-row"><span class="question-number">24.</span><select class="dropdown" data-correct="nervio vago"></select></div>
            <div class="question-row"><span class="question-number">25.</span><select class="dropdown" data-correct="arteria carótida común"></select></div>
            <div class="question-row"><span class="question-number">26.</span><select class="dropdown" data-correct="vena yugular interna"></select></div>
        </div>
    </div>

    <script>
        // Opciones transcritas literalmente de la leyenda, ordenadas alfabéticamente para facilitar la búsqueda
        const opciones = [
            "arteria carótida común",
            "esófago",
            "glándula tiroides",
            "hoja pretraqueal de la fascia cervical",
            "hoja profunda de la fascia cervical (aponeurosis cervical profunda)",
            "hoja superficial de la fascia cervical",
            "musculatura nucal",
            "musculatura prevertebral",
            "músculo elevador de la escápula",
            "músculo escaleno anterior",
            "músculo escaleno medio",
            "músculo escaleno posterior",
            "Músculo esternocleidomastoideo",
            "músculo esternohioideo",
            "músculo esternotiroideo",
            "músculo omohioideo",
            "músculo trapecio",
            "nervio laríngeo recurrente derecho",
            "nervio vago",
            "tráquea",
            "vaina carotídea",
            "vaina visceral",
            "vasos vertebrales",
            "vena yugular anterior",
            "vena yugular externa",
            "vena yugular interna"
        ];

        window.onload = function() {
            const selects = document.querySelectorAll('.dropdown');
            
            selects.forEach(select => {
                let defaultOption = document.createElement('option');
                defaultOption.value = "";
                defaultOption.text = "--- Selecciona una estructura ---";
                select.appendChild(defaultOption);

                opciones.forEach(opcion => {
                    let opt = document.createElement('option');
                    opt.value = opcion;
                    opt.text = opcion;
                    select.appendChild(opt);
                });
            });
        };

        function verificarRespuestas() {
            const selectRows = document.querySelectorAll('.dropdown');
            let correctas = 0;
            let total = selectRows.length;

            selectRows.forEach(select => {
                let respuestaUsuario = select.value;
                let respuestaCorrecta = select.getAttribute('data-correct');

                // Limpiamos estilos anteriores
                select.parentElement.classList.remove('correct', 'incorrect');

                if (respuestaUsuario === respuestaCorrecta) {
                    select.parentElement.classList.add('correct');
                    correctas++;
                } else if (respuestaUsuario !== "") {
                    select.parentElement.classList.add('incorrect');
                } else {
                    select.parentElement.classList.add('incorrect');
                }
            });

            const scoreDiv = document.getElementById('score');
            scoreDiv.innerHTML = `Has acertado ${correctas} de ${total} estructuras.`;
            
            if (correctas === total) {
                scoreDiv.style.color = "#2e7d32";
            } else {
                scoreDiv.style.color = "#c62828";
            }
        }

        function reiniciarTest() {
            const selectRows = document.querySelectorAll('.dropdown');
            selectRows.forEach(select => {
                select.value = "";
                select.parentElement.classList.remove('correct', 'incorrect');
            });
            document.getElementById('score').innerHTML = "";
        }
    </script>
</body>
</html>
