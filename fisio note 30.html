<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-width=1.0">
<title>Quiz Interactivo</title>
<style>
    :root {
        --primary: #2c3e50;
        --secondary: #34495e;
        --accent: #3498db;
        --correct: #27ae60;
        --correct-bg: #eaeded;
        --incorrect: #e74c3c;
        --incorrect-bg: #fdedec;
        --marked: #f39c12;
        --bg: #f8f9fa;
        --card-bg: #ffffff;
    }
    
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 0;
        background-color: var(--bg);
        display: flex;
        color: #333;
    }

    /* Sidebar - Índice numérico */
    #sidebar {
        width: 300px;
        background-color: var(--primary);
        color: white;
        height: 100vh;
        position: fixed;
        overflow-y: auto;
        padding: 20px;
        box-sizing: border-box;
        box-shadow: 2px 0 5px rgba(0,0,0,0.1);
    }

    #sidebar h2 {
        text-align: center;
        font-size: 1.2rem;
        margin-top: 0;
        margin-bottom: 20px;
        color: white;
    }

    .index-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 30px;
    }

    .index-btn {
        background-color: var(--secondary);
        color: white;
        border: 2px solid transparent;
        padding: 10px 0;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        transition: all 0.2s;
        text-align: center;
        text-decoration: none;
    }

    .index-btn:hover {
        background-color: var(--accent);
    }

    .index-btn.answered-correct { background-color: var(--correct); }
    .index-btn.answered-incorrect { background-color: var(--incorrect); }
    .index-btn.is-marked { border-color: var(--marked); }

    .finish-btn {
        width: 100%;
        padding: 15px;
        background-color: var(--accent);
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 1rem;
        cursor: pointer;
        font-weight: bold;
    }
    
    .finish-btn:hover { background-color: #2980b9; }

    /* Área Principal de Preguntas */
    #main-content {
        margin-left: 300px;
        padding: 40px;
        width: calc(100% - 300px);
        box-sizing: border-box;
    }

    .question-card {
        background-color: var(--card-bg);
        border-radius: 8px;
        padding: 25px;
        margin-bottom: 30px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        scroll-margin-top: 20px;
        position: relative;
    }

    .question-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 15px;
    }

    .question-title {
        font-size: 1.2rem;
        font-weight: 600;
        margin: 0;
        line-height: 1.5;
        flex-grow: 1;
        padding-right: 20px;
    }

    .mark-toggle {
        background: none;
        border: 2px solid var(--marked);
        color: var(--marked);
        padding: 5px 10px;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        transition: all 0.2s;
        white-space: nowrap;
    }

    .mark-toggle.active {
        background-color: var(--marked);
        color: white;
    }

    .options-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .option-btn {
        background-color: var(--bg);
        border: 1px solid #ddd;
        padding: 15px;
        border-radius: 5px;
        cursor: pointer;
        text-align: left;
        font-size: 1rem;
        transition: all 0.2s;
        line-height: 1.4;
    }

    .option-btn:hover:not(:disabled) {
        background-color: #e9ecef;
    }

    .option-btn.correct {
        background-color: var(--correct-bg);
        border-color: var(--correct);
        color: #1e8449;
        font-weight: bold;
    }

    .option-btn.incorrect {
        background-color: var(--incorrect-bg);
        border-color: var(--incorrect);
        color: #c0392b;
    }

    .option-btn:disabled {
        cursor: default;
        opacity: 0.8;
    }

    .explanation {
        margin-top: 20px;
        padding: 15px;
        background-color: #eaf2f8;
        border-left: 4px solid var(--accent);
        border-radius: 0 5px 5px 0;
        display: none;
        line-height: 1.5;
    }

    /* Modales */
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0,0,0,0.6);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }

    .modal-content {
        background-color: white;
        padding: 40px;
        border-radius: 10px;
        text-align: center;
        max-width: 500px;
        width: 90%;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .modal-content h2 { margin-top: 0; }

    .modal-btn {
        display: block;
        width: 100%;
        padding: 15px;
        margin: 15px 0;
        background-color: var(--accent);
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 1rem;
        cursor: pointer;
        transition: 0.2s;
    }

    .modal-btn:hover { background-color: #2980b9; }
    
    #end-modal .modal-btn { background-color: var(--primary); }
    #end-modal .modal-btn:hover { background-color: var(--secondary); }

    .hidden { display: none !important; }
</style>
</head>
<body>

<div id="sidebar" class="hidden">
    <h2>Navegación</h2>
    <div id="index-container" class="index-grid"></div>
    <button class="finish-btn" onclick="showEndModal()">Finalizar Cuestionario</button>
</div>

<div id="main-content" class="hidden">
    <div id="questions-container"></div>
</div>

<div id="start-modal" class="modal-overlay">
    <div class="modal-content">
        <h2>Configuración del Cuestionario</h2>
        <p>¿Cómo deseas ordenar las preguntas para este intento?</p>
        <button class="modal-btn" onclick="initQuiz(false)">Orden Preestablecido</button>
        <button class="modal-btn" onclick="initQuiz(true)">Orden Aleatorio</button>
    </div>
</div>

<div id="end-modal" class="modal-overlay hidden">
    <div class="modal-content">
        <h2>Cuestionario Finalizado</h2>
        <p id="results-summary"></p>
        <p>Elige una opción para continuar:</p>
        <button class="modal-btn" onclick="retakeQuiz('all')">Repetir TODO el cuestionario</button>
        <button class="modal-btn" id="btn-retake-failed" onclick="retakeQuiz('failed')">Repetir SOLO falladas</button>
        <button class="modal-btn" id="btn-retake-marked" onclick="retakeQuiz('marked')">Repetir SOLO marcadas</button>
        <button class="modal-btn" id="btn-retake-mixed" onclick="retakeQuiz('failed_marked')">Repetir falladas + marcadas</button>
    </div>
</div>

<script>
// Base de datos de todas las preguntas extraídas literalmente
const masterData = [
    {
        id: 1,
        question: "1. ¡Aviso de clase! ¿Cuál de las siguientes afirmaciones define correctamente el concepto fisiológico de \"Hemostasia\"?",
        options: [
            { text: "A) Es el conjunto de mecanismos para el mantenimiento de unas condiciones estables del medio interno (pH, temperatura).", isCorrect: false },
            { text: "B) Es el conjunto de acontecimientos que ocurren tras la lesión de un vaso para evitar la pérdida de sangre, sin llegar a ocluir el flujo sanguíneo basal.", isCorrect: true },
            { text: "C) Es la lisis de los eritrocitos viejos en el bazo.", isCorrect: false },
            { text: "D) Es el proceso exclusivo de vasoconstricción local sin implicación celular.", isCorrect: false }
        ],
        explanation: "Explicación: El profesor advirtió explícitamente no confundir Hemostasia (detener hemorragias) con Homeostasis (opción A, equilibrio del medio interno)."
    },
    {
        id: 2,
        question: "2. Tras la lesión de un vaso sanguíneo, el primer evento inmediato (antes de la formación del tapón) que ocurre para minimizar la pérdida de sangre es:",
        options: [
            { text: "A) La formación de la red de fibrina.", isCorrect: false },
            { text: "B) La vasoconstricción local, mediada por reflejos nerviosos, lesión del músculo liso y factores locales como la serotonina.", isCorrect: true },
            { text: "C) La liberación de prostaciclina (PGI2) endotelial.", isCorrect: false },
            { text: "D) La disolución de la lámina basal.", isCorrect: false }
        ],
        explanation: "Explicación: La hemostasia comienza con una vasoconstricción inmediata para reducir el flujo sanguíneo a la zona lesionada. Posteriormente llegan las plaquetas."
    },
    {
        id: 3,
        question: "3. Teniendo en cuenta la ultraestructura de la plaqueta, ¿qué elementos vitales libera desde sus gránulos DENSOS para retroalimentar la agregación?",
        options: [
            { text: "A) Fibrinógeno y factor de von Willebrand.", isCorrect: false },
            { text: "B) Factor V de coagulación y fibronectina.", isCorrect: false },
            { text: "C) Serotonina, ADP, ATP y Calcio.", isCorrect: true },
            { text: "D) Exclusivamente Óxido Nítrico.", isCorrect: false }
        ],
        explanation: "Explicación: Los gránulos densos (opacos) contienen Serotonina (vasoconstrictor), ADP y ATP (activadores plaquetarios) y Calcio (vital para la coagulación posterior). El fibrinógeno y vWF están en los gránulos Alfa."
    },
    {
        id: 4,
        question: "4. Durante la agregación plaquetaria, ¿qué integrina de membrana utiliza el Fibrinógeno como \"puente\" para enlazar firmemente una plaqueta con otra adyacente?",
        options: [
            { text: "A) L-Selectina.", isCorrect: false },
            { text: "B) Glicoproteína Ib-IX-V (GP Ib).", isCorrect: false },
            { text: "C) Glicoproteína IIb-IIIa (GP IIb-IIIa).", isCorrect: true },
            { text: "D) Integrina alfa-5 beta-1.", isCorrect: false }
        ],
        explanation: "Explicación: Detalle clave de las diapositivas y la clase. La GP IIb/IIIa se une al fibrinógeno para unir plaquetas entre sí. La GP Ib se une al factor de von Willebrand para unir la plaqueta al colágeno expuesto."
    },
    {
        id: 5,
        question: "5. ¡Pregunta debatida en clase! ¿Cuál es el fundamento fisiológico por el cual se receta Ácido Acetilsalicílico (Aspirina) a DOSIS BAJAS para prevenir la formación de trombos espontáneos?",
        options: [
            { text: "A) A dosis bajas inhibe exclusivamente la COX-2 del endotelio, bloqueando la prostaciclina.", isCorrect: false },
            { text: "B) Inhibe la COX-1 plaquetaria (reduciendo el tromboxano A2 proagregante), pero respeta la COX-2 del endotelio sano (manteniendo la prostaciclina antiagregante).", isCorrect: true },
            { text: "C) Bloquea el receptor GP IIb/IIIa directamente.", isCorrect: false },
            { text: "D) Destruye enzimáticamente la red de fibrina recién formada.", isCorrect: false }
        ],
        explanation: "Explicación: El profesor dedicó mucho tiempo a esto. Si das mucha dosis, inhibes ambas enzimas y te quedas sin la PGI2 endotelial protectora. Dando dosis bajas (\"aspirina infantil\"), bloqueas a la plaqueta sin quitarle el freno natural al endotelio."
    },
    {
        id: 6,
        question: "6. El proceso de formación del tapón plaquetario es una cascada de retroalimentación positiva. Sin embargo, este tapón no se expande infinitamente por todo el vaso sanguíneo debido a que:",
        options: [
            { text: "A) Las plaquetas tienen una vida media de solo 2 horas.", isCorrect: false },
            { text: "B) El endotelio intacto circundante secreta Óxido Nítrico (NO) y Prostaciclina (PGI2), que son potentes inhibidores de la adhesión y agregación plaquetaria.", isCorrect: true },
            { text: "C) El hígado secreta continuamente heparina para disolverlo.", isCorrect: false },
            { text: "D) Se agota el ATP circulante.", isCorrect: false }
        ],
        explanation: "Explicación: El endotelio sano ejerce de barrera \"anti-agregante\" limitando la extensión del tapón a la zona estrictamente dañada."
    },
    {
        id: 7,
        question: "7. Un paciente acude a consulta presentando múltiples manchas rojizas puntiformes bajo la piel que desaparecen al presionarlas. El hemograma revela 30.000 plaquetas/mm3 (trombocitopenia grave). A estos signos clínicos se les denomina:",
        options: [
            { text: "A) Puntos rubí o dilataciones capilares seniles.", isCorrect: false },
            { text: "B) Edemas tisulares.", isCorrect: false },
            { text: "C) Petequias.", isCorrect: true },
            { text: "D) Eritroblastosis cutánea.", isCorrect: false }
        ],
        explanation: "Explicación: El profesor aclara que estos pequeños sangrados por fallo plaquetario se llaman petequias, diferenciándolos de los \"puntos rojos\" fisiológicos por envejecimiento."
    },
    {
        id: 8,
        question: "8. En la hemostasia primaria, ¿qué potente agente derivado del metabolismo del ácido araquidónico intracelular es sintetizado por la enzima COX-1 dentro de la plaqueta para potenciar el reclutamiento plaquetario y la vasoconstricción?",
        options: [
            { text: "A) Tromboxano A2 (TXA2).", isCorrect: true },
            { text: "B) Prostaciclina (PGI2).", isCorrect: false },
            { text: "C) Óxido Nítrico (NO).", isCorrect: false },
            { text: "D) Calmodulina.", isCorrect: false }
        ],
        explanation: "Explicación: El TXA2 sale de la plaqueta y actúa como un potente activador de nuevas plaquetas (proagregante)."
    },
    {
        id: 9,
        question: "9. Al comparar la actividad del Óxido Nítrico (NO) estudiado en el bloque de inmunidad (macrófagos) con el NO secretado por el endotelio sano durante la hemostasia, es CIERTO que:",
        options: [
            { text: "A) Ambos son producidos en cantidades masivas tóxicas.", isCorrect: false },
            { text: "B) El NO del endotelio es sintetizado por la eNOS regulada estrictamente por el Calcio, actuando localmente a bajas dosis como vasodilatador y antiagregante.", isCorrect: true },
            { text: "C) El NO del endotelio es producido por la enzima iNOS (inducible) de forma constitutiva y citotóxica.", isCorrect: false },
            { text: "D) El NO promueve la formación de la red de fibrina.", isCorrect: false }
        ],
        explanation: "Explicación: Espléndida conexión intertemática del profesor. Aclara que el NO endotelial (eNOS) sí depende del calcio y son niveles bajitos regulatorios, en contraposición a la iNOS destructiva y descontrolada del macrófago."
    },
    {
        id: 10,
        question: "10. Fisiológicamente, ¿por qué la disfunción plaquetaria (ej. Enfermedad de von Willebrand) se traduce en un \"tiempo de hemorragia\" anormalmente elevado?",
        options: [
            { text: "A) Porque el paciente carece de eritrocitos para coagular.", isCorrect: false },
            { text: "B) Porque se bloquea la síntesis hepática de albúmina.", isCorrect: false },
            { text: "C) Porque falla la hemostasia primaria (formación del tapón laxo) y la plaqueta no puede anclarse al colágeno expuesto de la lámina basal.", isCorrect: true },
            { text: "D) Porque el endotelio secreta exceso de tromboxano.", isCorrect: false }
        ],
        explanation: "Explicación: Sin el factor de von Willebrand, la GP Ib de la plaqueta no tiene a qué agarrarse en el subendotelio; el tapón no se forma y la herida sigue sangrando."
    },
    {
        id: 11,
        question: "**(REPASO INTEGRADO DE ALTA RENTABILIDAD) ** 11. Cuidado con el falso Fenotipo Bombay. Si un paciente tiene genotipo hh, carece genéticamente del antígeno H en sus glóbulos rojos. En caso de transfusión de urgencia:",
        options: [
            { text: "A) Puede recibir sangre tipo O, ya que es el donante universal.", isCorrect: false },
            { text: "B) No puede recibir sangre tipo O, puesto que la sangre O normal posee altas cantidades de antígeno H, frente al cual el Bombay posee potentes anticuerpos \"Anti-H\".", isCorrect: true },
            { text: "C) Puede recibir sangre AB positiva.", isCorrect: false },
            { text: "D) No necesita transfusión porque su hemoglobina es más afín al oxígeno.", isCorrect: false }
        ],
        explanation: "Explicación: Trampa de clase repetida. El paciente Bombay destruirá la sangre 'O' porque la sangre 'O' es esencialmente antígeno H puro."
    },
    {
        id: 12,
        question: "12. En la estructura de los anticuerpos del sistema ABO, las aglutininas \"Anti-A\" y \"Anti-B\" naturales no causan eritroblastosis fetal en la mujer embarazada porque:",
        options: [
            { text: "A) El líquido amniótico inactiva los anticuerpos.", isCorrect: false },
            { text: "B) Son inmunoglobulinas de tipo IgG que cruzan la placenta pero no dañan al feto.", isCorrect: false },
            { text: "C) Son inmunoglobulinas de tipo IgM, estructuralmente pentaméricas y tan grandes que no pueden atravesar la barrera placentaria.", isCorrect: true },
            { text: "D) El sistema ABO no se expresa en humanos.", isCorrect: false }
        ],
        explanation: "Explicación: Este es el motivo fisiológico principal. La IgM es gigantesca frente a la IgG (sistema Rh) que sí es capaz de cruzar por transcitosis."
    },
    {
        id: 13,
        question: "13. Si introducimos glóbulos rojos sanos (~300 mOsm) en una solución que contiene 300 mOsm totales pero conformados principalmente por UREA, la consecuencia física será:",
        options: [
            { text: "A) Estabilidad absoluta, la solución es isotónica.", isCorrect: false },
            { text: "B) Crenación o encogimiento celular.", isCorrect: false },
            { text: "C) La entrada pasiva de la Urea hacia la célula, arrastrando agua por ósmosis y provocando la lisis (rotura) del eritrocito.", isCorrect: true },
            { text: "D) Salida de glucosa compensatoria.", isCorrect: false }
        ],
        explanation: "Explicación: La urea es un soluto penetrante. Destruye la isosmolaridad original entrando a la célula y convirtiendo el medio exterior en hipotónico, por lo que el agua inunda la célula."
    },
    {
        id: 14,
        question: "14. Según la definición fisiológica exacta mencionada por el profesor en clase, un paciente tiene \"Anemia\" fundamentalmente cuando:",
        options: [
            { text: "A) Su recuento absoluto de eritrocitos baja de 5 millones.", isCorrect: false },
            { text: "B) Sufre una disminución de su capacidad de transportar oxígeno hacia los tejidos (por ejemplo, por metahemoglobina o déficit de hierro).", isCorrect: true },
            { text: "C) Aumenta su viscosidad sanguínea por exceso de plaquetas.", isCorrect: false },
            { text: "D) Su volumen de plasma es anormalmente alto.", isCorrect: false }
        ],
        explanation: "Explicación: El profesor fue tajante: la anemia no es solo tener pocos glóbulos, sino \"una disminución en la capacidad de transporte de oxígeno\". Una metahemoglobinemia (con glóbulos rojos en número normal pero inútiles) cursa con hipoxia tisular."
    },
    {
        id: 15,
        question: "15. ¿Qué órgano es el responsable principal de censar la hipoxia tisular (mediante el factor HIF-1) y sintetizar el 90% de la hormona Eritropoyetina (EPO) modulable para aumentar la eritropoyesis?",
        options: [
            { text: "A) El hígado.", isCorrect: false },
            { text: "B) La médula ósea.", isCorrect: false },
            { text: "C) El bazo.", isCorrect: false },
            { text: "D) El riñón.", isCorrect: true }
        ],
        explanation: "Explicación: El riñón produce la EPO dependiente de hipoxia (90%), mientras que el hígado mantiene una cuota basal (10%) que no responde a la falta de oxígeno."
    },
    {
        id: 16,
        question: "16. ¿Qué ocurre fisiológicamente en el músculo esquelético si administramos una toxina que bloquea específicamente a las bombas SERCA del retículo sarcoplásmico?",
        options: [
            { text: "A) El músculo será incapaz de contraerse (parálisis flácida).", isCorrect: false },
            { text: "B) El músculo quedará permanentemente contraído o espasmado al ser incapaz de recaptar activamente el Calcio libre citosólico necesario para la relajación.", isCorrect: true },
            { text: "C) Aumentará la actividad de la acetilcolinesterasa.", isCorrect: false },
            { text: "D) Los túbulos T dejarán de conducir el voltaje.", isCorrect: false }
        ],
        explanation: "Explicación: La relajación del músculo estriado es un proceso ACTIVO. Requiere ATP y la bomba SERCA para barrer el calcio. Sin ella, los puentes cruzados no se sueltan."
    },
    {
        id: 17,
        question: "17. Un paciente acude con choque anafiláctico (liberación sistémica de histamina por los mastocitos). El cuadro clínico incluirá vasodilatación periférica masiva y broncoconstricción. El tratamiento inmediato para antagonizar estos efectos es inyectar:",
        options: [
            { text: "A) Serotonina pura.", isCorrect: false },
            { text: "B) Óxido Nítrico.", isCorrect: false },
            { text: "C) Adrenalina.", isCorrect: true },
            { text: "D) Antihistamínicos orales.", isCorrect: false }
        ],
        explanation: "Explicación: La adrenalina contrae los vasos (recuperando la presión sanguínea) y dilata los bronquios, revirtiendo exactamente los síntomas mortales de la histamina."
    },
    {
        id: 18,
        question: "18. En la neurotransmisión presináptica, el evento físico-químico estrictamente necesario para que el complejo SNARE permita la exocitosis de las vesículas a la hendidura es:",
        options: [
            { text: "A) La hiperpolarización del terminal.", isCorrect: false },
            { text: "B) La entrada masiva del ión Calcio (Ca2+) a través de canales voltaje-dependientes.", isCorrect: true },
            { text: "C) La apertura de canales de fuga de potasio.", isCorrect: false },
            { text: "D) La síntesis in situ de óxido nítrico.", isCorrect: false }
        ],
        explanation: "Explicación: El potencial de acción llega al botón, abre canales de Ca2+ de voltaje, y ese calcio es la \"llave\" que ordena a la vesícula fusionarse con la membrana."
    },
    {
        id: 19,
        question: "19. El neurotransmisor inhibidor más abundante en el sistema nervioso central (GABA) ejerce sus efectos inhibidores al unirse a su receptor ionotrópico y permitir:",
        options: [
            { text: "A) La salida explosiva de iones Sodio.", isCorrect: false },
            { text: "B) La entrada masiva del anión Cloro (Cl-), hiperpolarizando (IPSP) la célula y alejándola del umbral.", isCorrect: true },
            { text: "C) La apertura de canales de Calcio.", isCorrect: false },
            { text: "D) El cierre de canales de Potasio pasivos.", isCorrect: false }
        ],
        explanation: "Explicación: Introducir cargas negativas (Cl-) hunde el voltaje basal, haciendo a la neurona resistente a la excitación."
    },
    {
        id: 20,
        question: "20. El Efecto Bohr en la curva de saturación de la hemoglobina es un mecanismo adaptativo brillante. Al aumentar el CO2, el ácido (H+), la temperatura y el 2,3-DPG en un tejido ejercitándose, la curva:",
        options: [
            { text: "A) Se desplaza hacia la izquierda, bloqueando la liberación de O2.", isCorrect: false },
