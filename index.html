<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import {
    getAuth,
    onAuthStateChanged,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signOut,
    sendPasswordResetEmail,
    updatePassword,
    updateEmail,
    EmailAuthProvider,
    reauthenticateWithCredential
  } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
  import {
    getDatabase,
    ref as dbRef,
    get,
    set,
    update,
    push,
    remove
  } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
  import {
    getStorage,
    ref as storageRef,
    uploadBytes,
    getDownloadURL,
    deleteObject
  } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAKughV5w2XAKRm3rWuUmhVldwU2bjj0zY",
    authDomain: "portal-estudio-medicina.firebaseapp.com",
    databaseURL: "https://portal-estudio-medicina-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "portal-estudio-medicina",
    storageBucket: "portal-estudio-medicina.firebasestorage.app",
    messagingSenderId: "536326985694",
    appId: "1:536326985694:web:ee2428d39421653be26f4f",
    measurementId: "G-52KKQDCFXD"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  const storage = getStorage(app);

  const ADMIN_EMAILS = ["santiagodiaz@gmail.com"];
  const ADMIN_USERNAMES = ["santi", "santiagodiaz", "santiagodiazf", "santiago"];

  let currentUser = null;
  let currentProfile = null;
  let commonInterval = null;
  let notifInterval = null;

  function slugifyUsername(str) {
    return String(str || "")
      .trim()
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-z0-9._-]/g, "");
  }

  function escapeHtml(str) {
    return String(str ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function formatDateTime(iso) {
    if (!iso) return "—";
    try { return new Date(iso).toLocaleString("es-ES"); }
    catch { return iso; }
  }

  function getConversationId(a, b) {
    return [a, b].sort().join("__");
  }

  function isAdminEmail(email) {
    return ADMIN_EMAILS.includes(String(email || "").trim().toLowerCase());
  }

  function isAdminUsername(username) {
    return ADMIN_USERNAMES.includes(slugifyUsername(username));
  }

  function isAdmin() {
    return currentProfile?.role === "admin" ||
           isAdminEmail(currentProfile?.email) ||
           isAdminUsername(currentProfile?.username);
  }

  function isApproved() {
    return !!currentProfile?.approved || isAdmin();
  }

  function showAuthMode(mode) {
    document.getElementById("login-form").classList.toggle("hidden", mode !== "login");
    document.getElementById("register-form").classList.toggle("hidden", mode !== "register");
    document.getElementById("auth-subtitle").textContent =
      mode === "login"
        ? "Inicia sesión con tu correo o nombre de usuario y contraseña."
        : "Crea tu cuenta con tus datos académicos.";
    clearAuthMsgs();
  }
  window.showAuthMode = showAuthMode;

  function setAuthError(msg) {
    const el = document.getElementById("auth-error");
    const ok = document.getElementById("auth-ok");
    ok.style.display = "none";
    el.style.display = "block";
    el.textContent = msg;
  }

  function setAuthOk(msg) {
    const el = document.getElementById("auth-ok");
    const err = document.getElementById("auth-error");
    err.style.display = "none";
    el.style.display = "block";
    el.textContent = msg;
  }

  function clearAuthMsgs() {
    document.getElementById("auth-error").style.display = "none";
    document.getElementById("auth-ok").style.display = "none";
  }

  function friendlyFirebaseError(e) {
    const code = e?.code || "";
    if (code.includes("invalid-credential") || code.includes("invalid-login-credentials")) {
      return "Usuario/correo o contraseña incorrectos.";
    }
    if (code.includes("user-not-found")) {
      return "No existe esa cuenta.";
    }
    if (code.includes("wrong-password")) {
      return "La contraseña no es correcta.";
    }
    if (code.includes("email-already-in-use")) {
      return "Ese correo ya está registrado.";
    }
    if (code.includes("requires-recent-login")) {
      return "Por seguridad, vuelve a iniciar sesión antes de hacer ese cambio.";
    }
    return e?.message || "Ha ocurrido un error.";
  }

  async function usernameAvailable(usernameSlug, currentUid = null) {
    const snap = await get(dbRef(db, "usernames/" + usernameSlug));
    if (!snap.exists()) return true;
    return snap.val() === currentUid;
  }

  async function findProfileByUsernameSlug(usernameSlug) {
    const profilesSnap = await get(dbRef(db, "profiles"));
    if (!profilesSnap.exists()) return null;
    const profiles = profilesSnap.val() || {};
    const match = Object.values(profiles).find(
      p => slugifyUsername(p.usernameSlug || p.username || "") === usernameSlug
    );
    return match || null;
  }

  async function repairUsernameIndex(uid, usernameOrSlug) {
    const slug = slugifyUsername(usernameOrSlug);
    if (!slug || !uid) return;
    await set(dbRef(db, "usernames/" + slug), uid);
  }

  async function resolveEmailFromIdentifier(identifier) {
    const value = String(identifier || "").trim();
    if (!value) return "";

    if (value.includes("@")) return value.toLowerCase();

    const usernameSlug = slugifyUsername(value);

    if (isAdminUsername(usernameSlug)) {
      return "santiagodiaz@gmail.com";
    }

    const usernameSnap = await get(dbRef(db, "usernames/" + usernameSlug));
    if (usernameSnap.exists()) {
      const uid = usernameSnap.val();
      const profileSnap = await get(dbRef(db, "profiles/" + uid));
      if (profileSnap.exists() && profileSnap.val()?.email) {
        return String(profileSnap.val().email).toLowerCase();
      }
    }

    const profile = await findProfileByUsernameSlug(usernameSlug);
    if (profile?.uid && profile?.email) {
      await repairUsernameIndex(profile.uid, usernameSlug);
      return String(profile.email).toLowerCase();
    }

    throw new Error("Nombre de usuario no encontrado.");
  }

  async function login() {
    clearAuthMsgs();
    const identifier = document.getElementById("login-identifier").value.trim();
    const password = document.getElementById("login-password").value;

    if (!identifier || !password) {
      setAuthError("Introduce correo o nombre de usuario, y contraseña.");
      return;
    }

    try {
      const email = await resolveEmailFromIdentifier(identifier);
      await signInWithEmailAndPassword(auth, email, password);
    } catch (e) {
      setAuthError(friendlyFirebaseError(e));
    }
  }
  window.login = login;

  async function sendReset() {
    clearAuthMsgs();
    const identifier = document.getElementById("login-identifier").value.trim();

    if (!identifier) {
      setAuthError("Escribe tu correo o nombre de usuario para restablecer la contraseña.");
      return;
    }

    try {
      const email = await resolveEmailFromIdentifier(identifier);
      await sendPasswordResetEmail(auth, email);
      setAuthOk("Correo de restablecimiento enviado. Revisa también la carpeta de spam o correo no deseado.");
    } catch (e) {
      setAuthError(friendlyFirebaseError(e));
    }
  }
  window.sendReset = sendReset;

  async function register() {
    clearAuthMsgs();

    const username = document.getElementById("reg-username").value.trim();
    const usernameSlug = slugifyUsername(username);
    const curso = document.getElementById("reg-curso").value.trim();
    const nombre = document.getElementById("reg-nombre").value.trim();
    const apellidos = document.getElementById("reg-apellidos").value.trim();
    const email = document.getElementById("reg-email").value.trim().toLowerCase();
    const telefono = document.getElementById("reg-telefono").value.trim();
    const password = document.getElementById("reg-password").value;
    const bio = document.getElementById("reg-bio").value.trim();

    if (!username || !curso || !nombre || !apellidos || !email || !telefono || !password) {
      setAuthError("Completa todos los campos obligatorios.");
      return;
    }

    if (usernameSlug.length < 3) {
      setAuthError("El nombre de usuario debe tener al menos 3 caracteres válidos.");
      return;
    }

    if (password.length < 6) {
      setAuthError("La contraseña debe tener al menos 6 caracteres.");
      return;
    }

    try {
      const available = await usernameAvailable(usernameSlug);
      if (!available) {
        setAuthError("Ese nombre de usuario ya existe.");
        return;
      }

      const cred = await createUserWithEmailAndPassword(auth, email, password);
      const uid = cred.user.uid;
      const admin = isAdminEmail(email) || isAdminUsername(username);

      const profile = {
        uid,
        username,
        usernameSlug,
        nombre,
        apellidos,
        curso,
        email,
        telefono,
        bio,
        photoURL: "",
        approved: !!admin,
        role: admin ? "admin" : "user",
        canUpload: true,
        createdAt: new Date().toISOString(),
        publicVisible: true
      };

      await set(dbRef(db, "profiles/" + uid), profile);
      await set(dbRef(db, "usernames/" + usernameSlug), uid);
      setAuthOk("Cuenta creada correctamente.");
    } catch (e) {
      setAuthError(friendlyFirebaseError(e));
    }
  }
  window.register = register;

  async function signOutUser() {
    stopCommonAuto();
    stopNotifAuto();
    await signOut(auth);
  }
  window.signOutUser = signOutUser;

  function setTopUser(profile) {
    document.getElementById("top-name").textContent = profile?.username || "Usuario";
    document.getElementById("top-line").textContent = `${profile?.email || ""} · ${profile?.curso || ""}`;
    const avatar = document.getElementById("top-avatar");
    if (profile?.photoURL) {
      avatar.innerHTML = `<img src="${profile.photoURL}" alt="avatar">`;
    } else {
      avatar.textContent = (profile?.username || "U").charAt(0).toUpperCase();
    }
  }

  function setApprovalBox(profile) {
    const box = document.getElementById("approval-box");
    box.innerHTML = `
      <div class="row" style="justify-content:space-between;align-items:center;">
        <div>
          <h4 style="margin-bottom:6px;">Estado de acceso</h4>
          <p>${isApproved() ? "Tu cuenta está activa y aprobada." : "Tu cuenta está pendiente de aprobación por el administrador."}</p>
        </div>
        <span class="pill ${isApproved() ? "on" : "off"}">${isApproved() ? "Acceso activo" : "Pendiente"}</span>
      </div>
      <div class="row" style="margin-top:10px;">
        <span class="pill ${profile.canUpload ? "on" : "off"}">${profile.canUpload ? "Puede subir archivos" : "Subidas bloqueadas"}</span>
        <span class="pill ${profile.publicVisible !== false ? "on" : "off"}">${profile.publicVisible !== false ? "Perfil público visible" : "Perfil oculto"}</span>
        ${isAdmin() ? '<span class="pill on">Administrador</span>' : ''}
      </div>
    `;
  }

  async function loadProfile(uid) {
    const snap = await get(dbRef(db, "profiles/" + uid));
    return snap.exists() ? snap.val() : null;
  }

  function fillProfileForm(profile) {
    document.getElementById("profile-username").value = profile?.username || "";
    document.getElementById("profile-curso").value = profile?.curso || "";
    document.getElementById("profile-nombre").value = profile?.nombre || "";
    document.getElementById("profile-apellidos").value = profile?.apellidos || "";
    document.getElementById("profile-email").value = profile?.email || "";
    document.getElementById("profile-telefono").value = profile?.telefono || "";
    document.getElementById("profile-bio").value = profile?.bio || "";

    document.getElementById("profile-title-name").textContent =
      `${profile?.nombre || ""} ${profile?.apellidos || ""}`.trim() || "Mi perfil";
    document.getElementById("profile-title-sub").textContent = "@" + (profile?.username || "usuario");

    const preview = document.getElementById("profile-photo-preview");
    if (profile?.photoURL) {
      preview.innerHTML = `<img src="${profile.photoURL}" alt="foto">`;
    } else {
      preview.textContent = (profile?.username || "U").charAt(0).toUpperCase();
    }
  }

  async function saveProfile() {
    if (!currentUser || !currentProfile) return;

    const newUsername = document.getElementById("profile-username").value.trim();
    const newUsernameSlug = slugifyUsername(newUsername);
    const curso = document.getElementById("profile-curso").value.trim();
    const nombre = document.getElementById("profile-nombre").value.trim();
    const apellidos = document.getElementById("profile-apellidos").value.trim();
    const newEmail = document.getElementById("profile-email").value.trim().toLowerCase();
    const telefono = document.getElementById("profile-telefono").value.trim();
    const bio = document.getElementById("profile-bio").value.trim();
    const debug = document.getElementById("profile-debug");

    debug.style.display = "none";

    if (!newUsername || !curso || !nombre || !apellidos || !telefono || !newEmail) {
      debug.style.display = "block";
      debug.textContent = "Completa todos los campos obligatorios del perfil.";
      return;
    }

    try {
      if (!(await usernameAvailable(newUsernameSlug, currentUser.uid))) {
        debug.style.display = "block";
        debug.textContent = "Ese nombre de usuario ya está ocupado.";
        return;
      }

      if (newEmail !== currentProfile.email) {
        await updateEmail(currentUser, newEmail);
      }

      const updates = {
        username: newUsername,
        usernameSlug: newUsernameSlug,
        curso,
        nombre,
        apellidos,
        email: newEmail,
        telefono,
        bio,
        updatedAt: new Date().toISOString()
      };

      if (isAdminEmail(newEmail) || isAdminUsername(newUsername)) {
        updates.role = "admin";
        updates.approved = true;
      }

      await update(dbRef(db, "profiles/" + currentUser.uid), updates);

      if (newUsernameSlug !== currentProfile.usernameSlug) {
        await set(dbRef(db, "usernames/" + newUsernameSlug), currentUser.uid);
        if (currentProfile.usernameSlug) {
          await remove(dbRef(db, "usernames/" + currentProfile.usernameSlug));
        }
      }

      currentProfile = { ...currentProfile, ...updates };
      setTopUser(currentProfile);
      fillProfileForm(currentProfile);
      setApprovalBox(currentProfile);
      document.getElementById("admin-nav-btn").classList.toggle("hidden", !isAdmin());
      debug.style.display = "block";
      debug.textContent = "Datos de cuenta y perfil guardados correctamente.";
      await loadPublicProfiles();
      await populatePrivateUsers();
    } catch (e) {
      console.error(e);
      debug.style.display = "block";
      debug.textContent = friendlyFirebaseError(e);
    }
  }
  window.saveProfile = saveProfile;

  async function uploadProfilePhoto() {
    if (!currentUser) return;

    const fileInput = document.getElementById("profile-photo-file");
    const file = fileInput.files[0];
    const debug = document.getElementById("profile-debug");

    if (!file) {
      debug.style.display = "block";
      debug.textContent = "Selecciona una imagen.";
      return;
    }

    try {
      const path = `profilePhotos/${currentUser.uid}/${Date.now()}_${file.name}`;
      const sRef = storageRef(storage, path);
      await uploadBytes(sRef, file);
      const url = await getDownloadURL(sRef);

      await update(dbRef(db, "profiles/" + currentUser.uid), {
        photoURL: url,
        updatedAt: new Date().toISOString()
      });

      currentProfile.photoURL = url;
      setTopUser(currentProfile);
      fillProfileForm(currentProfile);
      debug.style.display = "block";
      debug.textContent = "Foto subida correctamente.";
      await loadPublicProfiles();
    } catch (e) {
      console.error(e);
      debug.style.display = "block";
      debug.textContent = "No se pudo subir la foto.";
    }
  }
  window.uploadProfilePhoto = uploadProfilePhoto;

  async function loadPublicProfiles() {
    const wrap = document.getElementById("profiles-list");
    wrap.innerHTML = "<div class='card'>Cargando perfiles...</div>";

    try {
      const snap = await get(dbRef(db, "profiles"));
      const data = snap.exists() ? snap.val() : {};
      let users = Object.values(data).filter(p => p.publicVisible !== false && p.approved);

      const search = document.getElementById("profiles-search").value.trim().toLowerCase();
      const courseFilter = document.getElementById("profiles-course-filter").value.trim().toLowerCase();
      const sort = document.getElementById("profiles-sort").value;

      if (search) {
        users = users.filter(u =>
          String(u.username || "").toLowerCase().includes(search) ||
          String(u.nombre || "").toLowerCase().includes(search) ||
          String(u.apellidos || "").toLowerCase().includes(search)
        );
      }

      if (courseFilter) {
        users = users.filter(u => String(u.curso || "").toLowerCase().includes(courseFilter));
      }

      if (sort === "recent") {
        users.sort((a,b) => Number(new Date(b.createdAt || 0)) - Number(new Date(a.createdAt || 0)));
      } else {
        users.sort((a,b) => String(a.username || "").localeCompare(String(b.username || ""), "es"));
      }

      if (!users.length) {
        wrap.innerHTML = "<div class='card'>No hay perfiles públicos disponibles con ese filtro.</div>";
        return;
      }

      wrap.innerHTML = users.map(user => `
        <div class="user-card">
          <div class="user-card-top">
            <div class="mini-avatar">
              ${user.photoURL ? `<img src="${user.photoURL}" alt="avatar">` : escapeHtml((user.username || "U").charAt(0).toUpperCase())}
            </div>
            <div>
              <strong>@${escapeHtml(user.username || "")}</strong>
              <div class="muted">${escapeHtml(user.nombre || "")} ${escapeHtml(user.apellidos || "")}</div>
            </div>
          </div>
          <div class="muted" style="margin-bottom:8px;">Curso: ${escapeHtml(user.curso || "")}</div>
          <p>${escapeHtml((user.bio || "").slice(0, 120))}${(user.bio || "").length > 120 ? "..." : ""}</p>
          <button class="btn btn-primary" onclick="openProfileModal('${user.uid}')">Ver perfil</button>
        </div>
      `).join("");
    } catch (e) {
      console.error(e);
      wrap.innerHTML = "<div class='card'>No se pudieron cargar los perfiles.</div>";
    }
  }

  async function openProfileModal(uid) {
    const profile = await loadProfile(uid);
    if (!profile) return;

    document.getElementById("modal-profile-name").textContent = profile.username || "Usuario";
    document.getElementById("modal-profile-sub").textContent = `@${profile.username || ""}`;
    document.getElementById("modal-profile-course").textContent = profile.curso || "—";
    document.getElementById("modal-profile-fullname").textContent = `${profile.nombre || ""} ${profile.apellidos || ""}`.trim() || "—";
    document.getElementById("modal-profile-bio").textContent = profile.bio || "Sin descripción.";

    const photo = document.getElementById("modal-profile-photo");
    if (profile.photoURL) {
      photo.innerHTML = `<img src="${profile.photoURL}" alt="foto">`;
    } else {
      photo.textContent = (profile.username || "U").charAt(0).toUpperCase();
    }

    const fileBox = document.getElementById("modal-profile-files");
    fileBox.innerHTML = "Cargando archivos...";
    try {
      const snap = await get(dbRef(db, "sharedFiles"));
      const data = snap.exists() ? snap.val() : {};
      const files = Object.values(data).filter(f => f.ownerUid === uid && f.approved && f.visible !== false);
      if (!files.length) {
        fileBox.innerHTML = "<p class='muted'>Este usuario no ha compartido archivos visibles todavía.</p>";
      } else {
        fileBox.innerHTML = files.map(f => `
          <div class="file-item">
            <div class="file-meta">${escapeHtml(f.title || "Archivo")} · ${escapeHtml(formatDateTime(f.createdAt))}</div>
            <div style="margin-bottom:8px;">
              <strong>Curso:</strong> ${escapeHtml(f.course || "—")} ·
              <strong>Cuatrimestre:</strong> ${escapeHtml(f.semester || "—")} ·
              <strong>Asignatura:</strong> ${escapeHtml(f.subject || "—")} ·
              <strong>Tipo:</strong> ${escapeHtml(f.category || "—")}
            </div>
            <div style="margin-bottom:8px;">${escapeHtml(f.description || "")}</div>
            <a class="btn btn-dark" href="${f.url}" target="_blank" rel="noopener noreferrer">Abrir archivo</a>
          </div>
        `).join("");
      }
    } catch {
      fileBox.innerHTML = "<p class='muted'>No se pudieron cargar los archivos.</p>";
    }

    document.getElementById("profile-modal-backdrop").style.display = "flex";
  }
  window.openProfileModal = openProfileModal;

  function closeProfileModal() {
    document.getElementById("profile-modal-backdrop").style.display = "none";
  }
  window.closeProfileModal = closeProfileModal;

  function openPasswordModal() {
    document.getElementById("pwd-current").value = "";
    document.getElementById("pwd-new").value = "";
    document.getElementById("pwd-confirm").value = "";
    document.getElementById("pwd-error").style.display = "none";
    document.getElementById("pwd-ok").style.display = "none";
    document.getElementById("password-modal-backdrop").style.display = "flex";
  }
  window.openPasswordModal = openPasswordModal;

  function closePasswordModal() {
    document.getElementById("password-modal-backdrop").style.display = "none";
  }
  window.closePasswordModal = closePasswordModal;

  async function changePassword() {
    const current = document.getElementById("pwd-current").value;
    const next = document.getElementById("pwd-new").value;
    const confirm = document.getElementById("pwd-confirm").value;
    const err = document.getElementById("pwd-error");
    const ok = document.getElementById("pwd-ok");

    err.style.display = "none";
    ok.style.display = "none";

    if (!current || !next || !confirm) {
      err.style.display = "block";
      err.textContent = "Completa todos los campos.";
      return;
    }

    if (next !== confirm) {
      err.style.display = "block";
      err.textContent = "La nueva contraseña no coincide.";
      return;
    }

    try {
      const credential = EmailAuthProvider.credential(currentUser.email, current);
      await reauthenticateWithCredential(currentUser, credential);
      await updatePassword(currentUser, next);
      ok.style.display = "block";
      ok.textContent = "Contraseña cambiada correctamente.";
    } catch (e) {
      err.style.display = "block";
      err.textContent = friendlyFirebaseError(e);
    }
  }
  window.changePassword = changePassword;

  async function populatePrivateUsers() {
    const select = document.getElementById("private-user-select");
    const snap = await get(dbRef(db, "profiles"));
    const data = snap.exists() ? snap.val() : {};
    const profiles = Object.values(data)
      .filter(p => p.uid !== currentUser.uid && p.approved)
      .sort((a,b) => String(a.username || "").localeCompare(String(b.username || ""), "es"));

    if (!profiles.length) {
      select.innerHTML = `<option value="">No hay otros usuarios</option>`;
      return;
    }

    const previous = select.value;
    select.innerHTML = profiles.map(p => `<option value="${p.uid}">@${escapeHtml(p.username || "")} · ${escapeHtml(p.curso || "")}</option>`).join("");
    if (profiles.some(p => p.uid === previous)) select.value = previous;
  }

  async function getUserState() {
    if (!currentUser) return {};
    const snap = await get(dbRef(db, "userState/" + currentUser.uid));
    return snap.exists() ? (snap.val() || {}) : {};
  }

  async function markCommonRead(timestamp = 0) {
    if (!currentUser) return;
    await update(dbRef(db, "userState/" + currentUser.uid), {
      commonLastRead: Number(timestamp || 0)
    });
  }

  async function markPrivateRead(otherUid, timestamp = 0) {
    if (!currentUser || !otherUid) return;
    await update(dbRef(db, "userState/" + currentUser.uid + "/privateLastRead"), {
      [otherUid]: Number(timestamp || 0)
    });
  }

  async function loadCommonMessages(markAsRead = true) {
    const box = document.getElementById("common-list");
    const debug = document.getElementById("common-debug");
    debug.style.display = "none";

    try {
      const snapshot = await get(dbRef(db, "commonRoom"));
      const data = snapshot.exists() ? snapshot.val() : {};
      const messages = Object.entries(data).map(([id,val]) => ({ id, ...val }));
      messages.sort((a,b) => Number(a.timestamp || 0) - Number(b.timestamp || 0));
      const last = messages.slice(-100);

      if (!last.length) {

        <div class="msg-item ${msg.fromUid === currentUser.uid ? "mine" : ""}">

  async function renderNotifications() {
    if (!currentUser) return;

    const privateBox = document.getElementById("notif-private");
    const commonBox = document.getElementById("notif-common");
    const none = document.getElementById("notif-none");

    privateBox.classList.add("hidden");
    commonBox.classList.add("hidden");

    try {
      const state = await getUserState();

      const commonSnap = await get(dbRef(db, "commonRoom"));
      const commonData = commonSnap.exists() ? commonSnap.val() : {};
      const commonMessages = Object.values(commonData || {});
      const commonUnread = commonMessages.filter(m =>
        Number(m.timestamp || 0) > Number(state.commonLastRead || 0) &&
        m.fromUid !== currentUser.uid
      ).length;

      if (commonUnread > 0) {
        commonBox.classList.remove("hidden");
        document.getElementById("notif-common-text").textContent = `Tienes ${commonUnread} mensaje(s) nuevos en la sala común.`;
      }

      const privateSnap = await get(dbRef(db, "privateMessages"));
      const privateAll = privateSnap.exists() ? privateSnap.val() : {};
      const lastRead = state.privateLastRead || {};
      let privateUnread = 0;

      Object.entries(privateAll).forEach(([convoId, convo]) => {
        if (!convoId.includes(currentUser.uid)) return;
        const otherUid = convoId.split("__").find(x => x !== currentUser.uid);
        const readTs = Number(lastRead?.[otherUid] || 0);
        Object.values(convo || {}).forEach(msg => {
          if (msg.toUid === currentUser.uid && Number(msg.timestamp || 0) > readTs) {
            privateUnread++;
          }
        });
      });

      if (privateUnread > 0) {
        privateBox.classList.remove("hidden");
        document.getElementById("notif-private-text").textContent = `Tienes ${privateUnread} mensaje(s) privado(s) sin leer.`;
      }

      none.classList.toggle("hidden", commonUnread > 0 || privateUnread > 0);
    } catch (e) {
      console.error(e);
    }
  }

  async function uploadSharedFile() {
    if (!currentUser || !isApproved()) return;

    const title = document.getElementById("upload-title").value.trim();
    const course = document.getElementById("upload-course").value;
    const semester = document.getElementById("upload-semester").value;
    const subject = document.getElementById("upload-subject").value;
    const category = document.getElementById("upload-category").value;
    const description = document.getElementById("upload-description").value.trim();
    const file = document.getElementById("upload-file").files[0];
    const debug = document.getElementById("files-debug");

    debug.style.display = "none";

    if (!currentProfile.canUpload) {
      debug.style.display = "block";
      debug.textContent = "Tus subidas han sido bloqueadas por el administrador.";
      return;
    }

    if (!title || !course || !semester || !subject || !category || !file) {
      debug.style.display = "block";
      debug.textContent = "Completa título, curso, cuatrimestre, asignatura, tipo de material y archivo.";
      return;
    }

    try {
      const path = `sharedFiles/${currentUser.uid}/${Date.now()}_${file.name}`;
      const sRef = storageRef(storage, path);
      await uploadBytes(sRef, file);
      const url = await getDownloadURL(sRef);

      const newRef = push(dbRef(db, "sharedFiles"));
      await set(newRef, {
        id: newRef.key,
        ownerUid: currentUser.uid,
        ownerUsername: currentProfile.username,
        title,
        description,
        course,
        semester,
        subject,
        category,
        fileName: file.name,
        url,
        storagePath: path,
        createdAt: new Date().toISOString(),
        timestamp: Date.now(),
        approved: isAdmin(),
        visible: true
      });

      document.getElementById("upload-title").value = "";
      document.getElementById("upload-course").value = "";
      document.getElementById("upload-semester").value = "";
      document.getElementById("upload-subject").value = "";
      document.getElementById("upload-category").value = "";
      document.getElementById("upload-description").value = "";
      document.getElementById("upload-file").value = "";
      debug.style.display = "block";
      debug.textContent = isAdmin() ? "Archivo subido y visible." : "Archivo subido y pendiente de moderación.";
      await loadSharedFiles();
    } catch (e) {
      console.error(e);
      debug.style.display = "block";
      debug.textContent = "No se pudo subir el archivo.";
    }
  }

        };
        await set(dbRef(db, "profiles/" + user.uid), currentProfile);
        await set(dbRef(db, "usernames/" + currentProfile.usernameSlug), user.uid);
      } else {
        await signOut(auth);
        return;
      }
    }

    if (isAdminEmail(currentProfile.email) || isAdminUsername(currentProfile.username)) {
      await update(dbRef(db, "profiles/" + user.uid), { role: "admin", approved: true });
      currentProfile.role = "admin";
      currentProfile.approved = true;
    }

    if (currentProfile.usernameSlug) {
      await repairUsernameIndex(user.uid, currentProfile.usernameSlug);
    } else if (currentProfile.username) {
      currentProfile.usernameSlug = slugifyUsername(currentProfile.username);
      await update(dbRef(db, "profiles/" + user.uid), { usernameSlug: currentProfile.usernameSlug });
      await repairUsernameIndex(user.uid, currentProfile.usernameSlug);
    }

    document.getElementById("admin-nav-btn").classList.toggle("hidden", !isAdmin());

    setTopUser(currentProfile);
    setApprovalBox(currentProfile);
    fillProfileForm(currentProfile);

    await renderNotifications();
    startNotifAuto();
    openView("home");
  });

  showAuthMode("login");
</script>
