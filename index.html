<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Médico Pirata | Comunidad</title>
  <style>
    :root{
      --bg:#f6f0e5; --ink:#173140; --muted:#5c6f78; --navy:#14364a;
      --gold:#d4a85d; --gold2:#f0c987; --danger:#b43e36; --ok:#2d7b57;
      --shadow:0 12px 30px rgba(0,0,0,.09);
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:"Segoe UI", sans-serif; color:var(--ink);
      background: linear-gradient(180deg,#fbf7ef 0%,#f4ede0 100%);
      min-height: 100vh;
    }
    .hidden{display:none !important}
    .auth-screen{
      min-height:100vh; display:grid; place-items:center; padding:24px;
      background: linear-gradient(rgba(8,28,39,.8), rgba(8,28,39,.9));
    }
    .auth-card{
      width:min(500px,100%); background:#fff; border-radius:28px;
      padding:40px; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }
    input, textarea{
      width:100%; padding:14px; margin:10px 0; border:2px solid #ddd;
      border-radius:12px; outline:none; font-size: 1rem;
    }
    .btn{
      padding:14px 20px; border:none; border-radius:12px; font-weight:800;
      cursor:pointer; transition: .2s; width: 100%; margin-top: 10px;
    }
    .btn-primary{ background: linear-gradient(135deg,var(--gold2),var(--gold)); color:#143140; }
    .btn-dark{ background: var(--navy); color:#fff; }
    .msg{ padding:12px; border-radius:10px; margin-top:15px; font-weight:bold; display:none; text-align:center; }
    .msg.error{ background:#fff1ef; color:var(--danger); border:1px solid #f4c8c2; }
    
    /* Layout App */
    .app-shell{ display:none; }
    .topbar{ background:var(--navy); color:#fff; padding:15px; display:flex; justify-content:space-between; align-items:center; }
    .app-content{ display:grid; grid-template-columns: 250px 1fr; gap:20px; padding:20px; max-width:1400px; margin:auto; }
    .side{ background:#fff; border-radius:20px; padding:15px; height: fit-content; box-shadow: var(--shadow); }
    .panel{ background:#fff; border-radius:20px; padding:30px; box-shadow: var(--shadow); min-height: 400px; }
  </style>
</head>
<body>

  <section id="auth-screen" class="auth-screen">
    <div class="auth-card">
      <h2 style="margin-top:0">⚓ Médico Pirata</h2>
      <p id="auth-subtitle">Introduce tu usuario o correo para embarcar.</p>

      <div id="login-form">
        <input id="login-id" type="text" placeholder="Usuario (91143) o Correo" />
        <input id="login-pass" type="password" placeholder="Contraseña" />
        <button class="btn btn-primary" onclick="login()">Entrar</button>
        <button class="btn" style="background:none; color:var(--muted)" onclick="showAuthMode('register')">¿No tienes cuenta? Regístrate</button>
      </div>

      <div id="register-form" class="hidden">
        <input id="reg-username" placeholder="Nombre de usuario (ej: 91143)" />
        <input id="reg-email" type="email" placeholder="Tu correo personal" />
        <input id="reg-pass" type="password" placeholder="Contraseña (mín. 6)" />
        <button class="btn btn-dark" onclick="register()">Crear mi cuenta</button>
        <button class="btn" style="background:none; color:var(--muted)" onclick="showAuthMode('login')">Ya tengo cuenta</button>
      </div>

      <div id="auth-error" class="msg error"></div>
    </div>
  </section>

  <div id="app-shell" class="app-shell">
    <header class="topbar">
      <div style="font-weight:900; letter-spacing:1px">MÉDICO PIRATA</div>
      <div id="user-info" style="font-size:0.9rem"></div>
      <button class="btn btn-primary" style="width:auto; padding:8px 15px" onclick="logout()">Salir</button>
    </header>

    <main class="app-content">
      <aside class="side">
        <p><b>Menú</b></p>
        <div style="display:grid; gap:10px">
          <button class="btn btn-dark" onclick="openView('home')">Inicio</button>
          <button id="admin-btn" class="btn btn-primary hidden" onclick="openView('admin')">Panel Admin</button>
        </div>
      </aside>

      <section class="panel">
        <div id="view-blank" class="hidden">
            <h2 style="color:var(--muted); text-align:center; margin-top:50px;">Registrado correctamente. Espera instrucciones.</h2>
        </div>

        <div id="view-home">
          <h3>¡Bienvenido a bordo!</h3>
          <p>Has iniciado sesión correctamente.</p>
        </div>

        <div id="view-admin" class="hidden">
          <h3>🛡️ Zona de Administración</h3>
          <p>Solo Santiago Díaz tiene acceso aquí.</p>
        </div>
      </section>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getDatabase, ref, get, set, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAKughV5w2XAKRm3rWuUmhVldwU2bjj0zY",
      authDomain: "portal-estudio-medicina.firebaseapp.com",
      databaseURL: "https://portal-estudio-medicina-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "portal-estudio-medicina",
      storageBucket: "portal-estudio-medicina.firebasestorage.app",
      messagingSenderId: "536326985694",
      appId: "1:536326985694:web:ee2428d39421653be26f4f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const ADMIN_EMAILS = ["santiagodiazf@gmail.com"];
    let justRegistered = false;

    // --- LÓGICA DE ACCESO ---
    window.login = async () => {
      const id = document.getElementById("login-id").value.trim();
      const pass = document.getElementById("login-pass").value;
      const err = document.getElementById("auth-error");
      err.style.display = "none";

      try {
        let email = id;
        // Si no es un email, lo buscamos por nombre de usuario
        if (!id.includes("@")) {
          const slug = id.toLowerCase().replace(/[^a-z0-9]/g, "");
          const snap = await get(ref(db, `usernames/${slug}`));
          
          if (!snap.exists()) throw new Error("El usuario '" + id + "' no está registrado.");
          
          const uid = snap.val();
          const prof = await get(ref(db, `profiles/${uid}`));
          email = prof.val().email;
        }
        await signInWithEmailAndPassword(auth, email, pass);
      } catch (e) {
        err.style.display = "block";
        err.textContent = e.message.includes("auth/") ? "Contraseña incorrecta o usuario no encontrado." : e.message;
      }
    };

    window.register = async () => {
      const user = document.getElementById("reg-username").value.trim();
      const email = document.getElementById("reg-email").value.trim();
      const pass = document.getElementById("reg-pass").value;
      const slug = user.toLowerCase().replace(/[^a-z0-9]/g, "");

      try {
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        const isAdmin = ADMIN_EMAILS.includes(email);
        
        await set(ref(db, `profiles/${cred.user.uid}`), {
          uid: cred.user.uid, username: user, email,
          role: isAdmin ? "admin" : "user", createdAt: new Date().toISOString()
        });
        await set(ref(db, `usernames/${slug}`), cred.user.uid);
        justRegistered = true;
      } catch (e) { alert(e.message); }
    };

    window.showAuthMode = (mode) => {
      document.getElementById("login-form").classList.toggle("hidden", mode !== 'login');
      document.getElementById("register-form").classList.toggle("hidden", mode !== 'register');
    };

    window.openView = (name) => {
      document.querySelectorAll('.panel > div').forEach(v => v.classList.add('hidden'));
      document.getElementById('view-' + name).classList.remove('hidden');
    };

    window.logout = () => signOut(auth).then(() => location.reload());

    // --- OBSERVADOR Y AUTO-REPARACIÓN ---
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const snap = await get(ref(db, `profiles/${user.uid}`));
        const profile = snap.val();

        // Mapeo automático de seguridad (para que tu usuario 91143 funcione siempre)
        const slug = profile.username.toLowerCase().replace(/[^a-z0-9]/g, "");
        await set(ref(db, `usernames/${slug}`), user.uid);

        document.getElementById("auth-screen").classList.add("hidden");
        document.getElementById("app-shell").style.display = "block";
        document.getElementById("user-info").innerHTML = `<b>${profile.username}</b> (${profile.email})`;

        if (profile.role === "admin") document.getElementById("admin-btn").classList.remove("hidden");
        
        if (justRegistered) openView('blank'); else openView('home');
      } else {
        document.getElementById("auth-screen").classList.remove("hidden");
        document.getElementById("app-shell").style.display = "none";
      }
    });
  </script>
</body>
</html>
