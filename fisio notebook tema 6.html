    <script>
        // Datos crudos literales
        const rawText = `Bloque 1: Conceptos Generales y Transducción de Señal
1. El proceso mediante el cual una señal extracelular se une a un receptor de membrana, lo activa y desencadena una cascada intracelular para desarrollar una respuesta se denomina:
A) Transcripción génica.
B) Transducción de señal.
C) Traducción ribosomal.
D) Endocitosis mediada por receptor.Respuesta correcta: B
2. ¿Cuál de las siguientes afirmaciones describe mejor el concepto de "amplificación de la señal" mediante segundos mensajeros explicado en clase?
A) Una molécula señalizadora activa a un único factor de transcripción en el núcleo.
B) Una molécula señalizadora activa un receptor, que a su vez activa una enzima capaz de generar múltiples segundos mensajeros, los cuales activan muchas proteínas simultáneamente.
C) El receptor se duplica en la membrana para captar más ligando.
D) La célula secreta más cantidad de ligando hacia el exterior.Respuesta correcta: B
3. En la vía de las MAP Kinasas (MAPK), la transducción de la señal se caracteriza por:
A) La generación masiva de AMP cíclico.
B) Una cascada enzimática de fosforilaciones secuenciales (una quinasa activa a la siguiente) hasta llegar al núcleo.
C) La apertura directa de un canal iónico de calcio.
D) La síntesis de novo de proteínas G.Respuesta correcta: B
4. Cuando un receptor acoplado a proteína G (GPCR) activa a la enzima Adenilato Ciclasa, ¿qué segundo mensajero se produce a partir de ATP?
A) GMP cíclico (cGMP).
B) AMP cíclico (cAMP).
C) Inositol trifosfato (IP3).
D) Diacilglicerol (DAG).Respuesta correcta: B
5. ¿Qué proteína quinasa es activada directamente por el aumento de los niveles intracelulares de AMP cíclico (cAMP)?
A) Proteína quinasa C (PKC).
B) MAP quinasa.
C) Proteína quinasa A (PKA).
D) Miosina quinasa de cadena ligera (MLCK).Respuesta correcta: C
6. Si un receptor acoplado a proteína G activa a la enzima Fosfolipasa C (PLC), esta escinde un fosfolípido de membrana generando dos segundos mensajeros. ¿Cuáles son?
A) AMPc y GMPc.
B) IP3 (Inositol trifosfato) y DAG (Diacilglicerol).
C) Sodio y Potasio.
D) Calcio y Calmodulina.Respuesta correcta: B
7. En la vía de la Fosfolipasa C, ¿cuál es la función principal del segundo mensajero IP3 una vez generado?
A) Activar directamente a la Proteína Quinasa A (PKA).
B) Viajar al retículo endoplasmático y abrir canales para liberar Calcio ($Ca^{2+}$) al citosol.
C) Fosforilar a los factores de transcripción del núcleo.
D) Inhibir a la adenilato ciclasa.Respuesta correcta: B
8. En la vía de la Fosfolipasa C, el Diacilglicerol (DAG) permanece en la membrana plasmática y su función principal es activar a:
A) Proteína quinasa C (PKC).
B) Proteína quinasa A (PKA).
C) Guanilato ciclasa.
D) El canal de fuga de potasio.Respuesta correcta: A
9. ¿Por qué el Calcio ($Ca^{2+}$) es un ion tan crítico y estrictamente regulado en la transducción de señales?
A) Porque es el ion más abundante en el citosol en condiciones de reposo.
B) Porque siempre sale de la célula a favor de gradiente.
C) Porque está muy poco concentrado libre en el citosol; cualquier liberación desde sus almacenes produce una respuesta celular muy rápida (contracción, secreción).
D) Porque inhibe a todas las quinasas.Respuesta correcta: C
10. La enzima Guanilato ciclasa (ya sea de membrana o soluble) genera GMP cíclico. ¿Qué gas difusible es el activador clásico de la guanilil ciclasa soluble citoplasmática?
A) Oxígeno ($O_2$).
B) Dióxido de carbono ($CO_2$).
C) Óxido nítrico (NO).
D) Monóxido de carbono (CO).Respuesta correcta: C

Bloque 2: Tipos de Comunicación Celular
11. ¿Qué tipo de comunicación celular permite que las señales (iones, segundos mensajeros) pasen directamente del citoplasma de una célula al de la célula adyacente sin salir al espacio extracelular?
A) Comunicación paracrina.
B) Señalización por uniones comunicantes (Uniones GAP o en hendidura).
C) Comunicación endocrina.
D) Señalización autocrina.Respuesta correcta: B
12. En el sistema inmune, es común que una molécula señal no se libere al medio, sino que permanezca anclada a la membrana de una célula y requiera unirse físicamente al receptor de otra. Este tipo de comunicación local se denomina:
A) Señalización dependiente de contacto (Yuxtacrina).
B) Comunicación endocrina.
C) Sinapsis química.
D) Comunicación por uniones GAP.Respuesta correcta: A
13. Si una célula secreta una molécula señal (ej. una citoquina) que actúa sobre receptores ubicados en su PROPIA membrana celular para regular su propia supervivencia o proliferación, hablamos de comunicación:
A) Paracrina.
B) Autocrina.
C) Endocrina.
D) Nerviosa.Respuesta correcta: B
14. ¿Cuál de las siguientes NO es una característica del Sistema Endocrino?
A) Utiliza hormonas como moléculas señalizadoras.
B) La señal se libera a la hendidura sináptica y actúa en milisegundos de forma extremadamente localizada.
C) La señal se vierte al torrente sanguíneo.
D) La respuesta puede tardar de segundos a horas.Respuesta correcta: B
15. Comparando el sistema nervioso y el endocrino (pregunta discutida en clase), el sistema NERVIOSO se caracteriza por ser:
A) Lento (horas) y generalizado por todo el cuerpo.
B) Muy rápido (milisegundos) y con una comunicación muy localizada en la hendidura sináptica.
C) Exclusivamente dependiente de hormonas lipofílicas.
D) Independiente de receptores en la célula diana.Respuesta correcta: B
16. En cuanto a la naturaleza de los ligandos, ¿cuál es la principal diferencia general entre los neurotransmisores clásicos y las hormonas?
A) Los neurotransmisores son siempre lipofílicos, las hormonas son siempre hidrofílicas.
B) Los neurotransmisores son fundamentalmente hidrofílicos, mientras que las hormonas pueden ser tanto hidrofílicas (ej. insulina) como lipofílicas (ej. esteroides).
C) Las hormonas son siempre gases, los neurotransmisores son siempre proteínas.
D) No existe ninguna diferencia química entre ellos.Respuesta correcta: B

Bloque 3: Afinidad y Especificidad (Pistas clave del profesor)
17. La capacidad de un receptor para reconocer y unirse SOLO a un ligando (o a un grupo muy reducido de ligandos estructuralmente similares) gracias a su complementariedad geométrica y química se denomina:
A) Tolerancia.
B) Afinidad.
C) Especificidad.
D) Desensibilización.Respuesta correcta: C
18. La AFINIDAD determina la fuerza de unión entre el ligando y el receptor. Según el profesor, a mayor afinidad:
A) Mayor concentración de ligando se necesita para activar el receptor.
B) Menor concentración de ligando se necesita para que el receptor se active y genere una respuesta.
C) Más lento será el proceso de transducción.
D) El receptor se destruye inmediatamente.Respuesta correcta: B
19. (PREGUNTA DESTACADA EN EL AUDIO): Teniendo en cuenta cómo viajan las moléculas señal, ¿qué receptor debe tener fisiológicamente MAYOR AFINIDAD por su ligando?
A) El receptor de un neurotransmisor en la hendidura sináptica.
B) El receptor de una hormona endocrina en una célula diana lejana.
C) Ambos tienen exactamente la misma afinidad siempre.
D) Los receptores de uniones GAP.Respuesta correcta: B (El profesor explicó que, al liberarse a la sangre, la hormona se diluye muchísimo, por lo que el receptor necesita una alta afinidad para captarla a concentraciones ínfimas. El neurotransmisor se libera muy concentrado en un espacio muy pequeño).

Bloque 4: Agonistas, Antagonistas y Casos Farmacológicos
20. Un ligando exógeno (fármaco) que es capaz de mimetizar al ligando endógeno, se une al receptor, lo activa y desencadena la misma respuesta celular se denomina:
A) Antagonista competitivo.
B) Agonista.
C) Segundo mensajero.
D) Enzima amplificadora.Respuesta correcta: B
21. Por el contrario, un ligando que se une al receptor, no lo activa, y bloquea el sitio de unión impidiendo que el ligando endógeno pueda actuar, se denomina:
A) Agonista completo.
B) Coactivador.
C) Antagonista.
D) Transductor.Respuesta correcta: C
22. Según las tablas presentadas en clase, la Adrenalina y la Noradrenalina son:
A) Antagonistas exclusivos de los receptores alfa.
B) Antagonistas exclusivos de los receptores beta.
C) Agonistas endógenos tanto de los receptores $\alpha$-adrenérgicos como de los $\beta$-adrenérgicos.
D) Segundos mensajeros intracelulares.Respuesta correcta: C
23. El fármaco Salbutamol, muy utilizado como broncodilatador en el asma, es un:
A) Antagonista específico de los receptores $\alpha$-adrenérgicos.
B) Agonista específico de los receptores $\beta$-adrenérgicos.
C) Antagonista específico de los receptores muscarínicos.
D) Inhibidor de la adenilato ciclasa.Respuesta correcta: B
24. Si en un experimento con músculo liso vascular añadimos Noradrenalina (NA) y observamos contracción, luego lavamos el tejido, añadimos el fármaco FENTOLAMINA y a continuación volvemos a añadir NA, no se observa contracción. ¿Por qué?
A) Porque la Fentolamina destruyó el músculo liso.
B) Porque la Fentolamina es un antagonista específico de los receptores $\alpha$-adrenérgicos y los ha bloqueado.
C) Porque la Fentolamina es un agonista $\beta$-adrenérgico.
D) Porque la célula se ha quedado sin ATP.Respuesta correcta: B
25. El Propanolol es un fármaco ampliamente utilizado en clínica (por ejemplo, para bajar la frecuencia cardíaca). Su mecanismo de acción es actuar como:
A) Agonista $\beta$-adrenérgico.
B) Antagonista específico de los receptores $\alpha$-adrenérgicos.
C) Antagonista específico de los receptores $\beta$-adrenérgicos.
D) Agonista colinérgico nicotínico.Respuesta correcta: C

Bloque 5: Regulación de Receptores (Up/Down Regulation y Tolerancia)
26. La pérdida rápida, transitoria y reversible de la capacidad de respuesta de un receptor tras una estimulación repetida o exposición prolongada al ligando se denomina:
A) Up-regulation.
B) Transcripción.
C) Desensibilización.
D) Lisis celular.Respuesta correcta: C
27. Cuando una célula está expuesta a una concentración EXCESIVA y continuada de un agonista, se defiende reduciendo el número total de receptores en su membrana (destruyéndolos en los lisosomas). Este fenómeno se conoce como:
A) Up-regulation (regulación al alza).
B) Down-regulation (eliminación o regulación a la baja).
C) Hipersensibilización.
D) Transducción cruzada.Respuesta correcta: B
28. ¿Qué fenómeno clínico ocurre como consecuencia directa de la "down-regulation" de los receptores cuando un paciente toma un fármaco de forma prolongada y necesita aumentar la dosis para conseguir el mismo efecto inicial?
A) Sinergia.
B) Efecto placebo.
C) Tolerancia.
D) Choque anafiláctico.Respuesta correcta: C
29. Si a un paciente se le administra de forma crónica un ANTAGONISTA (o tiene niveles anormalmente bajos del ligando endógeno), ¿cómo reaccionará la célula diana para intentar compensar la falta de señal?
A) Mediante Down-regulation (elimina más receptores).
B) Mediante Up-regulation (sintetiza e inserta más receptores en la membrana para aumentar su sensibilidad).
C) Cerrando todos sus canales iónicos.
D) Entrando en apoptosis inmediatamente.Respuesta correcta: B
30. (PISTA DE EXAMEN - AUDIO): El profesor explica que no se debe suspender bruscamente la medicación con ciertos fármacos (como antagonistas) y debe hacerse de forma gradual (tapering). Fisiológicamente, ¿por qué es peligroso suspender un antagonista de golpe?
A) Porque el fármaco se vuelve tóxico al salir del cuerpo.
B) Porque la célula ha sufrido "Up-regulation" (tiene un exceso de receptores) y al quitar el bloqueador, los ligandos endógenos producirán una respuesta masiva y exagerada (ej. taquicardia severa).
C) Porque el paciente olvidará tomarlo.
D) Porque los receptores desaparecieron por completo.Respuesta correcta: B

Bloque 6: CASO CLÍNICO ESTRELLA - Shock Anafiláctico (Adrenalina vs Cortisol)
31. Un paciente acude a urgencias tras múltiples picaduras de abeja en shock anafiláctico (edema, dificultad respiratoria, hipotensión). Se plantea administrar Adrenalina o Cortisol. ¿Cuál es el tratamiento de elección inmediato y por qué?
A) Cortisol, porque actúa sobre receptores de membrana extremadamente rápidos.
B) Adrenalina, porque actúa sobre receptores de membrana (GPCRs) que activan cascadas de segundos mensajeros, produciendo una respuesta casi inmediata (minutos).
C) Cortisol, porque destruye el veneno de la abeja en sangre.
D) Adrenalina, porque actúa sobre el ADN celular inhibiendo la transcripción.Respuesta correcta: B
32. En el caso anterior, ¿por qué el Cortisol NO es adecuado como tratamiento de rescate rápido para revertir los síntomas agudos del shock?
A) Porque es una hormona esteroidea que actúa sobre receptores intracelulares, cuyo mecanismo implica la regulación de la expresión génica (síntesis de proteínas), tardando horas en hacer efecto.
B) Porque bloquea la acción de la Adrenalina.
C) Porque no tiene ningún efecto en el cuerpo humano.
D) Porque no puede atravesar la membrana plasmática.Respuesta correcta: A (Concepto clave de integración enfatizado repetidamente en el audio).

Bloque 7: CASO CLÍNICO - Prediabetes y Resistencia a la Insulina
33. Un paciente con obesidad, polidipsia, poliuria y polifagia presenta niveles de glucosa altos (124 mg/dL) e INSULINA basal elevada. Este cuadro es compatible con:
A) Diabetes tipo 1 clásica (destrucción autoinmune del páncreas).
B) Hipoglucemia reactiva.
C) Prediabetes y resistencia a la insulina.
D) Hipertiroidismo.Respuesta correcta: C
34. Fisiopatológicamente, ¿qué mecanismo celular explica que en la obesidad se desarrolle resistencia a la insulina en el músculo y el hígado?
A) El exceso de glucosa destruye a los adipocitos.
B) Los adipocitos hipertróficos secretan citoquinas proinflamatorias (IL-6, TNF-$\\alpha$), ácidos grasos libres y ROS que bloquean/inhiben la cascada intracelular de señalización del receptor de insulina (vía PI3K/Akt).
C) El páncreas deja de producir insulina desde el primer día de obesidad.
D) La insulina se transforma en glucagón en la sangre.Respuesta correcta: B
35. En un paciente prediabético con resistencia a la insulina, el páncreas intenta compensar la falta de respuesta celular secretando:
A) Menos insulina.
B) Grandes cantidades de glucagón.
C) Niveles muy altos de insulina (hiperinsulinemia basal).
D) Cortisol.Respuesta correcta: C
36. Ante la hiperinsulinemia basal prolongada y sostenida en el paciente prediabético, ¿qué ocurre con los receptores de insulina en las células diana (músculo/hígado)?
A) Sufren una regulación al alza masiva (Up-regulation).
B) Se convierten en canales iónicos.
C) Sufren Down-regulation (eliminación de receptores), agravando la resistencia a la insulina.
D) Aumentan drásticamente su afinidad.Respuesta correcta: C
37. (PREGUNTA DEL AUDIO): El profesor planteó a los alumnos si la diabetes tipo 2 (en su fase de resistencia a la insulina/prediabetes) es reversible. ¿Cuál fue la conclusión fisiológica?
A) Es completamente irreversible desde el primer minuto.
B) Sí, es reversible modificando los hábitos de vida (dieta, ejercicio), lo que reduce la inflamación y permite restablecer la señalización celular antes de que se destruyan las células beta del páncreas.
C) Solo es reversible con un trasplante de hígado.
D) La diabetes tipo 1 es reversible, la tipo 2 no.Respuesta correcta: B
38. Si la resistencia a la insulina no se controla, el exceso de trabajo y la "glucotoxicidad" terminan provocando un evento que marca el punto de NO retorno en la diabetes tipo 2. ¿Cuál es?
A) La destrucción/agotamiento de las células beta pancreáticas productoras de insulina.
B) La conversión del hígado en tejido adiposo.
C) El aumento irreversible de receptores de insulina.
D) La desaparición de la glucosa en sangre.Respuesta correcta: A

Bloque 8: Complejidad Celular - Un ligando, múltiples respuestas (ACh y Adrenalina)
39. La afirmación de que "una misma molécula señalizadora puede tener efectos distintos en distintas células" es:
A) Falsa, una molécula señal siempre produce la misma respuesta intracelular en todas las células del organismo.
B) Falsa, porque la especificidad prohíbe diferentes respuestas.
C) Verdadera, y la respuesta dependerá fundamentalmente de qué receptor exprese cada célula diana y qué vías de señalización intracelular active dicho receptor.
D) Verdadera, pero solo ocurre en organismos invertebrados.Respuesta correcta: C
40. En la unión neuromuscular del músculo esquelético, la Acetilcolina (ACh) se une a un receptor NICOTÍNICO. ¿Qué tipo de receptor es y qué efecto causa?
A) Es un receptor acoplado a proteína G que causa hiperpolarización.
B) Es un canal iónico activado por ligando (entrada de $Na^+$) que causa despolarización y contracción muscular.
C) Es un receptor con actividad tirosina quinasa intrínseca.
D) Es un receptor intracelular nuclear.Respuesta correcta: B

        let allQuestions = [];
        let currentQuestions = [];
        let userState = {}; 

        // Procesar y parsear los datos crudos
        function initData() {
            let cleanText = rawText.replace(/Bloque \d+:.*?\n/g, '');
            const blocks = cleanText.split(/\n(?=\d+\.\s)/);

            blocks.forEach(block => {
                block = block.trim();
                if (!block) return;

                const match = block.match(/^(\d+)\.\s*(.*?)\s+A\)\s*(.*?)\s+B\)\s*(.*?)\s+C\)\s*(.*?)\s+D\)\s*(.*?)\s*Respuesta correcta:\s*([A-D])(.*)/is);
                
                if (match) {
                    let id = parseInt(match[1]);
                    
                    // Extraer explicación adicional si la hay
                    let expText = match[8] ? match[8].trim() : "";
                    if (expText.startsWith("(")) expText = expText.substring(1).trim();
                    if (expText.endsWith(")")) expText = expText.substring(0, expText.length - 1).trim();
                    
                    if (!expText) {
                        expText = `La opción correcta es la ${match[7].toUpperCase()}.`;
                    } else {
                        expText = `<strong>La opción correcta es la ${match[7].toUpperCase()}:</strong> ${expText}`;
                    }

                    // Inserción de marcadores visuales / diagramas estratégicos en preguntas de cascadas
                    if (id === 4) {
                        expText += "<br><br>";
                    }
                    if (id === 6) {
                        expText += "<br><br>";
                    }
                    if (id === 34) {
                        expText += "<br><br>";
                    }
                    if (id === 47) {
                        expText += "<br><br>";
                    }
                    if (id === 49) {
                        expText += "<br><br>";
                    }

                    allQuestions.push({
                        originalId: id,
                        q: match[2].trim(),
                        options: [
                            { text: match[3].trim(), correct: match[7].toUpperCase() === 'A', originalLetter: 'A' },
                            { text: match[4].trim(), correct: match[7].toUpperCase() === 'B', originalLetter: 'B' },
                            { text: match[5].trim(), correct: match[7].toUpperCase() === 'C', originalLetter: 'C' },
                            { text: match[6].trim(), correct: match[7].toUpperCase() === 'D', originalLetter: 'D' }
                        ],
                        exp: expText
                    });
                    userState[id] = { answered: false, failed: false, marked: false };
                }
            });
        }

        // Algoritmo de Fisher-Yates para mezclar arrays
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function startQuiz(mode, isRandom) {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('end-screen').style.display = 'none';
            document.getElementById('finish-btn-container').style.display = 'block';

            let pool = [];
            if (mode === 'all') {
                pool = [...allQuestions];
            } else if (mode === 'failed') {
                pool = allQuestions.filter(q => userState[q.originalId].failed);
            } else if (mode === 'marked') {
                pool = allQuestions.filter(q => userState[q.originalId].marked);
            } else if (mode === 'both') {
                pool = allQuestions.filter(q => userState[q.originalId].failed || userState[q.originalId].marked);
            }

            if (isRandom) {
                shuffleArray(pool);
            }

            currentQuestions = pool;

            // Resetear estado de "respondido" y mezclar opciones para esta sesión
            currentQuestions.forEach(q => {
                userState[q.originalId].answered = false;
                userState[q.originalId].failed = false; 
                shuffleArray(q.options);
            });

            renderUI();
            
            // Scrollear arriba
            document.getElementById('main-content').scrollTop = 0;
        }

        function renderUI() {
            const indexContainer = document.getElementById('index-container');
            const questionsContainer = document.getElementById('questions-container');
            
            indexContainer.innerHTML = '';
            questionsContainer.innerHTML = '';

            if (currentQuestions.length === 0) {
                questionsContainer.innerHTML = '<h2>No hay preguntas en esta categoría.</h2>';
                return;
            }

            currentQuestions.forEach((q, displayIndex) => {
                let id = q.originalId;
                let isMarked = userState[id].marked;
                
                // Botón del índice
                const idxBtn = document.createElement('button');
                idxBtn.className = `index-btn ${isMarked ? 'is-marked' : ''}`;
                idxBtn.id = `idx-btn-${id}`;
                idxBtn.innerHTML = `Pregunta ${id} <span class="mark-indicator">★</span>`;
                idxBtn.onclick = () => document.getElementById(`q-container-${id}`).scrollIntoView({ behavior: 'smooth' });
                indexContainer.appendChild(idxBtn);

                // Contenedor de la pregunta
                const qDiv = document.createElement('div');
                qDiv.className = 'question-container';
                qDiv.id = `q-container-${id}`;

                // Header (Texto + Botón Marcar)
                const headerDiv = document.createElement('div');
                headerDiv.className = 'question-header';
                
                const qText = document.createElement('h3');
                qText.className = 'question-text';
                qText.textContent = `${id}. ${q.q}`;
                
                const markBtn = document.createElement('button');
                markBtn.className = `mark-btn ${isMarked ? 'marked' : ''}`;
                markBtn.id = `mark-btn-${id}`;
                markBtn.innerHTML = isMarked ? '★ Marcada' : '☆ Marcar';
                markBtn.onclick = () => toggleMark(id);

                headerDiv.appendChild(qText);
                headerDiv.appendChild(markBtn);
                qDiv.appendChild(headerDiv);

                // Opciones
                const optsDiv = document.createElement('div');
                optsDiv.className = 'options-list';
                
                q.options.forEach((opt, optIndex) => {
                    const optBtn = document.createElement('button');
                    optBtn.className = 'option-btn';
                    optBtn.id = `opt-${id}-${optIndex}`;
                    optBtn.textContent = opt.text;
                    optBtn.onclick = () => handleAnswer(id, optIndex, opt.correct);
                    optsDiv.appendChild(optBtn);
                });
                qDiv.appendChild(optsDiv);

                // Explicación (oculta inicialmente)
                const expDiv = document.createElement('div');
                expDiv.className = 'explanation';
                expDiv.id = `exp-${id}`;
                expDiv.innerHTML = q.exp;
                qDiv.appendChild(expDiv);

                questionsContainer.appendChild(qDiv);
            });
        }

        function handleAnswer(qId, optIndex, isCorrect) {
            if (userState[qId].answered) return; 

            userState[qId].answered = true;
            userState[qId].failed = !isCorrect;

            // Actualizar interfaz del índice
            const idxBtn = document.getElementById(`idx-btn-${qId}`);
            idxBtn.classList.add(isCorrect ? 'correct' : 'incorrect');

            // Encontrar la pregunta actual para ver las opciones
            const question = currentQuestions.find(q => q.originalId === qId);

            // Actualizar botones de opciones
            question.options.forEach((opt, i) => {
                const btn = document.getElementById(`opt-${qId}-${i}`);
                btn.disabled = true; 
                if (opt.correct) {
                    btn.classList.add('correct');
                } else if (i === optIndex && !isCorrect) {
                    btn.classList.add('incorrect');
                }
            });

            // Mostrar explicación
            document.getElementById(`exp-${qId}`).style.display = 'block';
        }

        function toggleMark(qId) {
            userState[qId].marked = !userState[qId].marked;
            const isMarked = userState[qId].marked;
            
            const markBtn = document.getElementById(`mark-btn-${qId}`);
            markBtn.classList.toggle('marked', isMarked);
            markBtn.innerHTML = isMarked ? '★ Marcada' : '☆ Marcar';

            const idxBtn = document.getElementById(`idx-btn-${qId}`);
            idxBtn.classList.toggle('is-marked', isMarked);
        }

        function finishQuiz() {
            let correctCount = 0;
            let failedCount = 0;
            let unanweredCount = 0;

            currentQuestions.forEach(q => {
                if (!userState[q.originalId].answered) {
                    unanweredCount++;
                } else if (userState[q.originalId].failed) {
                    failedCount++;
                } else {
                    correctCount++;
                }
            });

            const total = currentQuestions.length;
            const resText = document.getElementById('results-text');
            resText.innerHTML = `Aciertos: <span style="color:#2ecc71">${correctCount}</span> | 
                                 Fallos: <span style="color:#e74c3c">${failedCount}</span> | 
                                 Sin responder: <span style="color:#f39c12">${unanweredCount}</span><br>
                                 Total en esta sesión: ${total}`;

            // Habilitar/Deshabilitar botones de repetición
            const totalMarked = Object.values(userState).filter(st => st.marked).length;
            const totalFailed = Object.values(userState).filter(st => st.failed).length;

            document.getElementById('btn-retry-failed').disabled = totalFailed === 0;
            document.getElementById('btn-retry-marked').disabled = totalMarked === 0;
            document.getElementById('btn-retry-both').disabled = (totalFailed === 0 && totalMarked === 0);

            document.getElementById('end-screen').style.display = 'flex';
        }

        // Inicializar datos al cargar
        window.onload = () => {
            initData();
        };

    </script>
