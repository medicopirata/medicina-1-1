<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz de Medicina de Precisión y Ómicas</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #16a34a;
            --danger: #dc2626;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Pantallas */
        #start-screen, #end-screen {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 600px;
            margin: 40px auto;
        }

        /* Layout del Quiz */
        #quiz-container {
            display: none;
            grid-template-columns: 250px 1fr;
            gap: 30px;
            align-items: start;
        }

        /* Sidebar (Índice) */
        #sidebar {
            position: sticky;
            top: 20px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }

        #sidebar h3 {
            margin-top: 0;
            font-size: 1.1em;
            text-align: center;
        }

        .index-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .index-btn {
            padding: 8px 4px;
            text-align: center;
            background: #f1f5f9;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9em;
            text-decoration: none;
            color: var(--text);
            transition: all 0.2s;
            position: relative;
        }

        .index-btn:hover { background: #e2e8f0; }
        .index-btn.correct { background: #dcfce7; border-color: var(--success); color: #166534; }
        .index-btn.incorrect { background: #fee2e2; border-color: var(--danger); color: #991b1b; }
        .index-btn.marked::after {
            content: '★';
            position: absolute;
            top: -5px;
            right: -2px;
            color: var(--warning);
            font-size: 1.2em;
        }

        /* Botones generales */
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
            margin: 5px;
        }
        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: #94a3b8; cursor: not-allowed; }

        .btn-finish {
            width: 100%;
            background-color: var(--danger);
        }
        .btn-finish:hover { background-color: #b91c1c; }

        /* Lista de preguntas */
        #questions-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .question-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.1);
            scroll-margin-top: 20px;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 1.1em;
            font-weight: 600;
            margin: 0;
            padding-right: 15px;
        }

        .mark-container {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #fffbeb;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #fde68a;
            font-size: 0.9em;
            cursor: pointer;
            white-space: nowrap;
        }

        .options-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .option-item {
            margin-bottom: 10px;
        }

        .option-label {
            display: flex;
            align-items: flex-start;
            padding: 12px;
            background: #f8fafc;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-label:hover:not(.disabled) { background: #f1f5f9; }
        .option-label input { margin-top: 5px; margin-right: 10px; cursor: pointer; }
        .option-label.disabled { cursor: default; opacity: 0.8; }
        .option-label.correct-anim { border-color: var(--success); background: #dcfce7; }
        .option-label.incorrect-anim { border-color: var(--danger); background: #fee2e2; }

        /* Explicación */
        .feedback {
            display: none;
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.95em;
            animation: fadeIn 0.4s ease;
        }
        .feedback.correct { background: #dcfce7; border-left: 4px solid var(--success); }
        .feedback.incorrect { background: #fee2e2; border-left: 4px solid var(--danger); }
        
        .feedback-title { font-weight: bold; margin-bottom: 5px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        /* Responsive */
        @media (max-width: 768px) {
            #quiz-container { grid-template-columns: 1fr; }
            #sidebar { position: static; max-height: none; margin-bottom: 20px; }
            .index-grid { grid-template-columns: repeat(5, 1fr); }
            .question-header { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen">
        <h2>Quiz: Medicina de Precisión y Ciencias Ómicas</h2>
        <p>40 preguntas disponibles. ¿Cómo deseas realizar el cuestionario?</p>
        <button onclick="startQuiz('original')">Orden Preestablecido</button>
        <button onclick="startQuiz('random')">Orden Aleatorio</button>
    </div>

    <div id="quiz-container">
        <div id="sidebar">
            <h3>Índice de Preguntas</h3>
            <div id="index-grid" class="index-grid"></div>
            <button class="btn-finish" onclick="finishQuiz()">Finalizar Cuestionario</button>
        </div>

        <div id="questions-container"></div>
    </div>

    <div id="end-screen">
        <h2>Resultados del Cuestionario</h2>
        <h1 id="score-display" style="font-size: 3em; margin: 10px 0; color: var(--primary);"></h1>
        <p id="stats-display"></p>
        
        <div style="margin-top: 30px; display: flex; flex-direction: column; gap: 10px;">
            <button onclick="resetApp('all')">Repetir Completo (Todas las 40)</button>
            <button id="btn-repeat-failed" onclick="resetApp('failed')">Repetir SOLO Falladas/No respondidas</button>
            <button id="btn-repeat-marked" onclick="resetApp('marked')">Repetir SOLO Marcadas</button>
            <button id="btn-repeat-failed-marked" onclick="resetApp('failed_marked')">Repetir Falladas + Marcadas</button>
        </div>
    </div>
</div>

<script>
// BASE DE DATOS LITERAL DE LAS 40 PREGUNTAS
const database = [
{
    id: 1,
    q: 'Según la definición dada en clase, ¿cuál es el objetivo fundamental de la "Medicina de Precisión" o "Medicina Personalizada"?',
    opts: [
        { t: "Tratar a todos los pacientes con la misma dosis de fármaco para abaratar costes del sistema sanitario.", c: false },
        { t: "Adaptar el tratamiento y la prevención de forma específica para cada individuo (o grupos moleculares), considerando su genética, ambiente y estilo de vida, disminuyendo así los efectos secundarios.", c: true },
        { t: "Crear una única \"pastilla universal\" que cure las enfermedades metabólicas.", c: false },
        { t: "Utilizar la cirugía mínimamente invasiva en todos los casos oncológicos.", c: false }
    ],
    exp: "La profesora recalcó que la medicina de precisión busca adaptar el tratamiento a la singularidad de cada paciente o grupo de pacientes, minimizando efectos adversos y aumentando la eficacia."
},
{
    id: 2,
    q: 'A diferencia de la medicina de precisión, la medicina tradicional o clásica se caracteriza fundamentalmente por:',
    opts: [
        { t: "Dirigir sus fármacos hacia una sola molécula diana, aplicando el mismo tratamiento por igual a todos los pacientes con la misma enfermedad (ej. diabetes).", c: true },
        { t: "Analizar el genoma completo antes de prescribir un paracetamol.", c: false },
        { t: "Carecer de efectos secundarios.", c: false },
        { t: "Basarse exclusivamente en la terapia génica.", c: false }
    ],
    exp: "En el audio detalla que la medicina clásica crea un fármaco (ej. anticuerpo monoclonal frente a HER2 o fármaco para la diabetes) y se lo da a todo el mundo por igual, asumiendo que todos responderán bien, lo cual no siempre ocurre."
},
{
    id: 3,
    q: 'En el ámbito del diagnóstico clínico moderno, ¿qué es exactamente un "Biomarcador"?',
    opts: [
        { t: "Un isótopo radiactivo usado para PET.", c: false },
        { t: "Una célula sintética creada por IA.", c: false },
        { t: "Una molécula (o conjunto de ellas) cuyos niveles de expresión alterados respecto a las condiciones normales nos indican la presencia de una enfermedad o la respuesta a un tratamiento.", c: true },
        { t: "Una bacteria de la microbiota intestinal.", c: false }
    ],
    exp: "Pregunta directa de la profesora a la clase. Es cualquier molécula cuya variación nos interesa porque se asocia al desarrollo de una patología."
},
{
    id: 4,
    q: 'Hoy en día, la Medicina de Precisión nos indica que es un error buscar un único biomarcador para diagnosticar enfermedades complejas. ¿Qué enfoque se persigue en la actualidad?',
    opts: [
        { t: "Buscar una única proteína que cure todo.", c: false },
        { t: "Identificar \"paneles\" compuestos por múltiples biomarcadores simultáneos utilizando herramientas de Inteligencia Artificial para integrar toda la información.", c: true },
        { t: "Abandonar el análisis de sangre y usar solo radiografías.", c: false },
        { t: "Medir únicamente el nivel de glucosa en ayunas.", c: false }
    ],
    exp: "La profesora insistió en que enfermedades como la diabetes no se deben a una sola molécula, sino que hay que mirar \"paneles\" de moléculas a la vez mediante herramientas multi-ómicas."
},
{
    id: 5,
    q: 'El sufijo "-ómica" (del inglés -omics), procedente del griego, se añade a palabras como Genómica o Proteómica para indicar:',
    opts: [
        { t: "Que la técnica se realiza mediante ordenador.", c: false },
        { t: "Que es un estudio exclusivo de tejidos tumorales.", c: false },
        { t: "El estudio de la \"totalidad\" o el \"conjunto\" global de algo (ej. conjunto de genes o proteínas).", c: true },
        { t: "La capacidad de fraccionar moléculas individuales.", c: false }
    ],
    exp: "Explicado explícitamente en la diapositiva y el audio: Ómica viene del griego y significa el estudio del conjunto o masa de algo."
},
{
    id: 6,
    q: '¿Qué es la "Biología de Sistemas" ("Systems Biology")?',
    opts: [
        { t: "El estudio exclusivo de la digestión humana.", c: false },
        { t: "La integración de la información biológica procedente de todas las herramientas ómicas (genoma, transcriptoma, proteoma, etc.) para comprender el funcionamiento global de la célula o el organismo, en vez de estudiar cada pieza por separado.", c: true },
        { t: "La clasificación zoológica de los seres vivos.", c: false },
        { t: "El cultivo in vitro de células madre vegetales.", c: false }
    ],
    exp: "En el audio destaca que la célula no se puede entender viendo solo un gen o una proteína, sino integrando el \"puzle\" entero de todas las partes."
},
{
    id: 7,
    q: 'Un componente que forma parte integral de nuestra "imagen molecular" e influye drásticamente en patologías (incluso en trastornos mentales como el autismo o Alzheimer) son los microorganismos de nuestro sistema digestivo. El estudio del conjunto de estos microorganismos se denomina:',
    opts: [
        { t: "Farmacogenómica.", c: false },
        { t: "Microbioma (o Microbiota).", c: true },
        { t: "Metabolómica.", c: false },
        { t: "Trascriptómica.", c: false }
    ],
    exp: "La profesora hizo un inciso muy claro sobre la importancia de la microbiota y cómo incluso se usan \"trasplantes fecales\" en clínica para tratar patologías insospechadas."
},
{
    id: 8,
    q: 'En referencia al Proyecto Genoma Humano, ¿en qué año se completó y publicó la secuencia absolutamente completa ("filling the gaps") del genoma humano gracias a tecnologías de secuenciación de nueva generación (NGS)?',
    opts: [
        { t: "En 1990.", c: false },
        { t: "En 2001 (por Celera y Nature).", c: false },
        { t: "En 2022.", c: true },
        { t: "Aún no se ha completado.", c: false }
    ],
    exp: "Aunque el primer borrador se publicó en 2001, la secuencia completa y definitiva no se publicó hasta el año 2022."
},
{
    id: 9,
    q: 'Nuestro ADN contiene aproximadamente 3.000 millones de nucleótidos. Sin embargo, ¿qué porcentaje aproximado de toda esa inmensa longitud corresponde a genes que codifican para la síntesis de proteínas?',
    opts: [
        { t: "Cerca del 99%.", c: false },
        { t: "Alrededor del 50%.", c: false },
        { t: "Un 25%.", c: false },
        { t: "Apenas el 1% (menos de 20.000 genes).", c: true }
    ],
    exp: "Dato remarcado por la profesora: es sorprendente cómo tanta materia biológica se destina en un 99% a partes \"no codificantes\" y solo un minúsculo 1% es la receta para proteínas reales."
},
{
    id: 10,
    q: 'Si el 99% de nuestro ADN NO codifica para proteínas, ¿qué función tienen estas secuencias "no codificantes" según las diapositivas del tema?',
    opts: [
        { t: "Son simplemente espacio vacío sin función alguna.", c: false },
        { t: "Funcionan como componentes reguladores (centralitas) de otros genes, pseudogenes y una gran cantidad de secuencias altamente repetitivas.", c: true },
        { t: "Son las encargadas de digerir la glucosa en el núcleo.", c: false },
        { t: "Son genes de virus inactivos que causan cáncer de colon.", c: false }
    ],
    exp: "Las diapositivas especifican que la mayoría del genoma no codificante tiene labores de regulación, pseudogenes o son secuencias de ADN repetitivo."
},
{
    id: 11,
    q: '¿Cuál de las siguientes disciplinas ómicas se encarga del estudio del conjunto de los ARN mensajeros y transcritos generados en una célula bajo circunstancias específicas?',
    opts: [
        { t: "Genómica.", c: false },
        { t: "Transcriptómica.", c: true },
        { t: "Metabolómica.", c: false },
        { t: "Epigenómica.", c: false }
    ],
    exp: "La transcriptómica analiza la transcripción, es decir, el ARN producido a partir del ADN."
},
{
    id: 12,
    q: 'Durante la clase se debatió sobre qué ocurre para que la secuencia de un solo gen en el ADN pueda dar lugar a diferentes moléculas de ARN mensajero (y por tanto a proteínas distintas). Este mecanismo celular fisiológico se llama:',
    opts: [
        { t: "Mutación puntual del promotor.", c: false },
        { t: "Traducción invertida.", c: false },
        { t: "Splicing alternativo (Corte y empalme alternativo).", c: true },
        { t: "Proteólisis de caspasas.", c: false }
    ],
    exp: "Una alumna intervino y la profesora lo confirmó: los exones pueden unirse en distintos órdenes (splicing alternativo) originando variantes de una misma proteína."
},
{
    id: 13,
    q: '¡CHIVATAZO DE NOBEL! En el año 2024, el Premio Nobel de Fisiología/Medicina fue otorgado a Victor Ambros y Gary Ruvkun por un descubrimiento clave en la regulación del ARN que ha expandido la transcriptómica. ¿Qué descubrieron?',
    opts: [
        { t: "La reacción en cadena de la polimerasa (PCR).", c: false },
        { t: "Los microARN (miRNA), pequeñas moléculas de ARN no codificante responsables de la regulación de la expresión de los genes después de la transcripción.", c: true },
        { t: "El sistema CRISPR-Cas9 de edición genética.", c: false },
        { t: "La estructura de la doble hélice de ADN.", c: false }
    ],
    exp: "Explicitado en el PDF y el audio. Los miRNA han revolucionado la transcriptómica por su capacidad de regular (silenciar) post-transcripcionalmente a los ARN mensajeros."
},
{
    id: 14,
    q: 'Dentro de la transcriptómica existen diversas herramientas de análisis de laboratorio. Según las diapositivas, ¿cuáles son las técnicas principales para analizar los transcritos de ARN?',
    opts: [
        { t: "Espectrometría de masas y MALDI-TOF.", c: false },
        { t: "Microarrays, RT-PCR (Retrotranscripción y PCR) y RNA-Seq (Secuenciación de ARN).", c: true },
        { t: "Rayos X y Resonancia Magnética Nuclear.", c: false },
        { t: "Centrifugación en gradiente de densidad exclusivamente.", c: false }
    ],
    exp: "Diapositiva de \"Herramientas de análisis\". Se usan los microarrays, la RT-PCR (para pasar de ARN a cDNA y amplificar) y la secuenciación masiva (RNA Seq)."
},
{
    id: 15,
    q: 'La Proteómica se considera más compleja que la genómica. Una de las razones principales es que la simple lectura de la secuencia de ADN del genoma NO puede predecir:',
    opts: [
        { t: "El número total de cromosomas de la célula.", c: false },
        { t: "Las modificaciones post-traduccionales (como la glicosilación, fosforilación o ubiquitinación) que sufrirá la proteína ni su concentración final real en la célula.", c: true },
        { t: "Si el organismo es procariota o eucariota.", c: false },
        { t: "Las bases nitrogenadas del propio gen.", c: false }
    ],
    exp: "Diapositiva \"VS\". El ADN no nos informa de la dinámica real: no predice si el ARN se traducirá, ni las modificaciones postraduccionales que alteran la función final de la proteína (proteoma)."
},
{
    id: 16,
    q: '¿Cuál es la herramienta tecnológica o equipamiento central, considerado el "caballo de batalla", que permite el análisis proteómico masivo identificando inequívocamente a las proteínas y péptidos por su masa?',
    opts: [
        { t: "El Microscopio Electrónico de Barrido.", c: false },
        { t: "El Citómetro de Flujo.", c: false },
        { t: "El Espectrómetro de Masas (Espectrometría de Masas).", c: true },
        { t: "La PCR a tiempo real.", c: false }
    ],
    exp: "Toda la proteómica actual se basa en la Espectrometría de Masas (MALDI, LC-MS/MS), que fragmenta e identifica las moléculas por su relación masa/carga (m/z)."
},
{
    id: 17,
    q: 'En la técnica de espectrometría MALDI-TOF (Matrix-Assisted Laser Desorption/Ionization), ¿para qué sirve exactamente la adición de una "matriz" química a la muestra del paciente sobre la placa?',
    opts: [
        { t: "Para teñir de azul las proteínas cancerígenas.", c: false },
        { t: "Para disolver el hueso y extraer el ADN.", c: false },
        { t: "Para absorber la energía del láser, transferirla al analito (proteína) favoreciendo su ionización y protegiendo a la muestra del impacto destructivo directo del láser.", c: true },
        { t: "Para inhibir a las proteasas de la célula.", c: false }
    ],
    exp: "En el texto y diapositivas, la matriz se cristaliza con la muestra y actúa como un amortiguador que absorbe la radiación del láser y ayuda a \"hacer volar\" (ionizar) las proteínas sin carbonizarlas."
},
{
    id: 18,
    q: 'La profesora puso un ejemplo clínico real de proteómica en microbiología (el MALDI-Biotyper) que veréis en el hospital. ¿Para qué se utiliza este equipo en la rutina clínica?',
    opts: [
        { t: "Para curar la diabetes tipo 1 destruyendo anticuerpos.", c: false },
        { t: "Para identificar de forma ultra-rápida cepas de bacterias o microorganismos (ej. E. coli) comparando su \"perfil proteico\" o huella dactilar con bases de datos preestablecidas.", c: true },
        { t: "Para medir el oxígeno en sangre arterial.", c: false },
        { t: "Para inyectar ARN mensajero contra el COVID.", c: false }
    ],
    exp: "Audio. Mencionó que ahorra las horas/días de espera del cultivo clásico. Pones la bacteria en la placa, disparas el láser, y el perfil proteico te dice instantáneamente qué patógeno es."
},
{
    id: 19,
    q: 'Otra técnica proteómica que genera mapas de distribución espacial de biomarcadores directamente sobre cortes de un tejido patológico (por ejemplo, identificando qué zonas exactas de un tumor de mama tienen una proteína mutada) es:',
    opts: [
        { t: "El sistema CRISPR.", c: false },
        { t: "La Western-Blotting.", c: false },
        { t: "MALDI-Imaging (Perfil proteico sobre tejido).", c: true },
        { t: "La Tomografía por Emisión de Positrones (PET).", c: false }
    ],
    exp: "Diapositiva de MALDI-Imaging. Consiste en disparar el láser coordenada a coordenada sobre un corte de tejido para ver dónde se concentra cada proteína, creando un \"mapa de colores\" del tumor."
},
{
    id: 20,
    q: 'En un análisis proteómico típico por la técnica "LC-MS/MS" (Cromatografía Líquida acoplada a Espectrometría de Masas en Tándem), ¿cuál es el paso fisiológico previo a meter la muestra en el espectrómetro?',
    opts: [
        { t: "Insuflar oxígeno en la muestra de plasma.", c: false },
        { t: "La separación física de la mezcla compleja de proteínas/péptidos mediante una columna de cromatografía líquida.", c: true },
        { t: "Congelar la muestra con nitrógeno líquido a -196ºC.", c: false },
        { t: "Irradiarla con Rayos X de alta frecuencia.", c: false }
    ],
    exp: "LC significa Liquid Chromatography (Cromatografía líquida). Primero se separan las proteínas por la columna, y según van saliendo, se inyectan en el espectrómetro de masas."
},
{
    id: 21,
    q: '¿Qué estudia la disciplina denominada METABOLÓMICA?',
    opts: [
        { t: "Estudia únicamente las calorías consumidas al día.", c: false },
        { t: "Estudia el genoma de la microbiota intestinal.", c: false },
        { t: "Estudia el conjunto de metabolitos, que son los reactivos y productos de las reacciones bioquímicas que ocurren en un sistema vivo (ej. glucosa, aminoácidos, lípidos).", c: true },
        { t: "Estudia exclusivamente el ciclo de Krebs en tejidos muertos.", c: false }
    ],
    exp: "Diapositivas. Se encarga de las pequeñas moléculas (metabolitos) que forman la red metabólica, siendo la rama ómica \"más compleja\" y representativa del fenotipo final."
},
{
    id: 22,

// ESTADOS GLOBALES
let activeQuestions = [];
let markedQuestions = new Set();
let userAnswers = {}; 

function shuffleArray(array) {
    let newArray = [...array];
    for (let i = newArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
    }
    return newArray;
}

function startQuiz(orderType) {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('end-screen').style.display = 'none';
    document.getElementById('quiz-container').style.display = 'grid';

    activeQuestions = [...database];
    if (orderType === 'random') {
        activeQuestions = shuffleArray(activeQuestions);
    }
    
    renderQuiz();
}

function resetApp(mode) {
    document.getElementById('end-screen').style.display = 'none';
    
    let newPool = [];
    if (mode === 'all') {
        newPool = [...database];
    } else if (mode === 'failed') {
        newPool = database.filter(q => {
            return !userAnswers[q.id] || !userAnswers[q.id].correct;
        });
    } else if (mode === 'marked') {
        newPool = database.filter(q => markedQuestions.has(q.id));
    } else if (mode === 'failed_marked') {
        newPool = database.filter(q => {
            const failed = !userAnswers[q.id] || !userAnswers[q.id].correct;
            const marked = markedQuestions.has(q.id);
            return failed || marked;
        });
    }

    activeQuestions = newPool;
    
    document.getElementById('quiz-container').style.display = 'none';
    document.getElementById('start-screen').innerHTML = `
        <h2>Se han seleccionado ${activeQuestions.length} preguntas.</h2>
        <p>¿Cómo deseas ordenarlas para este intento?</p>
        <button onclick="startSpecificPool('original')">Orden Original</button>
        <button onclick="startSpecificPool('random')">Orden Aleatorio</button>
    `;
    document.getElementById('start-screen').style.display = 'block';
}

function startSpecificPool(orderType) {
    document.getElementById('start-screen').style.display = 'none';
    if (orderType === 'random') {
        activeQuestions = shuffleArray(activeQuestions);
    }
    userAnswers = {}; 
    document.getElementById('quiz-container').style.display = 'grid';
    renderQuiz();
}

function renderQuiz() {
    const sidebarGrid = document.getElementById('index-grid');
    const questionsContainer = document.getElementById('questions-container');
    
    sidebarGrid.innerHTML = '';
    questionsContainer.innerHTML = '';

    activeQuestions.forEach((q, displayIndex) => {
        const num = displayIndex + 1;
        
        const btn = document.createElement('a');
        btn.href = `#q-${q.id}`;
        btn.className = 'index-btn';
        btn.id = `btn-index-${q.id}`;
        btn.innerText = num;
        if(markedQuestions.has(q.id)) btn.classList.add('marked');
        sidebarGrid.appendChild(btn);

        const shuffledOpts = shuffleArray(q.opts);

        const card = document.createElement('div');
        card.className = 'question-card';
        card.id = `q-${q.id}`;

        let optionsHTML = shuffledOpts.map((opt, i) => `
            <div class="option-item">
                <label class="option-label" id="label-${q.id}-${i}">
                    <input type="radio" name="q-${q.id}" value="${opt.c}" onchange="checkAnswer(${q.id}, ${opt.c}, ${i}, this)">
                    <span>${opt.t}</span>
                </label>
            </div>
        `).join('');

        card.innerHTML = `
            <div class="question-header">
                <h3 class="question-text">${num}. ${q.q}</h3>
                <label class="mark-container">
                    <input type="checkbox" ${markedQuestions.has(q.id) ? 'checked' : ''} onchange="toggleMark(${q.id}, this)">
                    Marcar/Flag
                </label>
            </div>
            <div class="options-list">
                ${optionsHTML}
            </div>
            <div class="feedback" id="feedback-${q.id}">
                <div class="feedback-title" id="feedback-title-${q.id}"></div>
                <div><strong>Explicación:</strong> ${q.exp}</div>
            </div>
        `;

        questionsContainer.appendChild(card);
    });
}

function toggleMark(id, checkbox) {
    const btn = document.getElementById(`btn-index-${id}`);
    if (checkbox.checked) {
        markedQuestions.add(id);
        if(btn) btn.classList.add('marked');
    } else {
        markedQuestions.delete(id);
        if(btn) btn.classList.remove('marked');
    }
}

function checkAnswer(questionId, isCorrect, optIndex, radioElement) {
    if (userAnswers[questionId]) return;

    userAnswers[questionId] = { answered: true, correct: isCorrect };

    const radios = document.querySelectorAll(`input[name="q-${questionId}"]`);
    radios.forEach(r => {
        r.disabled = true;
        r.parentElement.classList.add('disabled');
        if(r.value === 'true') {
            r.parentElement.style.border = "2px solid var(--success)";
        }
    });

    const selectedLabel = document.getElementById(`label-${questionId}-${optIndex}`);
    const feedbackDiv = document.getElementById(`feedback-${questionId}`);
    const feedbackTitle = document.getElementById(`feedback-title-${questionId}`);
    const indexBtn = document.getElementById(`btn-index-${questionId}`);

    feedbackDiv.style.display = 'block';

    if (isCorrect) {
        selectedLabel.classList.add('correct-anim');
        feedbackDiv.classList.add('correct');
        feedbackTitle.innerText = "¡Correcto!";
        feedbackTitle.style.color = "var(--success)";
        if(indexBtn) indexBtn.classList.add('correct');
    } else {
        selectedLabel.classList.add('incorrect-anim');
        feedbackDiv.classList.add('incorrect');
        feedbackTitle.innerText = "Incorrecto";
        feedbackTitle.style.color = "var(--danger)";
        if(indexBtn) indexBtn.classList.add('incorrect');
    }
}

function finishQuiz() {
    document.getElementById('quiz-container').style.display = 'none';
    document.getElementById('end-screen').style.display = 'block';

    let correctCount = 0;
    let answeredCount = 0;

    activeQuestions.forEach(q => {
        if (userAnswers[q.id]) {
            answeredCount++;
            if (userAnswers[q.id].correct) correctCount++;
        }
    });

    const unattempted = activeQuestions.length - answeredCount;
    const scoreDisplay = document.getElementById('score-display');
    const statsDisplay = document.getElementById('stats-display');

    scoreDisplay.innerText = `${correctCount} / ${activeQuestions.length}`;
    statsDisplay.innerHTML = `
        <strong>Aciertos:</strong> ${correctCount}<br>
        <strong>Fallos:</strong> ${answeredCount - correctCount}<br>
        <strong>No respondidas:</strong> ${unattempted}<br>
        <strong>Marcadas para revisión:</strong> ${markedQuestions.size}
    `;

    const btnFailed = document.getElementById('btn-repeat-failed');
    const btnMarked = document.getElementById('btn-repeat-marked');
    const btnFailedMarked = document.getElementById('btn-repeat-failed-marked');

    const totalFailedOrUnanswered = activeQuestions.length - correctCount;
    
    btnFailed.disabled = totalFailedOrUnanswered === 0;
    btnMarked.disabled = markedQuestions.size === 0;
    
    let combinedCount = 0;
    database.forEach(q => {
        const failed = !userAnswers[q.id] || !userAnswers[q.id].correct;
        const marked = markedQuestions.has(q.id);
        if(failed || marked) combinedCount++;
    });
    btnFailedMarked.disabled = combinedCount === 0;
}
</script>
