<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizz Neurotransmisión - Catecolaminas y Neuropéptidos</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f4f7f6;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Índice lateral */
        #sidebar {
            width: 80px;
            background-color: var(--primary);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0;
            overflow-y: auto;
            border-right: 2px solid #1a252f;
        }

        .index-item {
            width: 40px;
            height: 40px;
            margin: 5px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: var(--secondary);
            cursor: pointer;
            font-size: 0.9em;
            transition: 0.3s;
            border: 2px solid transparent;
            flex-shrink: 0;
        }

        .index-item:hover { background: var(--accent); }
        .index-item.correct { background: var(--success); }
        .index-item.incorrect { background: var(--error); }
        .index-item.marked { position: relative; }
        .index-item.marked::after {
            content: '🚩';
            position: absolute;
            top: -5px;
            right: -5px;
            font-size: 10px;
        }

        /* Contenedor principal */
        #main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
            scroll-behavior: smooth;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: transparent;
        }

        .card-setup {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 { color: var(--primary); text-align: center; }
        
        /* Pantalla de Inicio */
        #setup-screen { text-align: center; }
        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            margin: 10px;
            transition: 0.3s;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-finish { background: #95a5a6; padding: 15px 40px; font-size: 1.1em;}

        /* Preguntas */
        .question-block { 
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            border-left: 6px solid var(--secondary);
        }
        
        .options { margin-top: 20px; }
        .option-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 15px;
            margin-bottom: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .option-btn:hover:not(:disabled) { border-color: var(--accent); background: #f0f8ff; }
        .option-btn.correct { background: #d4edda !important; border-color: var(--success) !important; color: #155724; }
        .option-btn.incorrect { background: #f8d7da !important; border-color: var(--error) !important; color: #721c24; }

        .explanation {
            margin-top: 20px;
            padding: 15px;
            background: #e1f5fe;
            border-left: 5px solid var(--accent);
            display: none;
            border-radius: 0 8px 8px 0;
        }

        .marking-zone {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9em;
            color: #666;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        /* Pantalla Final */
        #result-screen { display: none; text-align: center; }
        .summary-stats { display: flex; justify-content: space-around; margin: 20px 0; }
        .stat-box { padding: 15px; border-radius: 8px; background: #f8f9fa; min-width: 100px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);}

        /* Botón Scroll to Top */
        #scrollTopBtn {
            display: none;
            position: fixed;
            bottom: 30px;
            right: 40px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: 0.3s;
            z-index: 1000;
        }
        #scrollTopBtn:hover {
            background-color: var(--primary);
            transform: translateY(-3px);
        }

    </style>
</head>
<body>

    <div id="sidebar" style="display: none;"></div>

    <div id="main-content">
        <div class="container">
            <div id="setup-screen" class="card-setup">
                <h1>🔬 Neurotransmisión III: Aminas y Péptidos</h1>
                <p>Bienvenido al cuestionario sobre Catecolaminas, Serotonina y Neuropéptidos.</p>
                <div style="margin: 30px 0;">
                    <p>Selecciona el modo de orden:</p>
                    <button class="btn" onclick="startQuiz(false)">Orden Preestablecido</button>
                    <button class="btn" onclick="startQuiz(true)">Orden Aleatorio</button>
                </div>
            </div>

            <div id="quiz-screen" style="display: none;">
                <div id="question-container"></div>
                <div style="text-align: center; margin-top: 40px; margin-bottom: 60px;">
                    <button class="btn btn-finish" onclick="confirmFinish()">Finalizar Cuestionario</button>
                </div>
            </div>

            <div id="result-screen" class="card-setup">
                <h1>Resultados Finales</h1>
                <div class="summary-stats">
                    <div class="stat-box"><h2 id="res-total">0</h2><p>Respondidas</p></div>
                    <div class="stat-box" style="color: var(--success)"><h2 id="res-correct">0</h2><p>Correctas</p></div>
                    <div class="stat-box" style="color: var(--error)"><h2 id="res-fail">0</h2><p>Falladas</p></div>
                </div>
                <h3>¿Qué quieres hacer ahora?</h3>
                <div id="repeat-options">
                    <button class="btn" onclick="repeatMode('all')">Repetir Todo</button>
                    <button class="btn" onclick="repeatMode('failed')">Repetir Falladas</button>
                    <button class="btn" onclick="repeatMode('marked')">Repetir Marcadas</button>
                    <button class="btn" onclick="repeatMode('mixed')">Repetir Falladas + Marcadas</button>
                </div>
            </div>
        </div>
    </div>

    <button id="scrollTopBtn" onclick="scrollToTop()" title="Subir al inicio">↑</button>

<script>
const rawData = [
    { n: 1, q: "A nivel bioquímico, ¿cuál es el aminoácido precursor y la enzima clave limitante a partir de la cual se sintetizan todas las catecolaminas (Dopamina, Noradrenalina, Adrenalina)?", a: "c", ex: "Las catecolaminas derivan de la Tirosina. El profesor destacó que \"Todo esto depende de la tirosina hidroxilasa\".", opts: ["Triptófano y Triptófano hidroxilasa.", "Histidina e Histidina descarboxilasa.", "Tirosina y Tirosina hidroxilasa.", "Glutamato y GAD."] },
    { n: 2, q: "En relación con los receptores dopaminérgicos, que son metabotrópicos, la activación de los subtipos D1 y D5 produce un efecto:", a: "b", ex: "Los D1 y D5 son excitadores (↑ AMPc), mientras que D2, D3 y D4 son inhibidores (↓ AMPc).", opts: ["Inhibitorio, al bloquear la enzima adenilato ciclasa y reducir el AMPc.", "Excitatorio, al activar a la proteína G y la enzima adenilato ciclasa, aumentando el AMPc.", "Puramente ionotrópico permitiendo la entrada de cloro.", "De activación exclusiva en el sistema digestivo."] },
    { n: 3, q: "Fisiopatológicamente, la esquizofrenia se asocia a una hiperactividad dopaminérgica, curando con alucinaciones y delirios. Los antipsicóticos típicos utilizados para tratarla actúan principalmente:", a: "a", ex: "Los fármacos antipsicóticos bloquean la vía inhibidora del receptor D2. (Para el Parkinson se da L-DOPA).", opts: ["Bloqueando los receptores D2.", "Inhibiendo la síntesis de L-DOPA.", "Aumentando la recaptación a través de DAT.", "Bloqueando los receptores nicotínicos."] },
    { n: 4, q: "Drogas de abuso como la cocaína y las anfetaminas generan su efecto de refuerzo positivo o \"recompensa\" alterando la sinapsis dopaminérgica. ¿Cuál es su mecanismo de acción a nivel presináptico?", a: "c", ex: "La cocaína bloquea el transportador de recaptación dependiente de Sodio (DAT), saturando la sinapsis de dopamina.", opts: ["Estimulan la enzima MAO para que destruya la dopamina.", "Actúan como falsos neurotransmisores en los receptores D1.", "Bloquean el transportador DAT, impidiendo la recaptación de dopamina y prolongando su efecto en el espacio sináptico.", "Inhiben la tirosina hidroxilasa."] },
    { n: 5, q: "Anatómica y funcionalmente, ¿cuál es el principal centro de producción de Noradrenalina en el Sistema Nervioso Central, proyectando de forma difusa hacia otras regiones del encéfalo?", a: "c", ex: "El Locus cerúleo es la fábrica principal de noradrenalina, vinculada a los estados de atención, vigilia y ánimo (depresión).", opts: ["Los Núcleos del Rafe.", "La Sustancia Negra.", "El Locus Cerúleo.", "El Núcleo Tuberomamilar."] },
    { n: 6, q: "Siguiendo con la noradrenalina, su unión a los receptores adrenérgicos α2 produce un efecto fisiológico muy específico que el profesor resumió como \"Freno / Control\". Esto significa que:", a: "b", ex: "Los receptores α2 suelen actuar como autorreceptores presinápticos inhibidores (frenan la sobre-liberación). Los que hacen vasoconstricción son los α1.", opts: ["Produce una potente vasoconstricción y sube la presión arterial.", "Disminuye el AMPc e inhibe la liberación de neurotransmisores en los terminales presinápticos.", "Causa broncodilatación masiva.", "Acelera la frecuencia cardíaca."] },
    { n: 7, q: "La Serotonina (5-HT), conocida popularmente como el neurotransmisor de la felicidad, posee siete subfamilias de receptores (la mayoría acoplados a proteína G). Sin embargo, existe una notable excepción: un receptor que es ionotrópico (canal iónico activado por ligando). ¿De cuál se trata?", a: "c", ex: "El 5-HT3 es la única excepción de la familia, funcionando como un canal iónico rápido.", opts: ["5-HT1A.", "5-HT2.", "5-HT3.", "5-HT7."] },
    { n: 8, q: "En el tratamiento farmacológico de la depresión mayor, el fármaco Fluoxetina (Prozac) ejerce su acción terapéutica mediante un mecanismo conocido como ISRS. Esto significa que:", a: "b", ex: "Los ISRS (Inhibidores Selectivos de Recaptación de Serotonina) impiden que el transportador SERT retire la serotonina, aumentando su disponibilidad.", opts: ["Aumenta la destrucción de la serotonina en la hendidura.", "Bloquea selectivamente el transportador SERT, inhibiendo la recaptación de la serotonina hacia el terminal.", "Es un precursor directo del Triptófano.", "Frena la acción de la enzima MAO."] },
    { n: 9, q: "(Pregunta del Audio). Un paciente toma un antihistamínico antiguo (de primera generación) para su alergia estacional y nota una intensa somnolencia al cabo de unas horas. Según la explicación de clase, ¿por qué ocurre esto?", a: "b", ex: "La histamina del núcleo tuberomamilar nos mantiene despiertos. Si el fármaco cruza al cerebro y la bloquea, da sueño.", opts: ["Porque bloquea la síntesis de cafeína en el cuerpo.", "Porque los de primera generación cruzan la barrera hematoencefálica y bloquean los receptores H1 en el cerebro, anulando el papel de vigilia que ejerce la histamina.", "Porque inducen la liberación masiva de adenosina.", "Porque actúan como benzodiacepinas."] },
    { n: 10, q: "A diferencia de las aminas biógenas, la maquinaria de síntesis de los Neuropéptidos presenta un reto celular importante. ¿Dónde y cómo se fabrican fisiológicamente estas moléculas?", a: "c", ex: "Como son proteínas largas, se fabrican desde los ribosomas en el cuerpo de la célula y viajan empaquetadas por el axón.", opts: ["En el terminal presináptico por la acción directa de enzimas libres.", "En las mitocondrias de la hendidura sináptica.", "En el soma neuronal (retículo endoplásmico rugoso) como prepropéptidos, viajando en vesículas por transporte axónico rápido mientras son escindidos por proteasas.", "Son producidos por la glía y enviados al axón."] },
    { n: 11, q: "¿Qué condición fisiológica específica es requerida en el terminal presináptico para poder liberar las grandes vesículas de núcleo denso que contienen neuropéptidos?", a: "b", ex: "Al estar las vesículas peptídicas más alejadas de las zonas activas y la membrana plasmática, necesitan una \"inundación\" grande de calcio para fusionarse.", opts: ["Basta con un único potencial de acción aislado.", "Se necesitan estímulos de alta frecuencia o intensidad, que generen un aumento sostenido y global del Calcio (Ca2+) intracelular.", "Solo se liberan si la neurona está en estado de hiperpolarización crónica.", "Se requiere el cierre de canales de calcio."] },
    { n: 12, q: "Una vez que un neuropéptido (ej. Endorfina) ha ejercido su acción moduladora en sus receptores metabotrópicos, la señal debe finalizar. A diferencia de neurotransmisores clásicos como la dopamina o serotonina, los neuropéptidos:", a: "a", ex: "Gran diferencia clave: no hay bombas de recaptación para péptidos gigantes, enzimas \"tijera\" extracelulares acaban con ellos.", opts: ["No tienen mecanismo de recaptación (transportadores), sino que difunden y son degradados por peptidasas en el espacio extracelular.", "Son reabsorbidos intactos y metidos de nuevo en vesículas.", "Son eliminados exclusivamente a través de la orina.", "Permanecen unidos al receptor de por vida."] },
    { n: 13, q: "A nivel de las vías neuroendocrinas e hipotalámicas, el profesor destacó el papel de ciertos péptidos. Si en un contexto clínico requerimos estimular el vínculo social y facilitar el parto, la hormona/neuropéptido clave implicada es:", a: "c", ex: "La oxitocina es fundamental para la contracción uterina y los aspectos conductuales del vínculo. (La Vasopresina retiene agua y sube presión).", opts: ["Vasopresina.", "Somatostatina.", "Oxitocina.", "Sustancia P."] },
    { n: 14, q: "(¡Aviso del profesor en clase!). Tras tomarse una taza de café expreso, un estudiante de Medicina logra mantenerse despierto para estudiar este manual. El mecanismo de acción molecular de la cafeína se basa en:", a: "b", ex: "\"El café no te despierta, bloquea la adenosina que es la que te duerme\".", opts: ["Aumentar la síntesis de triptófano.", "Bloquear los receptores postsinápticos de Adenosina (Receptores P1), impidiendo que esta purina ejerza su función promotora del sueño.", "Liberar dosis masivas de ATP en el bulbo raquídeo.", "Inhibir irreversiblemente la MAO."] },
    { n: 15, q: "Las endorfinas y las dinorfinas son neuropéptidos endógenos cuyas dianas son secuestradas farmacológicamente por drogas como la heroína o el fentanilo. Su función biológica principal es:", a: "b", ex: "Los péptidos opioides bloquean el dolor y generan placer. La que transmite el dolor es la Sustancia P.", opts: ["Transmitir señales de dolor intenso hacia el cerebro.", "Producir analgesia (inhibición del dolor) y euforia, especialmente tras ejercicios o estrés físico intenso.", "Regular la secreción de ácido clorhídrico en el estómago.", "Mantener la vigilia junto con la histamina."] }
];

let questions = [];
let userAnswers = {}; 

function startQuiz(isRandom) {
    questions = [...rawData].map(q => {
        const correctText = q.opts[q.a.charCodeAt(0) - 97];
        const shuffledOpts = [...q.opts].sort(() => Math.random() - 0.5);
        const newCorrectLetter = String.fromCharCode(97 + shuffledOpts.indexOf(correctText));
        return { ...q, opts: shuffledOpts, a: newCorrectLetter };
    });

    if (isRandom) questions.sort(() => Math.random() - 0.5);

    renderQuiz();
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    document.getElementById('sidebar').style.display = 'flex';
}

function renderQuiz() {
    const container = document.getElementById('question-container');
    const sidebar = document.getElementById('sidebar');
    container.innerHTML = '';
    sidebar.innerHTML = '';

    questions.forEach((q, i) => {
        const div = document.createElement('div');
        div.className = `question-block qb-${i}`;
        div.innerHTML = `
            <h2>Pregunta ${i + 1}</h2>
            <p>${q.q}</p>
            <div class="options">
                ${q.opts.map((opt, idx) => `
                    <button class="option-btn" onclick="checkAnswer(${i}, '${String.fromCharCode(97 + idx)}', this)">
                        ${String.fromCharCode(97 + idx)}) ${opt}
                    </button>
                `).join('')}
            </div>
            <div class="explanation" id="ex-${i}">${q.ex}</div>
            <div class="marking-zone">
                <input type="checkbox" id="mark-${i}" onchange="toggleMark(${i})">
                <label for="mark-${i}">Marcar pregunta para revisión 🚩</label>
            </div>
        `;
        container.appendChild(div);

        const item = document.createElement('div');
        item.className = `index-item ii-${i}`;
        item.innerText = i + 1;
        item.onclick = () => {
            document.querySelector(`.qb-${i}`).scrollIntoView({ behavior: 'smooth', block: 'start' });
        };
        sidebar.appendChild(item);
    });
    
    document.getElementById('main-content').scrollTop = 0;
}

function checkAnswer(qIdx, letter, btn) {
    if (userAnswers[qIdx]) return; 

    const isCorrect = letter === questions[qIdx].a;
    userAnswers[qIdx] = { selected: letter, correct: isCorrect, marked: document.getElementById(`mark-${qIdx}`).checked };

    const buttons = document.querySelectorAll(`.qb-${qIdx} .option-btn`);
    buttons.forEach(b => {
        b.disabled = true;
        const bLetter = b.innerText.split(')')[0].trim();
        if (bLetter === questions[qIdx].a) b.classList.add('correct');
        else if (bLetter === letter) b.classList.add('incorrect');
    });

    const sideItem = document.querySelector(`.ii-${qIdx}`);
    sideItem.classList.add(isCorrect ? 'correct' : 'incorrect');

    document.getElementById(`ex-${qIdx}`).style.display = 'block';
}

function toggleMark(index) {
    const sideItem = document.querySelector(`.ii-${index}`);
    if (document.getElementById(`mark-${index}`).checked) {
        sideItem.classList.add('marked');
    } else {
        sideItem.classList.remove('marked');
    }
}

function confirmFinish() {
    if (confirm("¿Estás seguro de que quieres finalizar el cuestionario?")) {
        showResults();
    }
}

function showResults() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('sidebar').style.display = 'none';
    document.getElementById('main-content').scrollTop = 0;

    let correct = 0, failed = 0;
    Object.values(userAnswers).forEach(v => {
        if (v.correct) correct++;
        else failed++;
    });

    document.getElementById('res-total').innerText = Object.keys(userAnswers).length;
    document.getElementById('res-correct').innerText = correct;
    document.getElementById('res-fail').innerText = failed;
}

function repeatMode(mode) {
    let subSet = [];
    if (mode === 'all') {
        subSet = [...rawData];
    } else if (mode === 'failed') {
        subSet = questions.filter((_, i) => userAnswers[i] && !userAnswers[i].correct);
    } else if (mode === 'marked') {
        subSet = questions.filter((_, i) => document.getElementById(`mark-${i}`).checked);
    } else if (mode === 'mixed') {
        subSet = questions.filter((_, i) => 
            (userAnswers[i] && !userAnswers[i].correct) || document.getElementById(`mark-${i}`).checked
        );
    }

    if (subSet.length === 0) {
        alert("No hay preguntas en esta categoría.");
        return;
    }

    userAnswers = {};
    questions = subSet;
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('sidebar').style.display = 'flex';
    document.getElementById('quiz-screen').style.display = 'block';
    renderQuiz();
}

/* Lógica del botón Scroll to Top */
const mainContent = document.getElementById('main-content');
const scrollTopBtn = document.getElementById('scrollTopBtn');

mainContent.addEventListener('scroll', () => {
    if (mainContent.scrollTop > 300) {
        scrollTopBtn.style.display = 'block';
    } else {
        scrollTopBtn.style.display = 'none';
    }
});

function scrollToTop() {
    mainContent.scrollTo({
        top: 0,
        behavior: 'smooth'
    });
}
</script>
</body>
</html>
