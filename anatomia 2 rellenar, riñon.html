<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Anatomía del Riñón y Uréteres</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
            text-align: center;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .instructions {
            margin-bottom: 20px;
            color: #333;
            font-size: 16px;
        }
        .controls {
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            margin: 0 10px;
            transition: background-color 0.3s;
        }
        .btn-verify {
            background-color: #4CAF50;
            color: white;
        }
        .btn-verify:hover {
            background-color: #45a049;
        }
        .btn-retry {
            background-color: #2196F3;
            color: white;
        }
        .btn-retry:hover {
            background-color: #1e88e5;
        }
        .score-display {
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
            color: #333;
        }
        .img-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 800px;
            border: 1px solid #ddd;
            background-color: white;
        }
        .img-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }
        .dropdown {
            position: absolute;
            width: 25%;
            height: 3%;
            font-size: 11px;
            background-color: rgba(255, 255, 255, 0.95);
            border: 1px solid #666;
            border-radius: 3px;
            padding: 0 2px;
            box-sizing: border-box;
            cursor: pointer;
        }
        .dropdown:focus {
            z-index: 10;
            border-color: #2196F3;
            outline: none;
        }
        .correct {
            background-color: #c8e6c9 !important;
            border: 2px solid #2e7d32 !important;
            color: #1b5e20;
            font-weight: bold;
        }
        .incorrect {
            background-color: #ffcdd2 !important;
            border: 2px solid #c62828 !important;
            color: #b71c1c;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Quiz de Anatomía: Riñón y Uréteres</h1>
        <p class="instructions">Selecciona la estructura anatómica correcta en cada menú desplegable situado al final de cada línea indicadora.</p>
        
        <div class="controls">
            <button class="btn-verify" onclick="verificarRespuestas()">Verificar Respuestas</button>
            <button class="btn-retry" onclick="reiniciarTest()">Volver a Intentar</button>
            <div id="score" class="score-display"></div>
        </div>

        <div class="img-wrapper">
            <img src="rinon.png" alt="Esquema Renal">
            
            <select class="dropdown" style="top: 18.2%; left: 0%;" data-correct="Cáliz mayor"></select>
            <select class="dropdown" style="top: 23%; left: 0%;" data-correct="Pelvis"></select>
            <select class="dropdown" style="top: 29.5%; left: 0%;" data-correct="Cáliz menor"></select>
            <select class="dropdown" style="top: 39.5%; left: 0%;" data-correct="Apófisis costiforme"></select>
            <select class="dropdown" style="top: 59%; left: 0%;" data-correct="Arteria sacra media"></select>

            <select class="dropdown" style="top: 22.5%; left: 74.5%;" data-correct="Pelvis renal"></select>
            <select class="dropdown" style="top: 30.5%; left: 74.5%;" data-correct="Cuello del uréter"></select>
            <select class="dropdown" style="top: 35.5%; left: 74.5%;" data-correct="Músculo transverso del abdomen"></select>
            <select class="dropdown" style="top: 40.5%; left: 74.5%;" data-correct="Porción abdominal"></select>
            <select class="dropdown" style="top: 45.5%; left: 74.5%;" data-correct="Músculo cuadrado lumbar"></select>
            <select class="dropdown" style="top: 50.5%; left: 74.5%;" data-correct="Músculo psoas"></select>
            <select class="dropdown" style="top: 58.5%; left: 74.5%;" data-correct="Arteria ilíaca común"></select>
            <select class="dropdown" style="top: 64.5%; left: 74.5%;" data-correct="Porción ilíaca"></select>
            <select class="dropdown" style="top: 70%; left: 74.5%;" data-correct="Arteria ilíaca externa"></select>
            <select class="dropdown" style="top: 74.5%; left: 74.5%;" data-correct="Arteria ilíaca interna"></select>
            <select class="dropdown" style="top: 79.5%; left: 74.5%;" data-correct="Porción pélvica"></select>
            <select class="dropdown" style="top: 89%; left: 73.5%;" data-correct="Vejiga de la orina"></select>
        </div>
    </div>

    <script>
        const opciones = [
            "Apófisis costiforme",
            "Arteria ilíaca común",
            "Arteria ilíaca externa",
            "Arteria ilíaca interna",
            "Arteria sacra media",
            "Cáliz mayor",
            "Cáliz menor",
            "Cuello del uréter",
            "Músculo cuadrado lumbar",
            "Músculo psoas",
            "Músculo transverso del abdomen",
            "Pelvis",
            "Pelvis renal",
            "Porción abdominal",
            "Porción ilíaca",
            "Porción pélvica",
            "Vejiga de la orina"
        ];

        window.onload = function() {
            const selects = document.querySelectorAll('.dropdown');
            
            selects.forEach(select => {
                let defaultOption = document.createElement('option');
                defaultOption.value = "";
                defaultOption.text = "--- Selecciona ---";
                select.appendChild(defaultOption);

                opciones.forEach(opcion => {
                    let opt = document.createElement('option');
                    opt.value = opcion;
                    opt.text = opcion;
                    select.appendChild(opt);
                });
            });
        };

        function verificarRespuestas() {
            const selects = document.querySelectorAll('.dropdown');
            let correctas = 0;
            let total = selects.length;

            selects.forEach(select => {
                let respuestaUsuario = select.value;
                let respuestaCorrecta = select.getAttribute('data-correct');

                select.classList.remove('correct', 'incorrect');

                if (respuestaUsuario === respuestaCorrecta) {
                    select.classList.add('correct');
                    correctas++;
                } else if (respuestaUsuario !== "") {
                    select.classList.add('incorrect');
                } else {
                    select.classList.add('incorrect');
                }
            });

            const scoreDiv = document.getElementById('score');
            scoreDiv.innerHTML = `Has acertado ${correctas} de ${total} preguntas.`;
            
            if (correctas === total) {
                scoreDiv.style.color = "#2e7d32";
            } else {
                scoreDiv.style.color = "#c62828";
            }
        }

        function reiniciarTest() {
            const selects = document.querySelectorAll('.dropdown');
            selects.forEach(select => {
                select.value = "";
                select.classList.remove('correct', 'incorrect');
            });
            document.getElementById('score').innerHTML = "";
        }
    </script>
</body>
</html>
